            <button onClick={openAddToPortfolio} title="Save current sIfA as a portfolio entry"
              style={{ padding:"6px 14px", borderRadius:6, border:"1px solid #CBD5E1",
                background:"white", color:"#000000", fontWeight:600, fontSize:12.5, cursor:"pointer" }}>
              + Portfolio
            </button>
          )}
          {portfolio.length > 0 && (
            <button onClick={() => setPortfolioOpen(true)}
              style={{ padding:"6px 14px", borderRadius:6, border:"none",
                background:"#2563EB", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer" }}>
              Portfolio ({portfolio.length})
            </button>
          )}
        </div>
      </header>

      {/* ── Body ── */}
      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>

        {/* Table area */}
        <div style={{ flex:1, overflowY:"auto", overflowX:"auto", padding:"20px 24px" }}>
          <div style={{ width:"100%", minWidth:900 }}>

            {/* ── About sIfA panel ── collapsible; collapsed by default.
                Dark header makes the panel easy to spot and open. */}
            <div className="no-print" style={{
              background:"white", border:"1px solid #1E293B", borderRadius:8,
              marginBottom:20,
              boxShadow:"0 2px 6px rgba(0,0,0,0.15)", fontSize:15, color:"#000000", lineHeight:1.75,
            }}>
              <button
                onClick={() => setAboutOpen(o => !o)}
                aria-expanded={aboutOpen}
                aria-controls="about-sifa-body"
                className="no-print"
                style={{ display:"flex", alignItems:"center", gap:12,
                         width:"100%", padding:"15px 20px", border:"none",
                         background:"#0F172A",
                         borderRadius: aboutOpen ? "8px 8px 0 0" : "8px",
                         cursor:"pointer" }}>
                <span style={{ fontSize:15, fontWeight:700, color:"white", letterSpacing:"-0.02em" }}>
                  About sIfA (Statement of Intellectual Fellowship and Accountability)
                </span>
                <span aria-hidden="true" style={{
                  flexShrink:0,
                  display:"inline-flex", alignItems:"center", gap:4,
                  padding:"3px 10px", borderRadius:4,
                  border:"1px solid rgba(255,255,255,0.35)", background:"rgba(255,255,255,0.12)",
                  fontSize:12, fontWeight:700, color:"white",
                  letterSpacing:"0.03em", whiteSpace:"nowrap",
                }}>
                  {aboutOpen ? '▲ Collapse' : '▼ Expand'}
                </span>
              </button>
              {aboutOpen && (
              <div id="about-sifa-body" style={{ padding:"0 20px 20px", borderTop:"1px solid #F1F5F9" }}>
              <h3 style={{ fontSize:12, fontWeight:700, color:"#111111", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.1em", paddingBottom:6, borderBottom:"2px solid #2451CB", display:"inline-block" }}>What is sIfA?</h3>
              <p style={{ marginBottom:18 }}>
                sIfA is an invitation to reflect on how knowledge or other types of outputs are
                created in interaction with AI. It acknowledges that such work involves many roles
                and contributors, inspired by the Contributor Role Taxonomy (CRediT). It also
                acknowledges that AI can play different parts in each of those roles. Thus, sIfA
                asks questions about how humans have collaborated with each other first, followed
                by questions on how each contributor has interacted with AI. For research products,
                the 14 contributor roles of the CRediT taxonomy can be used. For outputs that
                require a different taxonomy, there is an option to set up an own taxonomy. The
                tool creates both a table as well as the sIfA figure: a radar diagram in the shape
                of a brain with fluid lines to express that human/AI interaction is not clear cut,
                even when declared. The sIfA figure can be used as a catchy visual to foster a
                culture of transparent reflection and learning when it comes to interactions
                between humans and machines.
              </p>

              <h3 style={{ fontSize:12, fontWeight:700, color:"#111111", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.1em", paddingBottom:6, borderBottom:"2px solid #2451CB", display:"inline-block" }}>How to use the sIfA tool</h3>
              <p style={{ marginBottom:12 }}>
                The sIfA tool can be used by answering a set of questions from the{" "}
                <button onClick={() => { _historyPaused.current = true; setAgentOpen(true); }} style={_linkStyle}>chatbot</button>{" "}
                or by simply filling in the{" "}
                <button onClick={scrollToTable} style={_linkStyle}>table</button>.
                We recommend setting up a sIfA at the start of a project and filling it in as the
                project progresses, to make reflection as accurate as possible.
              </p>
              <p style={{ marginBottom:12 }}>
                The tool asks a number of questions to identify the relevant contributor roles for an
                output. CRediT is offered as an option, along with the choice to set up your{" "}
                <button onClick={() => setTaxonomyPickerOpen(true)} style={_linkStyle}>own taxonomy</button>.
                For each role, the tool asks who the contributors are, and what their level of
                engagement in this role was (Lead, Equal, Support, Sole). Each contributor is then
                asked about their use of AI in the different roles, their reasons for using AI, and
                what tool they used. For each role, the extent of AI use is rated:
              </p>
              <ul style={{ marginBottom:12, paddingLeft:22, listStyle:"disc" }}>
                <li style={{ marginBottom:4 }}><strong>0:</strong> no interaction between humans and AI in this task</li>
                <li style={{ marginBottom:4 }}><strong>1:</strong> some interaction between humans and AI in this task</li>
                <li style={{ marginBottom:4 }}><strong>2:</strong> extensive interaction between humans and AI in this task</li>
              </ul>
              <p style={{ marginBottom:12 }}>
                If more than one contributor is listed under a role, each contributor records their AI
                use separately. In the table, these are displayed separately. In the sIfA diagram, the
                average of AI usage is calculated per contributor role, with a Lead role weighted at
                70%, Equal at 50%, Support at 30%, and Sole at 100%.
              </p>
              <p style={{ marginBottom:12 }}>
                The sIfA can be{" "}
                <button onClick={saveToFile} style={_linkStyle}>saved</button>{" "}
                for further editing along the way. The final sIfA figure and table can be{" "}
                <button onClick={() => radarRef.current?.downloadSVG('svg')} style={_linkStyle}>saved</button>,{" "}
                <button onClick={saveAsPDFWithFigure} style={_linkStyle}
                  title="Opens a print preview — choose 'Save as PDF' in the browser dialog"
                >saved as PDF</button>{" "}
                and{" "}
                <button onClick={() => radarRef.current?.downloadSVG('jpeg')} style={_linkStyle}>exported</button>{" "}
                in different formats, including in your sIfA{" "}
                <button onClick={() => setPortfolioOpen(true)} style={_linkStyle}>portfolio</button>{" "}
                if you want to keep track of your AI interactions across different projects. You can also custom design the sIfA{" "}
                <button onClick={() => setCustomSchemeOpen(true)} style={_linkStyle}>using your own colour scheme</button>.
              </p>

              {/* Where your work is saved — clarifies the difference
                  between the per-browser autosave and the portable
                  .sifa.json file, so users don't assume the
                  portfolio is durably stored somewhere by default. */}
              <div style={{ background:"#F8FAFC", border:"1px solid #E2E8F0", borderLeft:"3px solid #2451CB", borderRadius:3, padding:"10px 14px", margin:"4px 0 14px", fontSize:13, lineHeight:1.55 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#2451CB", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>
                  Where your work is saved
                </div>
                <p style={{ margin:"0 0 6px" }}>
                  <strong>Browser memory (automatic).</strong> Everything you type — the current sIfA and the portfolio — is quietly written to this browser's local storage on every change, so it reappears when you reopen the tool. This is per-browser-per-machine and is not synced anywhere.
                </p>
                <p style={{ margin:"0 0 6px" }}>
                  <strong>Portable file (manual).</strong> Click <em>💾 Save sIfA</em> to write the current sIfA <em>and</em> the portfolio to a <code style={{ fontFamily:"ui-monospace, SFMono-Regular, Menlo, monospace", fontSize:12, background:"#EEF2FF", padding:"1px 5px", borderRadius:2 }}>.sifa.json</code> file you control. Inside the portfolio panel, <em>💾 Save Portfolio</em> writes just the portfolio entries to a slimmer file you can archive or share without the current draft.
                </p>
                <p style={{ margin:0, fontSize:12, color:"#000000" }}>
                  Clearing browser data, switching browser, or moving to another machine all lose the autosave. Treat <em>.sifa.json</em> files as the durable record.
                </p>
              </div>
              <p style={{ marginBottom:18 }}>
                The sIfA tool is also a statement of accountability. It assumes that the human authors
                take full responsibility for the content of a piece of research or another output.
                This is stated in a statement with the sIfA figure.
              </p>

              <h3 style={{ fontSize:12, fontWeight:700, color:"#111111", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.1em", paddingBottom:6, borderBottom:"2px solid #2451CB", display:"inline-block" }}>Background</h3>

              <p style={{ marginBottom:10 }}>
                The <strong>thinking behind sIfA</strong> is in Saleh, Engy, and Mareike Schomerus. 2026.{" "}
                <em>The sIfA tool for a Statement of Intellectual Fellowship and Accountability:
                An invitation to reflect on how humans and AI interact in producing knowledge
                (Groundwork 32 Thought Piece).</em>{" "}
                Nairobi: Busara. doi:{" "}
                <a href="https://doi.org/10.62372/IUPB2137" target="_blank" rel="noopener noreferrer"
                  style={{ color:"#2451CB" }}>10.62372/IUPB2137</a>.
              </p>

              <p style={{ marginBottom:10 }}>
                The <strong>Contributor Role Taxonomy (CRediT)</strong> 'is a community-owned taxonomy of 14 contributor
                roles designed to represent the key types of contributions typically made to research
                outputs, including journal articles'. More information on CRediT and how to use it can
                be found at{" "}
                <a href="https://credit.niso.org" target="_blank" rel="noopener noreferrer"
                  style={{ color:"#2451CB" }}>https://credit.niso.org</a>.
              </p>

              <p style={{ marginBottom:10 }}>
                The <strong>descriptions of the CRediT roles</strong> used here are taken from Hosseini, Mohammad,
                Simon Kerridge, Liz Allen, Veronique Kiermer, and Kristi Holmes. 2026. "CRediT Roles
                and Example Research Tasks That Could be Attributed to Them (V1)."&nbsp;
                <em>Zenodo</em>. doi:{" "}
                <a href="https://doi.org/10.5281/zenodo.18421448" target="_blank" rel="noopener noreferrer"
                  style={{ color:"#2451CB" }}>10.5281/zenodo.18421448</a>.
              </p>

              <p style={{ marginBottom:10 }}>
                Guidance on <strong>what constitutes extensive AI usage</strong> is taken from Resnik, David B., and
                Mohammad Hosseini. 2026. "Disclosing artificial intelligence use in scientific
                research and publication: When should disclosure be mandatory, optional, or
                unnecessary?"{" "}
                <em>Accountability in Research</em> 33 (2):2481949. doi:{" "}
                <a href="https://doi.org/10.1080/08989621.2025.2481949" target="_blank" rel="noopener noreferrer"
                  style={{ color:"#2451CB" }}>10.1080/08989621.2025.2481949</a>.
              </p>

              <p style={{ marginBottom:18 }}>
                Applying the CRediT taxonomy to make the use of AI transparent was inspired by
                Behavioural Research UK. 2026.{" "}
                <em>Using Generative AI for Behavioural Research Effectively and Responsibly:
                a BR-UK Statement.</em>{" "}
                London: BR-UK.
              </p>

              <h3 style={{ fontSize:12, fontWeight:700, color:"#111111", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.1em", paddingBottom:6, borderBottom:"2px solid #2451CB", display:"inline-block" }}>Rights</h3>

                The sIfA tool can be used and downloaded at{" "}

                <a href="https://github.com/mareikeschomerus-ctrl/sIfA" target="_blank" rel="noopener noreferrer"
                  style={{ color:"#2451CB" }}>https://github.com/mareikeschomerus-ctrl/sIfA</a>.

              </p>
              <p style={{ marginBottom:18, fontSize:12, color:"#000000", fontStyle:"italic", lineHeight:1.55 }}>
                Copyright © 2026 Mareike Schomerus / Busara. Licensed under the Apache License,
                Version 2.0 (the "License"); you may not use this software except in compliance with

          boxShadow:"0 20px 60px rgba(0,0,0,0.35)",
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
            <div>
              <h2 style={{ fontSize:18, fontWeight:700, color:"#1E293B", margin:0 }}>
                sIfA
              </h2>
              {projectName.trim() && (
                <p style={{ fontSize:13, fontWeight:600, color:"#334155", margin:"3px 0 0" }}>
                  Project: {projectName.trim()}
                </p>
              )}
              <p style={{ fontSize:12, color:"#000000", margin:"3px 0 0" }}>
                Outer ring = Human · Centre = AI · Each axis = one contributor role
              </p>
            </div>
            <button onClick={() => setRadarOpen(false)} style={{
              background:"none", border:"none", fontSize:24, cursor:"pointer",
              color:"#000000", lineHeight:1, padding:"0 4px",
            }}>×</button>
          </div>

          {/* Font picker — choose the font baked into the figure and its export */}
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, fontSize:12, color:"#000000", flexWrap:"wrap" }}>
            <span style={{ fontWeight:600 }}>Font:</span>
            {FONT_OPTIONS.map(opt => (
              <label key={opt.id} style={{ display:"inline-flex", alignItems:"center", gap:5, cursor:"pointer", fontFamily: opt.family, fontSize:13 }}>
                <input type="radio" name="sifa-font" value={opt.id}
                  checked={figureFont === opt.id}
                  onChange={() => setFigureFont(opt.id)} />
                {opt.label}
              </label>
            ))}
          </div>

          <RadarChart ref={radarRef} data={data} roles={activeRoles} fontFamily={fontFamilyById(figureFont)} taxonomyMode={taxonomyMode} humanColor={customScheme._human} aiColor={customScheme._ai} projectName={projectName} onSaveAsPDF={saveAsPDFWithFigure} />
        </div>
      </div>

      {/* ── Name-prompt Modal — shown when adding to portfolio ───────── */}
      {namePromptOpen && (
        <div className="no-print" style={{
          position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
          display:"flex", alignItems:"center", justifyContent:"center",
          zIndex:1100, backdropFilter:"blur(3px)",
        }} onClick={e => e.target === e.currentTarget && setNamePromptOpen(false)}>
          <div style={{
            background:"white", borderRadius:8, padding:"22px 26px",
            width:"min(480px, 94vw)", boxShadow:"0 20px 60px rgba(0,0,0,0.35)",
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
              <div>
                <h2 style={{ fontSize:17, fontWeight:700, color:"#1E293B", margin:0 }}>Name this sIfA</h2>
                <p style={{ fontSize:12, color:"#000000", margin:"4px 0 0", lineHeight:1.45 }}>
                  Give this portfolio entry a name. Leave blank to use the default — you can rename it later.
                </p>
              </div>
              <button onClick={() => setNamePromptOpen(false)} aria-label="Close"
                style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#000000", lineHeight:1, padding:"0 4px" }}>×</button>
            </div>

            <input autoFocus
              value={namePromptValue}
              onChange={e => setNamePromptValue(e.target.value)}
              onFocus={e => e.target.select()}
              onKeyDown={e => {
                if (e.key === 'Enter')  { e.preventDefault(); addToPortfolio(namePromptValue); }
                if (e.key === 'Escape') { e.preventDefault(); setNamePromptOpen(false); }
              }}
              placeholder={`sIfA ${portfolio.length + 1}`}
              style={{ width:"100%", boxSizing:"border-box", padding:"9px 12px", border:"1px solid #CBD5E1", borderRadius:4, fontSize:14, outline:"none", marginBottom:18 }} />

            <div style={{ display:"flex", justifyContent:"flex-end", gap:10 }}>
              <button onClick={() => setNamePromptOpen(false)}
                style={{ border:"1px solid #CBD5E1", background:"white", color:"#000000", borderRadius:4, padding:"8px 16px", cursor:"pointer", fontSize:13, fontWeight:600 }}>
                Cancel
              </button>
              <button onClick={() => addToPortfolio(namePromptValue)}
                style={{ border:"1px solid #2451CB", background:"#2451CB", color:"white", borderRadius:4, padding:"8px 18px", cursor:"pointer", fontSize:13, fontWeight:700, letterSpacing:"0.03em", textTransform:"uppercase" }}>
                ➕ Add
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Taxonomy Picker Modal ────────────────────────────────────── */}
      {/* ── Custom Colour Scheme Modal ───────────────────────────────────── */}
      {customSchemeOpen && (
        <div className="no-print" style={{
          position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
          display:"flex", alignItems:"center", justifyContent:"center",
          zIndex:1200, backdropFilter:"blur(3px)",
        }} onClick={e => e.target === e.currentTarget && setCustomSchemeOpen(false)}>
          <div style={{
            background:"white", borderRadius:12, padding:"24px 28px",
            width:"min(580px, 95vw)", maxHeight:"85vh", overflowY:"auto",
            boxShadow:"0 20px 60px rgba(0,0,0,0.3)",
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <h2 style={{ fontSize:17, fontWeight:700, color:"#0F172A", margin:0 }}>Custom colour scheme</h2>
                <p style={{ fontSize:12, color:"#000000", marginTop:4 }}>
                  Enter hex codes (#rrggbb) for each role. Leave a field blank to keep the default.
                </p>
              </div>
              <button onClick={() => setCustomSchemeOpen(false)}
                style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#000000" }}>×</button>
            </div>

            {/* Figure ring colours */}
            <div style={{ display:"flex", gap:10, marginBottom:12, padding:"10px 14px", background:"#FFF7ED", borderRadius:8, border:"1px solid #FED7AA", flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ fontSize:12, fontWeight:600, color:"#92400E", flex:"0 0 auto" }}>Figure colours</span>
              {[
                { key:'_human', label:'Outer ring (Human)', placeholder:'#DD5510' },
                { key:'_ai',    label:'Inner ring (AI)',    placeholder:'#6E55D6' },
              ].map(f => (
                <div key={f.key} style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:12, color:"#78350F" }}>{f.label}</span>
                  <input type="text" placeholder={f.placeholder} maxLength={7}
                    defaultValue={customScheme[f.key] || ''}
                    style={{ width:78, padding:"4px 6px", border:"1px solid #FCD34D", borderRadius:4, fontSize:12, fontFamily:"monospace", background:"white" }}
                    onBlur={e => {
                      const v = e.target.value.trim();
                      setCustomScheme(prev => ({ ...prev, [f.key]: v || undefined }));
                      setColorScheme('custom');
                    }} />
                </div>
              ))}
            </div>

            {/* Global fill row */}
            <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:12, padding:"10px 12px", background:"#F8FAFC", borderRadius:8, border:"1px solid #E2E8F0", flexWrap:"wrap" }}>
              <span style={{ fontSize:12, fontWeight:600, color:"#000000", flex:1, minWidth:120 }}>Apply to all roles</span>
              {['bg','accent','border'].map(field => (
                <div key={field} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                  <span style={{ fontSize:12, color:"#000000", textTransform:"uppercase", letterSpacing:"0.05em" }}>{field==='bg'?'Background':field==='accent'?'Text / accent':'Border'}</span>
                  <input type="text" placeholder="#rrggbb" maxLength={7}
                    style={{ width:78, padding:"4px 6px", border:"1px solid #E2E8F0", borderRadius:4, fontSize:12, fontFamily:"monospace" }}
                    onBlur={e => {
                      const v = e.target.value.trim();
                      if (!v) return;
                      setCustomScheme(prev => {
                        const next = {...prev};
                        activeRoles.forEach(r => { next[r.id] = {...(next[r.id]||{}), [field]: v }; });
                        return next;
                      });
                      setColorScheme('custom');
                    }} />
                </div>
              ))}
            </div>

            {/* Column headings */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 78px 78px 78px 28px", gap:8, padding:"0 10px 4px", fontSize:12, color:"#000000", textTransform:"uppercase", letterSpacing:"0.05em" }}>
              <span>Role</span><span>Background</span><span>Text / Accent</span><span>Border</span><span></span>
            </div>

            {/* Per-role rows */}
            <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
              {activeRoles.map((r, i) => {
                const cs = customScheme[r.id] || {};
                const eff = getSchemeStyle(r, i);
                return (
                  <div key={r.id} style={{
                    display:"grid", gridTemplateColumns:"1fr 78px 78px 78px 28px",
                    gap:8, alignItems:"center", padding:"6px 10px",
                    borderRadius:6, background: eff.bg, border:`1px solid ${eff.border}`,
                  }}>
                    <span style={{ fontSize:12, fontWeight:600, color: eff.accent }}>{r.label}</span>
                    {['bg','accent','border'].map(field => (
                      <input key={field} type="text" placeholder={r[field]} maxLength={7}
                        defaultValue={cs[field] || ''}
                        style={{ width:"100%", padding:"4px 5px", border:"1px solid rgba(0,0,0,0.12)", borderRadius:4, fontSize:12, fontFamily:"monospace", background:"rgba(255,255,255,0.75)" }}
                        onBlur={e => {
                          const v = e.target.value.trim();
                          setCustomScheme(prev => {
                            const next = {...prev};
                            next[r.id] = {...(next[r.id]||{}), [field]: v || undefined};
                            if (!next[r.id][field]) delete next[r.id][field];
                            return next;
                          });
                          setColorScheme('custom');
                        }} />
                    ))}
                    <button onClick={() => setCustomScheme(prev => { const n={...prev}; delete n[r.id]; return n; })}
                      title="Reset this role to default"
                      style={{ border:"none", background:"transparent", color:"#CBD5E1", cursor:"pointer", fontSize:13, padding:0 }}>↺</button>
                  </div>
                );
              })}
            </div>

            <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:18 }}>
              <button onClick={() => { setCustomScheme({}); setColorScheme('multi'); }}
                style={{ padding:"7px 14px", borderRadius:6, border:"1px solid #E2E8F0", background:"white", color:"#000000", fontSize:12, cursor:"pointer" }}>
                Reset all
              </button>
              <button onClick={() => { setColorScheme('custom'); setCustomSchemeOpen(false); }}
                style={{ padding:"7px 14px", borderRadius:6, border:"none", background:"#2451CB", color:"white", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                Apply
              </button>
            </div>
          </div>
        </div>
      )}

      <TaxonomyPicker
        open={taxonomyPickerOpen}
        currentMode={taxonomyMode}
        currentRoles={activeRoles}
        onClose={() => setTaxonomyPickerOpen(false)}
        onApply={applyCustomTaxonomy}
        onUseCRediT={switchToCRediT}
      />

      {/* ── Portfolio Modal ─────────────────────────────────────────── */}
      <div className="no-print" style={{
        position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
        display: portfolioOpen ? "flex" : "none",
        alignItems:"stretch", justifyContent:"center", zIndex:1000,
        backdropFilter:"blur(3px)",
      }} onClick={e => e.target === e.currentTarget && setPortfolioOpen(false)}>
        <div style={{
          background:"white", display:"flex", flexDirection:"column",
          width:"min(1240px,98vw)", margin:"18px", borderRadius:6,
          boxShadow:"0 20px 60px rgba(0,0,0,0.35)", overflow:"hidden",
        }}>
          {/* Header */}
          <div style={{ background:"#111111", color:"white", padding:"14px 22px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0, gap:16 }}>
            <div>
              <div style={{ fontWeight:700, fontSize:16 }}>📊 sIfA Portfolio</div>
              <div style={{ fontSize:12, opacity:0.7, marginTop:2 }}>
                Averaged AI interaction across saved sIfA statements
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              {portfolio.length > 0 && (
                <button onClick={savePortfolioToFile}
                  title="Save just the portfolio entries as a .sifa.json — without the current draft"
                  style={{ border:"1px solid rgba(255,255,255,0.55)", background:"transparent", color:"white", padding:"7px 12px", borderRadius:2, cursor:"pointer", fontSize:12, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase" }}>
                  💾 Save Portfolio
                </button>
              )}
              <button onClick={() => setPortfolioOpen(false)} aria-label="Close portfolio panel"
                style={{ background:"none", border:"none", color:"white", fontSize:24, cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
            </div>
          </div>

          {/* Body */}
          <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
            {/* Left — entry list */}
            <div style={{ width:300, flexShrink:0, borderRight:"1px solid #E2E8F0", overflowY:"auto", padding:"18px 16px", background:"#F8FAFC" }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#000000", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:12, paddingBottom:6, borderBottom:"1px solid #E2E8F0" }}>
                Saved sIfAs ({portfolio.length})
              </div>
              {portfolio.length === 0 && (
                <p style={{ fontSize:12, color:"#000000", fontStyle:"italic" }}>No sIfAs saved yet. Close this panel and click ➕ Add to Portfolio.</p>
              )}
              {portfolio.map((entry) => {
                const aiRoles = entry.roles.filter(r => (entry.data[r.id]?.extent || 0) > 0 && !entry.data[r.id]?.skipped);
                const activeR = entry.roles.filter(r => !entry.data[r.id]?.skipped);
                const avgAI = aiRoles.length > 0
                  ? (aiRoles.reduce((s,r) => s + (entry.data[r.id]?.extent||0), 0) / aiRoles.length).toFixed(1)
                  : '0.0';
                return (
                  <div key={entry.id} style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:4, padding:"12px 12px", marginBottom:10, boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                      <input
                        value={entry.name}
                        onChange={e => renamePortfolioEntry(entry.id, e.target.value)}
                        style={{ fontWeight:700, fontSize:13, color:"#1E293B", border:"none", background:"transparent", outline:"none", width:"100%", padding:0 }}
                      />
                      <div style={{ display:"flex", alignItems:"center", gap:2, flexShrink:0, marginLeft:4 }}>
                        <button onClick={() => updatePortfolioFromDraft(entry.id)}
                          title={`Overwrite '${entry.name}' with the current draft`}
                          aria-label={`Update '${entry.name}' from current draft`}
                          style={{ border:"none", background:"none", color:"#000000", cursor:"pointer", fontSize:13, lineHeight:1, padding:"2px 4px", borderRadius:2 }}
                          onMouseEnter={e => { e.currentTarget.style.background='#EFF6FF'; e.currentTarget.style.color='#2451CB'; }}
                          onMouseLeave={e => { e.currentTarget.style.background='none'; e.currentTarget.style.color='#000000'; }}>↻</button>
                        <button onClick={() => loadPortfolioIntoDraft(entry.id)}
                          title={`Load '${entry.name}' into the draft`}
                          aria-label={`Load '${entry.name}' into draft`}
                          style={{ border:"none", background:"none", color:"#000000", cursor:"pointer", fontSize:13, lineHeight:1, padding:"2px 4px", borderRadius:2 }}
                          onMouseEnter={e => { e.currentTarget.style.background='#EFF6FF'; e.currentTarget.style.color='#2451CB'; }}
                          onMouseLeave={e => { e.currentTarget.style.background='none'; e.currentTarget.style.color='#000000'; }}>📥</button>
                        <button onClick={() => removeFromPortfolio(entry.id)}
                          title="Remove from portfolio"
                          aria-label={`Remove '${entry.name}' from portfolio`}
                          style={{ border:"none", background:"none", color:"#CBD5E1", cursor:"pointer", fontSize:16, lineHeight:1 }}>×</button>
                      </div>
                    </div>
                    <div style={{ fontSize:12, color:"#000000" }}>
                      {entry.taxonomyMode === 'credit' ? 'CRediT' : 'Custom'} · {activeR.length} roles · {aiRoles.length} with AI
                    </div>
                    {entry.projectName && (
                      <div style={{ fontSize:12, color:"#334155", fontWeight:600, marginTop:3 }}>
                        Project: {entry.projectName}
                      </div>
                    )}
                    <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:5 }}>
                      <div style={{ fontSize:12, color:"#000000", fontWeight:600 }}>Avg AI: {avgAI}/5</div>
                      <div style={{ flex:1, height:5, background:"#E2E8F0", borderRadius:3, overflow:"hidden" }}>
                        <div style={{ height:"100%", background:"#7C3AED", borderRadius:3, width: `${(parseFloat(avgAI)/5)*100}%`, transition:"width 0.3s" }} />
                      </div>
                    </div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginTop:7 }}>
                      {aiRoles.slice(0,8).map(r => (
                        <span key={r.id} style={{ fontSize:12, padding:"1px 6px", borderRadius:10, background:r.bg||"#F1F5F9", color:r.accent||"#000000", border:`1px solid ${r.accent||"#94A3B8"}`, fontWeight:600 }}>
                          {r.label.length > 14 ? r.label.slice(0,13)+'…' : r.label}
                        </span>
                      ))}
                      {aiRoles.length > 8 && <span style={{ fontSize:12, color:"#000000" }}>+{aiRoles.length-8} more</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Right — averaged radar */}
            <div style={{ flex:1, overflowY:"auto", padding:"22px 28px", display:"flex", flexDirection:"column", alignItems:"center" }}>
              {(() => {
                const { avgData, avgRoles } = computePortfolioAvg();
                const hasData = portfolio.length > 0;
                const nRolesWithAI = avgRoles.filter(r => (avgData[r.id]?.extent||0) > 0).length;
                const overallAvg = nRolesWithAI > 0
                  ? (avgRoles.filter(r => (avgData[r.id]?.extent||0)>0).reduce((s,r) => s+(avgData[r.id]?.extent||0), 0) / nRolesWithAI).toFixed(1)
                  : '0.0';
                return (
                  <>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", width:"100%", maxWidth:560, marginBottom:10 }}>
                      <div>
                        <h2 style={{ fontSize:16, fontWeight:700, color:"#1E293B", margin:0 }}>Portfolio Average</h2>
                        <p style={{ fontSize:12, color:"#000000", margin:"3px 0 0" }}>
                          {hasData ? `${portfolio.length} sIfA${portfolio.length>1?'s':''} · ${nRolesWithAI} role${nRolesWithAI!==1?'s':''} with AI · overall avg ${overallAvg}/2` : 'No entries yet'}
                        </p>
                      </div>
                      {hasData && (
                        <button onClick={() => portfolioRadarRef.current?.downloadSVG()}
                          style={{ padding:"7px 16px", background:"#2451CB", color:"white", border:"none", borderRadius:2, cursor:"pointer", fontWeight:600, fontSize:12, textTransform:"uppercase", letterSpacing:"0.03em" }}>
                          ⬇ Download SVG
                        </button>
                      )}
                    </div>
                    {hasData
                      ? <RadarChart ref={portfolioRadarRef} data={avgData} roles={avgRoles} fontFamily={fontFamilyById(figureFont)} humanColor={customScheme._human} aiColor={customScheme._ai} />
                      : <div style={{ width:560, height:560, display:"flex", alignItems:"center", justifyContent:"center", background:"#F8FAFC", border:"1px dashed #CBD5E1", borderRadius:8, color:"#000000", fontSize:14 }}>
                          Add sIfAs to see the averaged radar
                        </div>
                    }
                    {hasData && (
                      <div style={{ maxWidth:560, width:"100%", marginTop:16, padding:"12px 16px", background:"#F8FAFC", borderRadius:4, border:"1px solid #E2E8F0", fontSize:12, color:"#000000", lineHeight:1.6 }}>
                        <strong style={{ color:"#000000" }}>How averages are calculated:</strong> Each role's average is computed only across the sIfAs in which that role was active — roles absent or skipped in an entry do not pull the average down. For roles with multiple contributors, the weighted average extent (Lead 70%, Equal 50%, Support 30%, Sole 100%) is used per entry before cross-sIfA averaging. Roles from different taxonomies are treated as distinct.
                      </div>
                    )}
                  </>
                );
              })()}
            </div>
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
