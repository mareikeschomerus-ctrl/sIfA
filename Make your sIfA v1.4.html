const CUSTOM_COLORS = [

// Build role objects from a list of labels.  Each entry may be either a plain
// string (Agent path) or a {label, desc} object (table shortcut with descriptions).
const buildCustomRoles = (entries) => entries
  .map(e => typeof e === 'string' ? { label:(e||'').trim(), desc:'' } : { label:(e?.label||'').trim(), desc:(e?.desc||'').trim() })
  .filter(e => e.label)
  .map(({ label, desc }, idx) => {
    const col = CUSTOM_COLORS[idx % CUSTOM_COLORS.length];
    const id  = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || `role_${idx}`;
    return { id, label, def: desc, bg:col.bg, accent:col.accent, border:col.border };
  });

// Merge picker entries against the taxonomy currently in use (whether CRediT
// or an existing custom list). Entries carrying an id that matches a current
// role keep that exact id and colour, so unedited roles retain all data
// already entered for them — including when the picker was seeded from the
// full CRediT list and the user only appended a new role. Entries without a
// matching id (freshly typed rows) get a new slug id and the next unused
// colour from the custom palette. Duplicate slugs are de-duplicated.
const mergeCustomRoles = (entries, currentRoles) => {
  const byId = new Map((currentRoles || []).map(r => [r.id, r]));
  const usedIds = new Set();
  const slugify = (label) => label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
  let newIdx = 0;
  return entries
    .map(e => ({ id: e.id, label:(e.label||'').trim(), desc:(e.desc||'').trim() }))
    .filter(e => e.label)
    .map(e => {
      const existing = e.id && byId.get(e.id);
      if (existing) {
        usedIds.add(existing.id);
        return { id: existing.id, label: e.label, def: e.desc, bg: existing.bg, accent: existing.accent, border: existing.border };
      }
      const base = slugify(e.label) || `role_${newIdx}`;
      let id = base, n = 1;
      while (usedIds.has(id)) { id = `${base}_${++n}`; }
      usedIds.add(id);
      const col = CUSTOM_COLORS[newIdx % CUSTOM_COLORS.length];
      newIdx++;
      return { id, label: e.label, def: e.desc, bg: col.bg, accent: col.accent, border: col.border };
    });
};

      <div style={{ display:"flex", gap:6, alignItems:"center" }}>

              width:36, height:36, borderRadius:5, cursor:"pointer",
              border:"2px solid #CBD5E1", background:"white",
              color:"#000000", opacity:0.35, fontSize:14, fontWeight:700, transition:"all 0.15s", flexShrink:0,
            }}>{i}</button>
        ))}
      </div>
    );
  }
  return (
    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
      {[1,2].map(i => {
        const filled = i <= v;
        const active = i === v;
        return (
          <button key={i} onClick={() => onChange(active ? 0 : i)}
            title={EXTENT_LABELS[i]}
            aria-label={`${active ? 'Selected' : 'Set'}: ${EXTENT_LABELS[i]}`}
            style={{
              width:36, height:36, borderRadius:5, cursor:"pointer",
              border:`2px solid ${filled ? EXTENT_COLORS[v] : "#CBD5E1"}`,
              background: filled ? EXTENT_COLORS[v] : "white",
              color: active ? "white" : "transparent",
              fontSize:16, fontWeight:700, transition:"all 0.15s", flexShrink:0,
            }}>{i}</button>
        );
      })}
    </div>
  );
}

// ── TableInput ────────────────────────────────────────────────
// Controlled local state so typing never triggers a parent re-render.
// lastCommit ref tracks what we last sent to the parent so we can
// ignore the parent echoing our own commit back as a prop change.
// External changes (e.g. agent filling a field) still sync in correctly.
function TableInput({ value, onCommit, placeholder, style, multiline, list, ariaLabel }) {
  const [local, setLocal] = React.useState(value ?? "");
  const lastCommit = React.useRef(value ?? "");
  const taRef = React.useRef(null);

  React.useEffect(() => {
    const v = value ?? "";
    // Only sync when the parent changed the value for an external reason
    // (e.g. agent interview), not as an echo of our own onBlur commit.
    if (v !== lastCommit.current) {
      lastCommit.current = v;
      setLocal(v);
    }
  }, [value]);

  // Auto-grow the textarea to fit its content (multiline mode only)
  React.useEffect(() => {
    if (multiline && taRef.current) {
      taRef.current.style.height = 'auto';
      taRef.current.style.height = taRef.current.scrollHeight + 'px';
    }
  }, [local, multiline]);

  const commit = (v) => {
    lastCommit.current = v;   // mark before calling onCommit so the echo is ignored
    onCommit(v);
  };

  if (multiline) {
    return (
      <textarea
        ref={taRef}
        value={local}
        onChange={e => setLocal(e.target.value)}
        onBlur={e => commit(e.target.value)}
        placeholder={placeholder}
        aria-label={ariaLabel || placeholder}
        rows={1}
        style={{ resize:"none", overflow:"hidden", lineHeight:1.4, fontFamily:"inherit", ...style }}
      />
    );
  }

  return (
    <input
      value={local}
      onChange={e => setLocal(e.target.value)}
      onBlur={e => commit(e.target.value)}
      onKeyDown={e => e.key === "Enter" && e.currentTarget.blur()}
      placeholder={placeholder}
      aria-label={ariaLabel || placeholder}
      list={list}
      style={style}
    />
  );
}

function Tip({ text, children, width = 280 }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{ position:"relative", display:"inline-block" }}
      onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
      {children}
      {show && (
        <span style={{
          position:"absolute", left:0, top:"100%", marginTop:4,
          background:"#1E293B", color:"white", padding:"9px 13px",
          borderRadius:6, fontSize:12, width, zIndex:200,
          lineHeight:1.55, boxShadow:"0 4px 16px rgba(0,0,0,0.3)",
          pointerEvents:"none", whiteSpace:"normal",
        }}>
          {text}
        </span>
      )}
    </span>
  );
}

// ── Radar Chart ──────────────────────────────────────────────
const SHORT = {
  conceptualization:   ["Conceptualization"],
  data_curation:       ["Data","Curation"],
  formal_analysis:     ["Formal","Analysis"],
  funding_acquisition: ["Funding","Acquisition"],
  investigation:       ["Investigation"],
  methodology:         ["Methodology"],
  project_admin:       ["Project","Admin."],
  resources:           ["Resources"],
  software:            ["Software"],

const RadarChart = React.forwardRef(function RadarChart({ data, roles: rolesProp, fontFamily, taxonomyMode, humanColor, aiColor, projectName, onSaveAsPDF }, ref) {
  const _ff = fontFamily || "'Montserrat','Segoe UI',Arial,sans-serif";
  const _humanFill = humanColor || '#DD5510';
  const _aiFill    = aiColor    || '#6E55D6';
  const _isCRediT = taxonomyMode === 'credit';
  // Trimmed project name, reused by every exporter below to add a
  // "Project: …" subtitle under the "sIfA" title when one has been set.
  const _pn = (projectName || '').trim();
  // Attribution shown beneath the figure when CRediT is the active taxonomy
  const _creditAttrib1 = "Contributor roles are based on the Contributor Role Taxonomy (CRediT).";
  const _creditAttrib2 = "More info at https://credit.niso.org";
  const svgRef = useRef(null);
  // Wraps everything EXCEPT the full-canvas white background rect, so
  // getBBox() on this group measures only the actual drawn chart content
  // (brain shape, blob, badges, labels) — calling getBBox() on the root svg
  // itself would always return the full 620×620 canvas, since that white
  // background rect spans it entirely and is included in the measurement.
  const chartContentRef = useRef(null);
  // Build the figure-only SVG string (used by saveAsPDFWithFigure)
  const _buildFigureOnlySVG = () => {
    if (!svgRef.current) return null;
    const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const ff  = `font-family="${_ff.replace(/"/g, '&quot;')}"`;
    const chartInner    = svgRef.current.innerHTML;
    // Measure the chart's actual rendered content so the crop hugs it tightly
    // regardless of axis count or label wrapping, instead of guessing at a
    // fixed margin (which left a large empty band below the chart whenever
    // few axes were present, since the topmost/bottommost label position
    // depends on how many axes there are).
    let _cropTop = 58, _cropBottom = 620;
    try {
      const _bbox = chartContentRef.current.getBBox();
      if (_bbox && _bbox.height > 0) {
        _cropTop = Math.max(0, _bbox.y - 12);
        _cropBottom = Math.min(620, _bbox.y + _bbox.height + 12);
      }
    } catch (e) { /* getBBox unavailable — keep the fixed fallback crop */ }
    const _cropH = _cropBottom - _cropTop;
    const aiActiveRoles = roles.filter(r => (data[r.id]?.extent||0) > 0);
    const totalAI       = aiActiveRoles.reduce((s,r) => s+(data[r.id]?.extent||0), 0);
    const avgExt        = aiActiveRoles.length > 0 ? (totalAI/aiActiveRoles.length).toFixed(1) : '0.0';
    const W = 720;
    const headerH = _pn ? 64 : 46;  // extra room for the "Project: …" subtitle when set
    const chartScale = (W - 20) / 670;
    const chartW = Math.round(670 * chartScale);
    const chartH = Math.round(_cropH * chartScale);  // cropped viewBox trims the chart's own empty top/bottom margin
    const chartOffX = Math.round((W - chartW) / 2);
    const chartOffY = headerH;
    const capY = chartOffY + chartH + 10;
    const capH = 74;
    const stmtY = capY + capH + 14;
    const stmtH = _isCRediT ? 54 : 40;
    const _legGroupStart = Math.round(W/2) - 165;
    const H = stmtY + stmtH + 12;
    let body = `<rect width="${W}" height="${H}" fill="white"/>`;
    body += `<text x="${W/2}" y="40" text-anchor="middle" ${ff} font-size="28.0" font-weight="700" fill="#1E293B">sIfA</text>`;
    if (_pn) body += `<text x="${W/2}" y="58" text-anchor="middle" ${ff} font-size="14.0" font-weight="600" fill="#334155">Project: ${esc(_pn)}</text>`;
    body += `<svg x="${chartOffX}" y="${chartOffY}" width="${chartW}" height="${chartH}" viewBox="-25 ${_cropTop} 670 ${_cropH}" xmlns="http://www.w3.org/2000/svg">${chartInner}</svg>`;
    body += `<line x1="20" y1="${capY - 4}" x2="${W-20}" y2="${capY - 4}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    body += `<text x="${W/2}" y="${capY + 13}" text-anchor="middle" ${ff} font-size="13.5" fill="#000000">AI interaction across contributor roles</text>`;
    body += `<text x="${W/2}" y="${capY + 29}" text-anchor="middle" ${ff} font-size="13.5" fill="#000000">${aiActiveRoles.length} role${aiActiveRoles.length!==1?'s':''} with AI interaction · average extent ${avgExt}/2</text>`;
    body += `<rect x="${_legGroupStart}" y="${capY + 42}" width="26" height="18" fill="${_humanFill}" opacity="0.72" rx="2"/>`;
    body += `<text x="${_legGroupStart + 34}" y="${capY + 56}" ${ff} font-size="15.0" font-weight="600" fill="#000000">Outer ring = Human</text>`;
    body += `<rect x="${_legGroupStart + 208}" y="${capY + 42}" width="26" height="18" fill="${_aiFill}" opacity="0.72" rx="2"/>`;
    body += `<text x="${_legGroupStart + 242}" y="${capY + 56}" ${ff} font-size="15.0" font-weight="600" fill="#000000">Centre = AI</text>`;
    body += `<text x="${W/2}" y="${capY + 76}" text-anchor="middle" ${ff} font-size="13.0" font-style="italic" fill="#000000">Each axis = one contributor role</text>`;
    const stmtLine1 = "After using any tools or services, the author(s) reviewed and edited";
    const stmtLine2 = "the content as needed and take(s) full responsibility for the content of the publication.";
    body += `<line x1="20" y1="${stmtY - 6}" x2="${W-20}" y2="${stmtY - 6}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    body += `<text x="${W/2}" y="${stmtY + 8}" text-anchor="middle" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(stmtLine1)}</text>`;
    body += `<text x="${W/2}" y="${stmtY + 22}" text-anchor="middle" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(stmtLine2)}</text>`;
    if (_isCRediT) {
      body += `<text x="${W/2}" y="${stmtY + 38}" text-anchor="middle" ${ff} font-size="11" fill="#000000">${esc(_creditAttrib1)}</text>`;
    }
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${body}</svg>`;
  };
  const roles = rolesProp || ROLES;
  const getShortLabel = (r) => {
    if (SHORT[r.id]) return SHORT[r.id];
    const words = r.label.split(' ');
    if (words.length <= 1) return [r.label];
    const mid = Math.ceil(words.length / 2);
    return [words.slice(0, mid).join(' '), words.slice(mid).join(' ')];
  };
  const cx = 310, cy = 310;
  // dataR = max data radius (val=5 maps here); outer brain ring beyond this is always human
  const dataR = 148;
  // Show all roles visible in the table (non-skipped)
  const activeRoles = roles.filter(r => !data[r.id]?.skipped);
  // Only roles that have actually been filled in (a contributor added, an
  // extent set, a tool named, or a reason written) appear as axes — the
  // figure divides evenly across just those. Falls back to all active roles
  // if nothing has been entered yet, so a brand-new sIfA doesn't render a
  // blank chart with zero axes.
  const filledRoles = activeRoles.filter(r => {
    const d = data[r.id] || {};
    return (d.contributors||[]).length > 0 || d.extent > 0 || d.tool || d.reason;
  });
  const displayRoles = filledRoles.length > 0 ? filledRoles : activeRoles;
  const N = displayRoles.length;
  const ang = i => (i * 2 * Math.PI / N) - Math.PI / 2;

  // val=0 → centre, val=2 → dataR
  const pt = (i, val) => ({
    x: cx + (val / 2) * dataR * Math.cos(ang(i)),
    y: cy + (val / 2) * dataR * Math.sin(ang(i)),
  });

  // Organic ring at fraction of dataR — gently wobbled to mimic brain tissue layers
  const organicRing = frac => {
    const npts = 120;
    const r = frac * dataR;
    return Array.from({length: npts}, (_, i) => {
      const a = (i / npts) * 2 * Math.PI;
      const wobble = 3.2 * Math.sin(a * 5 + frac * 8.3)
                   + 2.1 * Math.sin(a * 3 - frac * 5.1)
                   + 1.4 * Math.sin(a * 7 + frac * 3.7);
      const ri = r + wobble;
      return `${i===0?"M":"L"}${(cx + ri*Math.cos(a)).toFixed(1)},${(cy + ri*Math.sin(a)).toFixed(1)}`;
    }).join(" ") + " Z";
  };

  // ── Brain silhouette — lateral (side) view, closer to classic engraved illustration ──
  // Elliptical base (wider horizontally). Frontal lobe faces left. Temporal lobe bulges
  // downward at ~5:30. Pronounced gyri along top. Deep Sylvian fissure notch at lower-left.
  // All radii clamped to ≥157 so the outer "always-human" ring is always visible.
  const brainPath = (() => {
    const nPts = 400;
    const bCx = cx + 4, bCy = cy - 8; // slightly right/up to better frame the chart
    const pts = [];
    for (let i = 0; i <= nPts; i++) {
      const t = (i / nPts) * 2 * Math.PI - Math.PI / 2; // 0 at top, clockwise
      const cosT = Math.cos(t), sinT = Math.sin(t);
      // True ellipse base: semi-major 188 (horizontal) × semi-minor 162 (vertical)
      const a = 188, b = 162;
      let r = (a * b) / Math.sqrt(b*b*cosT*cosT + a*a*sinT*sinT);
      // Frontal lobe (left, t ≈ ±π) is slightly flatter than occipital
      const dFrontal = Math.abs(Math.abs(t) - Math.PI);
      r -= 13 * Math.exp(-Math.pow(dFrontal / 0.52, 2));
      // Temporal lobe — downward bulge at ~5:30 o'clock (t ≈ 1.28)
      r += 14 * Math.exp(-Math.pow((t - 1.28) / 0.50, 2));
      // Primary gyri — 8 prominent bumps, most visible along top arc
      r += 17 * Math.sin(t * 8 + 1.05);
      // Secondary gyri detail
      r += 7  * Math.sin(t * 14 - 0.85);
      // Lobe-scale undulations
      r += 6  * Math.sin(t * 4  + 1.95);
      // Fine cortical texture
      r += 3  * Math.sin(t * 22 + 0.65);
      // Sylvian fissure — deep notch at ~7:45 o'clock (t ≈ 2.18)
      r -= 26 * Math.exp(-Math.pow((t - 2.18) / 0.30, 2));
      // Hard floor: brain never closer than 157px from centre
      r = Math.max(r, 157);
      pts.push({ x: bCx + r * cosT, y: bCy + r * sinT });
    }
    return pts.map((p, i) => `${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ") + " Z";
  })();


  // ── Inner boundary circle at dataR — for the outer "always human" ring ──
  const innerCirclePath = (() => {
    const npts = 40;
    return Array.from({length: npts}, (_, i) => {
      const a = (i / npts) * 2 * Math.PI;
      return `${i===0?"M":"L"}${(cx + dataR*Math.cos(a)).toFixed(1)},${(cy + dataR*Math.sin(a)).toFixed(1)}`;
    }).join(" ") + " Z";
  })();

  // Outer ring = brain minus inner circle (evenodd → fills only the ring)
  const outerRingPath = brainPath + " " + innerCirclePath;

  // ── Smooth-blob helper: catmull-rom spline through polygon vertices ──
  const _smoothBlob = (pts, tension = 0.35) => {
    const n = pts.length;
    if (n < 2) return 'M0,0Z';
    let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i-1+n)%n], p1 = pts[i], p2 = pts[(i+1)%n], p3 = pts[(i+2)%n];
      const c1x = (p1.x + (p2.x-p0.x)*tension/2).toFixed(1);
      const c1y = (p1.y + (p2.y-p0.y)*tension/2).toFixed(1);
      const c2x = (p2.x - (p3.x-p1.x)*tension/2).toFixed(1);
      const c2y = (p2.y - (p3.y-p1.y)*tension/2).toFixed(1);
      d += ` C${c1x},${c1y} ${c2x},${c2y} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
    }
    return d + ' Z';
  };

  // ── AI blob — smooth curved path connecting active role data tips ──
  const totalAI = displayRoles.reduce((s, r) => s + (data[r.id]?.extent || 0), 0);
  const avgAI   = (totalAI / N).toFixed(1);

  // Each axis contributes three points (a small angular "shoulder" either
  // side of the axis, plus the axis itself) instead of one, at the same
  // radius. A lone value of 1 next to two 0s used to be a single point the
  // spline curve pulled down to almost nothing on both sides — barely
  // visible once blurred. The shoulder gives that value a small plateau to
  // curve from, so it reads as a clear wedge rather than a vanishing spike,
  // while the curve between axes (and the blur) still keeps every edge
  // soft. The shoulder angle is capped relative to the axis spacing so it
  // can never overlap a neighbouring axis's own shoulder, however many
  // roles are active.
  const _blobPts = (getVal) => {
    const shoulder = Math.min(0.12, (Math.PI / N) * 0.6);
    const pts = [];
    displayRoles.forEach((r, i) => {
      const rad = (getVal(r) / 2) * dataR;
      if (rad <= 0) { pts.push({ x: cx, y: cy }); return; }
      const a = ang(i);
      pts.push({ x: cx + rad * Math.cos(a - shoulder), y: cy + rad * Math.sin(a - shoulder) });
      pts.push({ x: cx + rad * Math.cos(a),            y: cy + rad * Math.sin(a) });
      pts.push({ x: cx + rad * Math.cos(a + shoulder), y: cy + rad * Math.sin(a + shoulder) });
    });
    return pts;
  };

  const _aiPts = _blobPts(r => data[r.id]?.extent || 0);
  const aiBlob = _smoothBlob(_aiPts, 0.5);

  // ── 4-pointed sparkle shape centred at (x,y) with outer radius r ──
  // Mimics the AI ✦ sparkle: 4 long points at N/E/S/W, narrow waist between them.
  const sparklePt = (x, y, r) => {
    const inner = r * 0.18;
    return Array.from({length: 8}, (_, k) => {
      const a = (k * Math.PI / 4) - Math.PI / 2;
      const rad = k % 2 === 0 ? r : inner;
      return `${k===0?"M":"L"}${(x + rad*Math.cos(a)).toFixed(1)},${(y + rad*Math.sin(a)).toFixed(1)}`;
    }).join(" ") + " Z";
  };

  // Label positions — just outside brain boundary (~215 clears the outermost gyri)
  const labelPt = i => {
    const a = ang(i), r = 215;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), a };
  };
  const anchor = a => {
    const c = Math.cos(a);
    return c > 0.15 ? "start" : c < -0.15 ? "end" : "middle";
  };

  // Build a timestamp suffix like "2026-05-16_1734" — used so every export gets a unique
  // filename, preventing old downloads from being mistaken for new ones.
  const _stamp = () => {
    const d = new Date();
    const z = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}`;
  };

  // Rasterise a built SVG string to a downloadable JPEG (2× pixel density).
  const _rasteriseToJPEG = (svgStr, W, H, baseName) => {
    const scale = 2;
    const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = W * scale;
      canvas.height = H * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        if (!blob) { alert('Could not generate JPEG.'); return; }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${baseName} ${_stamp()}.jpg`;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/jpeg', 0.92);
    };
    img.onerror = () => { URL.revokeObjectURL(url); alert('Could not render figure to JPEG.'); };
    img.src = url;
  };

  // Pre-flight check: at least one Lead, Equal or Sole must exist among
  // listed contributors. A sIfA with only Support contributors is invalid —
  // someone has to be the lead. Returns true if download may proceed.
  const validateBeforeDownload = () => {
    const allContribs = roles.flatMap(r => (data[r.id]?.contributors || []));
    if (allContribs.length === 0) return true; // nothing to validate
    const hasNonSupport = allContribs.some(c => c.level && c.level !== 'Support');
    if (!hasNonSupport) {
      alert("Cannot export: every listed contributor is marked Support. At least one contributor must be Lead, Equal, or Sole. Please update at least one contributor's level before exporting.");
      return false;
    }
    return true;
  };

  // ── Figure-only download: standalone SVG of just the radar figure,
  //    with the citation embedded so the figure is fully self-describing.
  //    format: 'svg' (default) or 'jpeg'
  const downloadFigureOnly = (format = 'svg') => {
    if (!validateBeforeDownload()) return;
    if (!svgRef.current) { alert('Figure not ready — please open the sIfA figure panel once before exporting.'); return; }
    try {
    const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const ff  = `font-family="${_ff.replace(/"/g, '&quot;')}"`;

    const chartInner    = svgRef.current.innerHTML;
    // Measure the chart's actual rendered content so the crop hugs it tightly
    // regardless of axis count or label wrapping (see comment in
    // _buildFigureOnlySVG above for why a fixed guess doesn't work here).
    let _cropTop = 58, _cropBottom = 620;
    try {
      const _bbox = chartContentRef.current.getBBox();
      if (_bbox && _bbox.height > 0) {
        _cropTop = Math.max(0, _bbox.y - 12);
        _cropBottom = Math.min(620, _bbox.y + _bbox.height + 12);
      }
    } catch (e) { /* getBBox unavailable — keep the fixed fallback crop */ }
    const _cropH = _cropBottom - _cropTop;
    const aiActiveRoles = roles.filter(r => (data[r.id]?.extent||0) > 0);
    const totalAI       = aiActiveRoles.reduce((s,r) => s+(data[r.id]?.extent||0), 0);
    const avgExt        = aiActiveRoles.length > 0 ? (totalAI/aiActiveRoles.length).toFixed(1) : '0.0';

    const W = 720;
    // Header contains the 'sIfA' title, plus a "Project: …" subtitle when set.
    const headerH = _pn ? 64 : 46;
    // Chart viewBox width stays fixed (role labels span x ∈ [-17, 637] at
    // radius 215, so -25..645 gives ~8px breathing room on each side); the
    // height is cropped dynamically to the measured content above.
    const chartScale = (W - 20) / 670;
    const chartW = Math.round(670 * chartScale);
    const chartH = Math.round(_cropH * chartScale);  // cropped viewBox trims the chart's own empty top/bottom margin
    const chartOffX = Math.round((W - chartW) / 2);
    const chartOffY = headerH;
    // Caption block beneath the figure: counts (2 lines) + legend (2 lines)
    const capY = chartOffY + chartH + 10;
    const capH = 80;
    const stmtY = capY + capH + 14;
    const stmtH = 38;
    // CRediT attribution sits between the disclaimer and the citation block when active.
    const attribH = _isCRediT ? 32 : 0;
    // Citation block — wrap long lines (URLs included) at safe character widths so
    // nothing ever gets clipped at the right edge of the figure, regardless of font.
    const wrapLines = (txt, maxCh) => {
      const words = txt.split(' ');
      const out = []; let cur = '';
      for (const w of words) {
        const cand = cur ? cur + ' ' + w : w;
        if (cand.length <= maxCh) { cur = cand; }
        else { if (cur) out.push(cur); cur = w; }
      }
      if (cur) out.push(cur);
      return out;
    };
    // Footer block in three logical parts (new ordering): citation first, then website, then licence
    const _citationLines = wrapLines(`This sIfA was created using: Schomerus, M. (${APP_YEAR}). sIfA Tool - Statement of Intellectual Fellowship and Accountability (Version ${APP_VERSION}) [Computer software]. Busara. https://doi.org/10.5281/zenodo.20285993`, 80);
    const _websiteLines  = wrapLines(`The sIfA tool can be used and downloaded at www.busara.global or at https://github.com/mareikeschomerus-ctrl/sIfA.`, 90);
    const _licenceLine   = `Released under the Apache License 2.0`;
    const citY  = stmtY + stmtH + attribH + 14;
    // citH grows with the number of wrapped lines so the box always fits its content
    const citH  = 12 + (_citationLines.length * 14) + 14 + (_websiteLines.length * 14) + 8 + 14 + 12;
    const H     = citY + citH + 20;

    let body = '';
    body += `<rect width="${W}" height="${H}" fill="white"/>`;

    // Title block — sIfA, plus a Project subtitle when set
    body += `<text x="${W/2}" y="40" text-anchor="middle" ${ff} font-size="28.0" font-weight="700" fill="#1E293B">sIfA</text>`;
    if (_pn) body += `<text x="${W/2}" y="58" text-anchor="middle" ${ff} font-size="14.0" font-weight="600" fill="#334155">Project: ${esc(_pn)}</text>`;

    // Chart
    body += `<svg x="${chartOffX}" y="${chartOffY}" width="${chartW}" height="${chartH}" viewBox="-25 ${_cropTop} 670 ${_cropH}" xmlns="http://www.w3.org/2000/svg">${chartInner}</svg>`;

    // Caption block — counts and legend below the figure
    body += `<line x1="20" y1="${capY - 4}" x2="${W-20}" y2="${capY - 4}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    body += `<text x="${W/2}" y="${capY + 12}" text-anchor="middle" ${ff} font-size="12" fill="#000000">AI interaction across contributor roles</text>`;
    body += `<text x="${W/2}" y="${capY + 27}" text-anchor="middle" ${ff} font-size="12" fill="#000000">${aiActiveRoles.length} role${aiActiveRoles.length!==1?'s':''} with AI interaction · average extent ${avgExt}/2</text>`;
    const _legGroupStart = Math.round(W/2) - 140;
    body += `<rect x="${_legGroupStart}" y="${capY + 40}" width="16" height="12" fill="${_humanFill}" opacity="0.72" rx="2"/>`;
    body += `<text x="${_legGroupStart + 22}" y="${capY + 50}" ${ff} font-size="12" fill="#000000">Outer ring = Human</text>`;
    body += `<rect x="${_legGroupStart + 168}" y="${capY + 40}" width="16" height="12" fill="${_aiFill}" opacity="0.72" rx="2"/>`;
    body += `<text x="${_legGroupStart + 190}" y="${capY + 50}" ${ff} font-size="12" fill="#000000">Centre = AI</text>`;
    body += `<text x="${W/2}" y="${capY + 66}" text-anchor="middle" ${ff} font-size="12" font-style="italic" fill="#000000">Each axis = one contributor role</text>`;

    // Disclaimer — compact single-block
    body += `<line x1="40" y1="${stmtY - 4}" x2="${W-40}" y2="${stmtY - 4}" stroke="#E2E8F0" stroke-width="0.6"/>`;
    const stmtLine1 = "After using any tools or services, the author(s) reviewed and edited the content as needed and";
    const stmtLine2 = "take(s) full responsibility for the content of the publication.";
    body += `<text x="${W/2}" y="${stmtY + 6}" text-anchor="middle" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(stmtLine1)}</text>`;
    body += `<text x="${W/2}" y="${stmtY + 20}" text-anchor="middle" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(stmtLine2)}</text>`;

    // CRediT attribution — only when the active taxonomy is CRediT
    if (_isCRediT) {
      const attrY = stmtY + stmtH + 6;
      body += `<text x="${W/2}" y="${attrY}" text-anchor="middle" ${ff} font-size="12" fill="#000000">${esc(_creditAttrib1)}</text>`;
      body += `<text x="${W/2}" y="${attrY + 14}" text-anchor="middle" ${ff} font-size="12" fill="#000000">More info at <tspan font-weight="600" fill="#2451CB">https://credit.niso.org</tspan></text>`;
    }

    // Citation block — emit wrapped lines from the arrays computed above (citation → website → licence)
    body += `<line x1="20" y1="${citY - 8}" x2="${W-20}" y2="${citY - 8}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    {
      let _y = citY + 12;
      _citationLines.forEach(line => {
        body += `<text x="20" y="${_y}" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(line)}</text>`;
        _y += 14;
      });
      _y += 6;
      _websiteLines.forEach(line => {
        body += `<text x="20" y="${_y}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
        _y += 14;
      });
      _y += 4;
      body += `<text x="20" y="${_y}" ${ff} font-size="12" fill="#000000">${esc(_licenceLine)}</text>`;
      _y += 16;
      body += `<text x="20" y="${_y}" ${ff} font-size="12" fill="#000000">Generated ${_stamp().replace('_', ' ').replace(/(\d{2})$/, ':$1')}</text>`;
    }

    // ── Structured metadata block (machine-readable JSON inside SVG <metadata>) ──
    // Mirrors the metadata embedded in the Table+Figure export so the figure-only
    // download is also fully self-describing for downstream tooling.
    const metaObj = {
      schema: "CRediT Contributor Role Taxonomy — https://credit.niso.org/",
      tool: "sIfA AI Contribution Statement Tool",
      toolVersion: APP_VERSION,
      doi: "10.5281/zenodo.20285993",
      generated: new Date().toISOString(),
      extentScale: "0 = no AI use · 1 = some AI use · 2 = extensive AI use",
      roles: roles.map(r => {
        const d = data[r.id];
        return {
          id: r.id,
          label: r.label,
          definition: r.def,
          contributors: (d.contributors||[]).map(c => ({
            name: c.name,
            level: c.level || null,
            aiTool: c.tool || null,
            reason: c.reason || null,
            extent: c.extent || 0,
            extentLabel: EXTENT_LABELS[c.extent || 0],
          })),
          aiTool: d.tool || null,
          reason: d.reason || null,
          extent: d.extent,
          extentLabel: EXTENT_LABELS[d.extent],
        };
      }),
    };
    const metaJSON = JSON.stringify(metaObj, null, 2);

    const svgStr = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:sifa="https://credit.niso.org/sifa"
     viewBox="0 0 ${W} ${H}"
     width="${W}" height="${H}"
     style="font-family: ${_ff}">
  <metadata>
    <sifa:AIContributionStatement>
      <![CDATA[${metaJSON}]]>
    </sifa:AIContributionStatement>
  </metadata>
${body}
</svg>`;

    if (format === 'jpeg') {
      _rasteriseToJPEG(svgStr, W, H, 'sIfA Figure');
    } else {
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `sIfA Figure ${_stamp()}.svg`;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }
    } catch(err) { console.error('downloadFigureOnly error:', err); alert('Export failed: ' + err.message); }
  };

  const downloadSVG = (format = 'svg') => {
    if (!validateBeforeDownload()) return;
    if (!svgRef.current) { alert("Figure not ready — please open the sIfA figure panel once before exporting."); return; }
    try {
    // ── Composite SVG: table (left) + chart (right) ──
    const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const ff  = `font-family="${_ff.replace(/"/g, '&quot;')}"`;
    const shorten = (s, n) => s && s.length > n ? s.slice(0, n-1)+'…' : (s||'');

    // Extent colour scale (matches EXTENT_COLORS)
    const dlExtColors = ["","#8C78E0","#3B1D7F"];
    const dlExtLabel = v => {
      const rv = parseFloat(v) || 0;
      if (rv === 0)   return "No AI use";
      if (rv <= 0.5)  return "Minimal AI use";
      if (rv <= 1)    return "Some AI use";
      if (rv <= 1.5)  return "Considerable AI use";
      return "Extensive AI use";
    };
    // Two squares showing AI extent — cumulative fill (level 2 colours both
    // squares, like a level meter) but the number is exclusive: only the
    // square matching the rounded extent level carries its digit, at a
    // bigger footprint for print legibility. At extent 0, renders a plain
    // "0" (no box) instead of two empty squares.
    const extSq = (sx, sy, val, sq=14) => {
      const rv = Math.round(parseFloat(val) || 0);
      if (rv === 0) {
        return `<text x="${sx}" y="${(sy+sq*0.72).toFixed(1)}" ${ff} font-size="13" font-weight="700" fill="#000000">0</text>`;
      }
      return [1,2].map((k, idx) => {
        const filled = k <= rv;
        const active = k === rv;
        const x = sx + idx * (sq + 4);
        const fill = filled ? dlExtColors[rv] : "#E2E8F0";
        const stroke = filled ? dlExtColors[rv] : "#CBD5E1";
        const rect = `<rect x="${x.toFixed(1)}" y="${sy}" width="${sq}" height="${sq}" rx="2" fill="${fill}" stroke="${stroke}" stroke-width="1"/>`;
        const label = active
          ? `<text x="${(x+sq/2).toFixed(1)}" y="${(sy+sq/2+4).toFixed(1)}" text-anchor="middle" ${ff} font-size="${Math.round(sq*0.65)}" font-weight="700" fill="white">${k}</text>`
          : '';
        return rect + label;
      }).join('');
    };

    // ── Helpers: full word-wrap for table cells ──
    // wrapLines splits text on word boundaries and never truncates — a
    // single overlong word is hard-broken with a hyphen instead of an
    // ellipsis so no information is silently lost.
    const wrapLines = (txt, maxCh) => {
      if (!txt && txt !== 0) return [];
      const words = String(txt).split(/\s+/).filter(Boolean);
      const out = []; let cur = '';
      for (const w of words) {
        const cand = cur ? cur + ' ' + w : w;
        if (cand.length <= maxCh) { cur = cand; continue; }
        if (cur) { out.push(cur); cur = ''; }
        let rest = w;
        while (rest.length > maxCh) {
          out.push(rest.slice(0, maxCh - 1) + '-');
          rest = rest.slice(maxCh - 1);
        }
        cur = rest;
      }
      if (cur) out.push(cur);
      return out;
    };
    // Role labels — preserves the existing em-dash split so labels like
    // "Writing – original draft" break at the dash rather than mid-word.
    const wrapRoleLabel = (lbl) => {
      if (!lbl) return [''];
      if (lbl.length <= 18) return [lbl];
      const di = lbl.indexOf(' – ');
      if (di > 0 && di <= 18) {
        const a = lbl.slice(0, di + 2);     // includes the " –"
        const b = lbl.slice(di + 3);
        return [a, ...wrapLines(b, 18)];
      }
      return wrapLines(lbl, 18);
    };
    // wrapSvg kept as a thin adapter so existing call-sites still work.
    const wrapSvg = (txt, maxCh, x, startY, dy, attrs) =>
      wrapLines(txt, maxCh)
        .map((l,i) => `<text x="${x}" y="${startY + i*dy}" ${attrs}>${esc(l)}</text>`)
        .join('');

    // Only include roles that have any data (skip blank and explicitly-skipped rows)
    const dlRoles = roles.filter(role => {
      const d = data[role.id];
      if (d.skipped) return false;
      const cs = d.contributors || [];
      return cs.length > 0 || d.extent > 0 || d.tool || d.reason;
    });

    // Dynamic row heights — every text column wraps, and each row grows
    // to fit the tallest cell so no information is clipped.
    const tHdrH = 74, tTitleH = 34;  // header a bit taller to fit the Extent column's 2-line title + 3-line hint stack; title bar shorter now that the subtitle shares its single line
    const tBodyY = tTitleH + tHdrH;
    // Approximate character widths tuned to the table column widths below.
    // (Sans-serif at the given font size; conservative enough that
    // wrapping never overshoots the column boundary visually.)
    // Widths retuned for the new column proportions: How-was-AI is now the
    // widest text column (was narrower than Tool/Service, then widened again
    // when the Extent column was narrowed), so it gets more characters per
    // line; Tool/Service is narrower than before.
    const CH = { nameMulti: 22, nameSingle: 24,
                 auditMulti: 41, auditSingle: 44,
                 toolMulti:  17, toolSingle:  19 };
    const LH = { role: 16, name: 14, level: 13, audit: 13, tool: 13 };
    const layouts = dlRoles.map(role => {
      const d = data[role.id] || {};
      const contribs = d.contributors || [];
      const roleLines = wrapRoleLabel(role.label);
      if (contribs.length >= 1) {
        const multi = contribs.length > 1;
        const subRows = contribs.map(c => {
          // In multi-contributor mode the level abbreviation is inlined
          // with the name so it shares the column; in single mode the
          // full word sits on its own line beneath.
          const lvlAbbr = c.level === 'Sole' ? 'So' : (c.level ? c.level[0] : '');
          const nameTxt = multi && lvlAbbr
            ? `${c.name || ''} (${lvlAbbr})`
            : (c.name || '');
          const nameLines  = wrapLines(nameTxt, multi ? CH.nameMulti  : CH.nameSingle);
          const showLevel  = !multi && !!c.level;
          const reasonRaw  = c.reason || (!multi ? (d.reason || '') : '');
          const toolRaw    = c.tool   || (!multi ? (d.tool   || '') : '');
          const reasonLines= wrapLines(reasonRaw, multi ? CH.auditMulti : CH.auditSingle);
          const toolLines  = wrapLines(toolRaw,   multi ? CH.toolMulti  : CH.toolSingle);
          const nameH  = nameLines.length * LH.name + (showLevel ? LH.level : 0);
          const auditH = reasonLines.length * LH.audit;
          const toolH  = toolLines.length * LH.tool;
          const height = Math.max(nameH, auditH, toolH, 28) + 6;
          return { nameLines, showLevel, levelText: c.level || '',
                   reasonLines, toolLines, extent: c.extent || 0, height };
        });
        const bodyH = subRows.reduce((s, sr) => s + sr.height, 0) + 12;
        const height = Math.max(bodyH, roleLines.length * LH.role + 16, 44);
        return { type: multi ? 'multi' : 'single', roleLines, subRows, height };
      }
      // No contributors — just row-level extent/reason/tool.
      const reasonLines = wrapLines(d.reason || '', CH.auditSingle);
      const toolLines   = wrapLines(d.tool   || '', CH.toolSingle);
      const bodyH = Math.max(reasonLines.length * LH.audit,
                             toolLines.length   * LH.tool, 28) + 16;
      const height = Math.max(bodyH, roleLines.length * LH.role + 16, 44);
      return { type: 'none', roleLines, reasonLines, toolLines,
               extent: d.extent || 0, height };
    });
    const rowHeights = layouts.map(L => L.height);
    const totalTableBodyH = rowHeights.reduce((s,h) => s+h, 0);

    // Footer text metrics (citation, website, licence, generated-timestamp) —
    // computed early so the overall panel height (H) and the vertical
    // centering of the row block below can both account for its real size
    // rather than a rough guess.
    const _wrapToLines = (txt, maxCh) => {
      const words = txt.split(' '); const out = []; let cur = '';
      for (const w of words) {
        const cand = cur ? cur + ' ' + w : w;
        if (cand.length <= maxCh) cur = cand;
        else { if (cur) out.push(cur); cur = w; }
      }
      if (cur) out.push(cur);
      return out;
    };
    const _websiteLine  = `The sIfA tool can be used and downloaded at www.busara.global or at https://github.com/mareikeschomerus-ctrl/sIfA.`;
    const _licenceLine  = `Released under the Apache License 2.0`;
    const _citationFull = `This sIfA was created using: ${CITATION_TEXT}`;
    const _wLines = _wrapToLines(_websiteLine, 130);
    const _cLines = _wrapToLines(_citationFull, 110);
    // Vertical span of the footer block, from its first line's baseline to its last.
    const footerSpan = (_cLines.length * 14) + 6 + (_wLines.length * 14) + 4 + 16;
    const footerMargin = 16;   // breathing room below the footer's last line
    const footerGapAboveRows = 12;  // gap between the last table row and the footer block

    // Layout: figure on the LEFT (smaller), table on the RIGHT (wider).
    // rightW (table) widened so columns no longer clip; rightW (figure) shrunk so it
    // doesn't dominate the page and there's no wasted whitespace on the right.
    const W = 1300;
    const rightW = 520;                    // figure panel (left side)
    const leftW  = W - rightW - 6;         // table panel (right side); 6px gap+divider
    const divX = rightW + 2, rightX = rightW + 6;
    // Match the chart embed's tighter viewBox so the pre-computed chart height
    // used for the overall figure-height calculation tracks the chart's
    // actual rendered height (otherwise the layout leaves a gap between the
    // chart and the caption block beneath it).
    // Measure the chart's actual rendered content so the crop hugs it tightly
    // regardless of axis count or label wrapping — a fixed guess left a large
    // empty band below the chart whenever few axes were present, since the
    // topmost/bottommost label position depends on how many axes exist.
    let _cropTop = 58, _cropBottom = 620;
    try {
      const _bbox = chartContentRef.current.getBBox();
      if (_bbox && _bbox.height > 0) {
        _cropTop = Math.max(0, _bbox.y - 12);
        _cropBottom = Math.min(620, _bbox.y + _bbox.height + 12);
      }
    } catch (e) { /* getBBox unavailable — keep the fixed fallback crop */ }
    const _cropH = _cropBottom - _cropTop;
    const _chartScale = (rightW - 20) / 670;
    const _chartH = Math.round(_cropH * _chartScale);  // cropped viewBox trims the chart's own empty top/bottom margin
    const _chartOffY = _pn ? 64 : 46;      // chart starts just under the 'sIfA' title (+ Project subtitle when set)
    // Bottom block on the figure side, condensed: caption+legend (~88) + disclaimer
    // (~30) + CRediT attribution (~30, only when active) + a little safety margin.
    const _stmtH = (_isCRediT ? 172 : 142);
    // Table-side minimum uses the real footer size (computed above) instead of a
    // flat guess, so the table panel doesn't reserve more room than it needs.
    const tableSideMinH = tBodyY + totalTableBodyH + footerGapAboveRows + footerSpan + footerMargin;
    const H = Math.max(_chartOffY + _chartH + _stmtH, tableSideMinH);

    // Column edges within the (wider) table panel. "How was AI used" carries
    // the most text of any column, so it gets the most room; Tool/Service
    // (mostly short model/service names) is narrower to make space for it.
    // Extent column narrowed to just fit its two boxes plus a single-line
    // title — the gained width goes to "How was AI used", which carries the
    // most text of any column.
    const cX = [0, 130, 280, 380, 630];  // Role 130 · Performed-by 150 · Extent 100 · How-was-AI 250 · Tool/Service 144
    // Each entry is either a single-line string or an array of lines (rendered stacked).
    const colNames = [
      taxonomyMode === 'credit' ? 'CRediT Role' : 'Role',
      'Performed by',
      ['Extent of AI', 'interaction'],
      ['How was AI used?', 'Audit trail?'],
      'Tool / Service',
    ];
    // Explanatory sub-line under the Extent column's header, one level per
    // line so it fits the narrower column instead of one long dotted phrase.
    const extentColHint = ['0 none', '1 some', '2 extensive'];

    let left = '';
    left += `<rect width="${leftW}" height="${H}" fill="white"/>`;
    // Title bar — clean white with black text; the subtitle now sits on the
    // same line as the title (smaller, regular weight) rather than its own
    // stacked line, so the bar only needs to fit one line of text.
    left += `<text x="14" y="${Math.round(tTitleH/2)+5}" ${ff} font-size="14" font-weight="700" fill="#000000">Statement of Intellectual Fellowship and Accountability (sIfA)<tspan font-size="11.5" font-weight="400" dx="8">— AI interaction across contributor roles</tspan></text>`;
    left += `<line x1="0" y1="${tTitleH}" x2="${leftW}" y2="${tTitleH}" stroke="#E2E8F0" stroke-width="1"/>`;
    // Column header bar — light grey (darker than the row-stripe grey below)
    // with black text, so it reads as a header without the old dark-on-dark
    // block.
    left += `<rect y="${tTitleH}" width="${leftW}" height="${tHdrH}" fill="#E0E0E0"/>`;
    left += `<line x1="0" y1="${tTitleH + tHdrH}" x2="${leftW}" y2="${tTitleH + tHdrH}" stroke="#000000" stroke-width="1"/>`;
    colNames.forEach((cn, ci) => {
      const lines = Array.isArray(cn) ? cn : [cn];
      const lineH = 14;
      // The Extent column stacks a 2-line title plus a 3-line hint — five
      // lines total — so it's laid out from a fixed top margin rather than
      // vertically centred like the other (1-2 line) column headers.
      const startY = ci === 2
        ? tTitleH + 16
        : tTitleH + tHdrH/2 - ((lines.length - 1) * lineH) / 2 + 4;
      lines.forEach((line, li) => {
        left += `<text x="${cX[ci]+8}" y="${startY + li*lineH}" ${ff} font-size="12" font-weight="700" fill="#000000">${esc(line)}</text>`;
      });
      if (ci === 2) {
        const hintStartY = startY + lines.length*lineH + 5;
        extentColHint.forEach((line, li) => {
          left += `<text x="${cX[ci]+8}" y="${hintStartY + li*10}" ${ff} font-size="9.5" font-weight="400" fill="#000000" opacity="0.7">${esc(line)}</text>`;
        });
      }
    });

    // Rows — per-contributor stacking with full column wrapping.
    // Every cell can wrap onto as many lines as it needs; row heights
    // come from the pre-computed `layouts` so nothing overflows. Built into
    // its own string (not appended straight to `left`) so the whole block —
    // rows plus their column dividers — can be nudged down as one unit to
    // sit centred in the space between the header and the footer, rather
    // than always pinned to the top with blank space trailing below it.
    let rows = '';
    let ry = tBodyY;
    layouts.forEach((L, ri) => {
      const role = dlRoles[ri];
      const d    = data[role.id] || {};
      const rh   = L.height;
      const contribs = d.contributors || [];

      // Minimalist table: pure white base, alternating rows shaded a light
      // grey to ease reading — no per-role pastel tint (the accent bar and
      // role-label colour already carry that signal).
      // Fully neutral (R=G=B) greys throughout, to rule out any colour cast —
      // header is #E0E0E0 (set above), this alternating stripe is a touch
      // lighter at #EDEDED.
      rows += `<rect y="${ry}" width="${leftW}" height="${rh}" fill="${ri % 2 === 1 ? '#EDEDED' : '#FFFFFF'}"/>`;
      if (ri > 0) rows += `<line x1="0" y1="${ry}" x2="${leftW}" y2="${ry}" stroke="#E2E8F0" stroke-width="0.7"/>`;
      rows += `<rect x="0" y="${ry}" width="4" height="${rh}" fill="${role.accent}"/>`;

      // Role label — vertically centred, wraps with no truncation
      const roleBlockH = L.roleLines.length * LH.role;
      const roleTopY   = ry + (rh - roleBlockH) / 2 + 12;
      L.roleLines.forEach((line, li) => {
        rows += `<text x="10" y="${roleTopY + li * LH.role}" ${ff} font-size="12" font-weight="600" fill="${role.accent}">${esc(line)}</text>`;
      });

      if (L.type === 'multi') {
        // ── Multiple contributors: each gets its own sub-row, sized
        //    to fit whichever column wraps the most. ──
        let sy = ry + 8;
        L.subRows.forEach(sr => {
          const baseY = sy + 12;          // first-line baseline within sub-row
          // Name (with level abbreviation already inlined)
          sr.nameLines.forEach((line, li) => {
            rows += `<text x="${cX[1]+6}" y="${baseY + li*LH.name}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
          });
          // Extent squares — vertically centred within the sub-row
          rows += extSq(cX[2]+6, sy + Math.max((sr.height - 14) / 2, 2), sr.extent, 14);
          // Audit trail
          sr.reasonLines.forEach((line, li) => {
            rows += `<text x="${cX[3]+6}" y="${baseY + li*LH.audit}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
          });
          // Tool / service
          sr.toolLines.forEach((line, li) => {
            rows += `<text x="${cX[4]+6}" y="${baseY + li*LH.tool}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
          });
          sy += sr.height;
        });
      } else if (L.type === 'single') {
        // ── Single contributor — name on lines 1..N, level on its
        //    own line below; audit and tool fill their columns. ──
        const sr = L.subRows[0];
        sr.nameLines.forEach((line, li) => {
          rows += `<text x="${cX[1]+6}" y="${ry + 17 + li*LH.name}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
        });
        if (sr.showLevel) {
          const lvlY = ry + 17 + sr.nameLines.length * LH.name;
          rows += `<text x="${cX[1]+6}" y="${lvlY}" ${ff} font-size="12" font-style="italic" fill="#000000">${esc(sr.levelText)}</text>`;
        }
        rows += extSq(cX[2]+6, ry + rh/2 - 7, sr.extent, 15);
        sr.reasonLines.forEach((line, li) => {
          rows += `<text x="${cX[3]+6}" y="${ry + 17 + li*LH.audit}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
        });
        sr.toolLines.forEach((line, li) => {
          rows += `<text x="${cX[4]+6}" y="${ry + 17 + li*LH.tool}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
        });
      } else {
        // ── No contributors — extent/reason/tool set directly on the row. ──
        rows += extSq(cX[2]+6, ry + rh/2 - 7, L.extent, 15);
        L.reasonLines.forEach((line, li) => {
          rows += `<text x="${cX[3]+6}" y="${ry + 17 + li*LH.audit}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
        });
        L.toolLines.forEach((line, li) => {
          rows += `<text x="${cX[4]+6}" y="${ry + 17 + li*LH.tool}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`;
        });
      }

      ry += rh;
    });

    // Column dividers — stop at last data row, not full height
    [1,2,3,4].forEach(ci => {
      rows += `<line x1="${cX[ci]}" y1="${tTitleH}" x2="${cX[ci]}" y2="${tBodyY + totalTableBodyH}" stroke="#CBD5E1" stroke-width="0.7"/>`;
    });

    // Rows sit directly under the header — no vertical centering — so the
    // footer always sits immediately below the table with no gap between
    // them. Any leftover height (when the figure side is what's driving H)
    // falls after the footer instead, at the very bottom of the panel.
    left += rows;

    // ── Footer text below table, directly under the last row ──
    const footerStartY = tBodyY + totalTableBodyH + footerGapAboveRows;
    let _fy = footerStartY;
    // 1) Citation
    _cLines.forEach(line => { left += `<text x="10" y="${_fy}" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(line)}</text>`; _fy += 14; });
    _fy += 6;
    // 2) Website
    _wLines.forEach(line => { left += `<text x="10" y="${_fy}" ${ff} font-size="12" fill="#000000">${esc(line)}</text>`; _fy += 14; });
    _fy += 4;
    // 3) Licence
    left += `<text x="10" y="${_fy}" ${ff} font-size="12" fill="#000000">${esc(_licenceLine)}</text>`;
    _fy += 16;
    left += `<text x="10" y="${_fy}" ${ff} font-size="12" fill="#000000">Generated ${_stamp().replace('_', ' ').replace(/(\d{2})$/, ':$1')}</text>`;

    // ── FIGURE panel (now on the LEFT of the SVG output) ──
    // The chart geometry itself (which roles get an axis) comes from the
    // already-rendered live chart via chartInner below — see displayRoles
    // in RadarChart. This aiActiveRoles list is only used for the caption.
    const aiActiveRoles = roles.filter(r => (data[r.id]?.extent||0) > 0);
    const totalAI = aiActiveRoles.reduce((s,r) => s+(data[r.id]?.extent||0), 0);
    const avgExt = aiActiveRoles.length > 0 ? (totalAI/aiActiveRoles.length).toFixed(1) : '0.0';
    const chartInner = svgRef.current.innerHTML;
    // Chart viewBox "-25 0 670 620" hugs the chart content tightly: role labels
    // span viewBox x ∈ [-17, 637] (text-anchor start/end at radius 215), so this
    // window gives ~8 px breathing room on each side and the figure fills the
    // panel rather than leaving blank space on the right.
    const chartScale = (rightW - 20) / 670;
    const chartW = Math.round(670 * chartScale);
    const chartH = Math.round(_cropH * chartScale);  // cropped viewBox (reuses the measured crop from _cropTop/_cropH above) trims the chart's own empty top/bottom margin
    const chartOffX = Math.round((rightW - chartW) / 2);
    const chartOffY = _chartOffY;          // 56 — leaves room for just 'sIfA' title

    let right = '';
    right += `<rect width="${rightW}" height="${H}" fill="white"/>`;
    // Title, chart, and captions are built into their own string, then
    // appended pinned to the top — any leftover height (when the table side
    // is what's driving H) simply falls after the content instead.
    let figContent = '';
    // Title — sIfA, plus a Project subtitle when set
    figContent += `<text x="${rightW/2}" y="36" text-anchor="middle" ${ff} font-size="26.0" font-weight="700" fill="#1E293B">sIfA</text>`;
    if (_pn) figContent += `<text x="${rightW/2}" y="53" text-anchor="middle" ${ff} font-size="13.0" font-weight="600" fill="#334155">Project: ${esc(_pn)}</text>`;
    // Embedded chart
    figContent += `<svg x="${chartOffX}" y="${chartOffY}" width="${chartW}" height="${chartH}" viewBox="-25 ${_cropTop} 670 ${_cropH}" xmlns="http://www.w3.org/2000/svg">${chartInner}</svg>`;

    // Caption / legend block beneath the figure
    const capY = chartOffY + chartH + 10;
    figContent += `<line x1="10" y1="${capY - 4}" x2="${rightW-10}" y2="${capY - 4}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    figContent += `<text x="${rightW/2}" y="${capY + 13}" text-anchor="middle" ${ff} font-size="12.5" fill="#000000">AI interaction across contributor roles</text>`;
    figContent += `<text x="${rightW/2}" y="${capY + 29}" text-anchor="middle" ${ff} font-size="12.5" fill="#000000">${aiActiveRoles.length} role${aiActiveRoles.length!==1?'s':''} with AI interaction · average extent ${avgExt}/2</text>`;
    // Legend — split across two rows so the full text fits within the (narrower)
    // chart panel.  Row 1: two swatches + short labels, group-centred.
    // Row 2 (italic, smaller, centred): Each axis = one contributor role.
    // The previous single-line legend ran past rightW=520 and was clipped at
    // "contributor r…".
    const _legGroupStart = Math.round(rightW/2) - 150;     // group total width ≈ 300
    figContent += `<rect x="${_legGroupStart}" y="${capY + 42}" width="22" height="16" fill="${_humanFill}" opacity="0.72" rx="2"/>`;
    figContent += `<text x="${_legGroupStart + 30}" y="${capY + 55}" ${ff} font-size="14.0" font-weight="600" fill="#000000">Outer ring = Human</text>`;
    figContent += `<rect x="${_legGroupStart + 188}" y="${capY + 42}" width="22" height="16" fill="${_aiFill}" opacity="0.72" rx="2"/>`;
    figContent += `<text x="${_legGroupStart + 218}" y="${capY + 55}" ${ff} font-size="14.0" font-weight="600" fill="#000000">Centre = AI</text>`;
    figContent += `<text x="${rightW/2}" y="${capY + 74}" text-anchor="middle" ${ff} font-size="12.0" font-style="italic" fill="#000000">Each axis = one contributor role</text>`;

    // Accountability disclaimer beneath the caption block.
    const stmtY = capY + 88;
    figContent += `<line x1="10" y1="${stmtY - 6}" x2="${rightW-10}" y2="${stmtY - 6}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    const stmtLine1 = "After using any tools or services, the author(s) reviewed and edited";
    const stmtLine2 = "the content as needed and take(s) full responsibility for the content of the publication.";
    figContent += `<text x="${rightW/2}" y="${stmtY + 8}" text-anchor="middle" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(stmtLine1)}</text>`;
    figContent += `<text x="${rightW/2}" y="${stmtY + 22}" text-anchor="middle" ${ff} font-size="12" fill="#000000" font-style="italic">${esc(stmtLine2)}</text>`;

    // CRediT attribution — only when the active taxonomy is CRediT
    if (_isCRediT) {
      const attrY = stmtY + 38;
      figContent += `<text x="${rightW/2}" y="${attrY}" text-anchor="middle" ${ff} font-size="12" fill="#000000">${esc(_creditAttrib1)}</text>`;
      figContent += `<text x="${rightW/2}" y="${attrY + 14}" text-anchor="middle" ${ff} font-size="12" fill="#000000">More info at <tspan font-weight="600" fill="#2451CB">https://credit.niso.org</tspan></text>`;
    }
    // Pinned to the top — no vertical centering — so the title always sits
    // right under the panel's top edge. Any leftover height (when the table
    // side is what's driving H) falls after the CRediT attribution instead,
    // at the very bottom of the panel.
    right += figContent;

    // ── Structured metadata block (machine-readable JSON inside SVG <metadata>) ──
    const metaObj = {
      schema: "CRediT Contributor Role Taxonomy — https://credit.niso.org/",
      tool: "sIfA AI Contribution Statement Tool",
      toolVersion: APP_VERSION,
      doi: "10.5281/zenodo.20285993",
      generated: new Date().toISOString(),
      extentScale: "0 = no AI use · 1 = some AI use · 2 = extensive AI use",
      roles: roles.map(r => {
        const d = data[r.id];
        return {
          id: r.id,
          label: r.label,
          definition: r.def,
          contributors: (d.contributors||[]).map(c => ({
            name: c.name,
            level: c.level || null,
            aiTool: c.tool || null,
            reason: c.reason || null,
            extent: c.extent || 0,
            extentLabel: EXTENT_LABELS[c.extent || 0],
          })),
          aiTool: d.tool || null,
          reason: d.reason || null,
          extent: d.extent,
          extentLabel: EXTENT_LABELS[d.extent],
        };
      }),
    };
    const metaJSON = JSON.stringify(metaObj, null, 2);

    const svgStr = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:sifa="https://credit.niso.org/sifa"
     viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"
     style="font-family: ${_ff}">
  <metadata>
    <sifa:AIContributionStatement>
      <![CDATA[${metaJSON}]]>
    </sifa:AIContributionStatement>
  </metadata>
  <g>${right}</g>
  <line x1="${divX}" y1="0" x2="${divX}" y2="${H}" stroke="#CBD5E1" stroke-width="1"/>
  <g transform="translate(${rightX},0)">${left}</g>
</svg>`;

    if (format === 'jpeg') {
      _rasteriseToJPEG(svgStr, W, H, 'sIfA Table and Figure');
    } else {
      const blob = new Blob([svgStr], { type:"image/svg+xml" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `sIfA Table and Figure ${_stamp()}.svg`;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    } catch(err) { console.error('downloadSVG error:', err); alert('Export failed: ' + err.message); }
  };

  React.useImperativeHandle(ref, () => ({ downloadSVG, downloadFigureOnly, _buildFigureOnlySVG }));
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
      <svg ref={svgRef} viewBox="0 0 620 620" style={{ width:"100%", maxWidth:340, fontFamily: _ff }}
        xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="brainClip">
            <path d={brainPath} />
          </clipPath>
          {/* Hard ceiling for the AI fill, well inside dataR (the val=2
              boundary). The blob's spline can overshoot the data radius
              between axes with very different values — without this, an
              isolated value of 2 could bulge the fill out past its own
              ring and eat into the band that is meant to always read as
              human. Clipping here guarantees a visible orange margin no
              matter how the curve behaves. */}
          <clipPath id="aiClip">
            <circle cx={cx} cy={cy} r={dataR - 10} />
          </clipPath>
          {/* Soft blur for blob glow layers */}
          <filter id="blobBlur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" />
          </filter>
        </defs>

        {/* White background */}
        <rect width="620" height="620" fill="white" />

        <g ref={chartContentRef}>
        {/* Brain — solid uniform blue fill */}
        <path d={brainPath} fill={_humanFill} fillOpacity={0.72} stroke="none" />


        {/* Brain outline — darker blue edge */}
        <path d={brainPath} fill="none" stroke="#5D1F08" strokeWidth={1.8} />

        {/* Organic rings — softly wobbled concentric layers, evoke brain tissue depth */}
        <g clipPath="url(#brainClip)">
          {[1,2,3,4,5].map(l => (
            <path key={l} d={organicRing(l/5)} fill="none"
              stroke="white" strokeOpacity={0.27} strokeWidth={0.95} />
          ))}
        </g>

        {/* AI blob — 5 blurred glow layers, lightest (extent≥1) to deepest (extent=5) */}
        <g clipPath="url(#aiClip)">
          {[1,2].map(k => {
            const d = _smoothBlob(_blobPts(r => Math.min(data[r.id]?.extent||0, k)), 0.5);
            return (
              <path key={k} d={d}
                fill={EXTENT_COLORS[k]} fillOpacity={0.85}
                filter="url(#blobBlur)" />
            );
          })}
        </g>
        {/* Solid fill — always visible regardless of extent size. The
            boundary is softened (blurred) rather than a crisp hard line,
            so the AI region reads as a gradient edge, matching the glow
            layers above instead of looking like a sharp cutoff. Opacity
            and stroke are deliberately stronger than a first pass at this
            (0.55/0.55) — at that strength a lone value of 1 sitting next
            to 0s on both sides all but disappeared once blurred. */}
        {totalAI > 0 && (
          <path d={aiBlob} clipPath="url(#aiClip)"
            fill={_aiFill} fillOpacity={0.8}
            stroke="#5341BC" strokeWidth={5} strokeOpacity={0.8}
            filter="url(#blobBlur)" />
        )}

        {/* Scale rings at val=1 and val=2 — darker burnt orange */}
        <circle cx={cx} cy={cy} r={dataR * 0.5} fill="none"
          stroke="#A53807" strokeOpacity={0.92} strokeWidth={2.6} strokeDasharray="5 4" />
        <circle cx={cx} cy={cy} r={dataR} fill="none"
          stroke="#A53807" strokeOpacity={0.85} strokeWidth={2.3} strokeDasharray="5 4" />
        {/* Scale number at val=0 — centre of the chart, same badge style as 1/2 */}
        <g>
          <rect x={cx - 10} y={cy - 10} width={20} height={20} rx={4}
            fill="rgba(0,0,0,0.38)" />
          <text x={cx} y={cy + 1} textAnchor="middle" dominantBaseline="middle"
            fontSize={16} fontWeight={800} fill="white">0</text>
        </g>

        {/* Scale numbers on first axis — prominent white pill */}
        {[1,2].map(l => {
          const p = pt(0, l);
          return (
            <g key={l}>
              <rect x={p.x + 3} y={p.y - 10} width={20} height={20} rx={4}
                fill="rgba(0,0,0,0.38)" />
              <text x={p.x + 13} y={p.y} textAnchor="middle" dominantBaseline="middle"
                fontSize={16} fontWeight={800} fill="white">{l}</text>
            </g>
          );
        })}

        {/* Role trajectory lines — connect each label straight through its
            data point to the centre "0", so it's obvious which text
            belongs to which axis. Coloured to match that role's own
            accent (same colour as its label and data sparkle), stopping
            just short of the label so it doesn't run under the text. */}
        {displayRoles.map((r, i) => {
          const a = ang(i);
          const ex = cx + 200 * Math.cos(a);
          const ey = cy + 200 * Math.sin(a);
          return <line key={i} x1={cx} y1={cy} x2={ex} y2={ey}
            stroke={r.accent} strokeOpacity={0.55} strokeWidth={1.6} />;
        })}

        {/* Data sparkles — ✦ coloured by extent level, light→deep red */}
        {displayRoles.map((r, i) => {
          const val = data[r.id]?.extent || 0;
          if (val === 0) return null;
          const p = pt(i, val);
          return (
            <path key={i} d={sparklePt(p.x, p.y, 11)}
              fill={EXTENT_COLORS[val]} stroke="white" strokeWidth={1.6} strokeOpacity={0.9} opacity={1} />
          );
        })}

        {/* Role labels — outside brain, in each role's accent colour */}
        {displayRoles.map((r, i) => {
          const { x, y, a } = labelPt(i);
          const ta = anchor(a);
          const lines = getShortLabel(r);
          const lh = 15;
          const offsetY = lines.length > 1 ? -(lh * (lines.length - 1)) / 2 : 0;
          return (
            <g key={i}>
              {lines.map((line, li) => (
                <text key={li} x={x} y={y + offsetY + li * lh}
                  textAnchor={ta} dominantBaseline="middle"
                  fontSize={16.5} fontWeight={600} fill={r.accent}>
                  {line}
                </text>
              ))}
            </g>
          );
        })}
        </g>

      </svg>

      {/* Download / Print — minimal pill buttons */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", justifyContent:"center" }}>
        {[
          { label:"Table & Figure · SVG",  action:() => downloadSVG('svg'),           filled:true },
          { label:"Table & Figure · JPEG", action:() => downloadSVG('jpeg'),          filled:true },
          { label:"Figure only · SVG",     action:() => downloadFigureOnly('svg'),    filled:false },
          { label:"Figure only · JPEG",    action:() => downloadFigureOnly('jpeg'),   filled:false },
          { label:"Save as PDF",           action:() => onSaveAsPDF?.(),              filled:false },
        ].map(b => (
          <button key={b.label} onClick={b.action} style={{
            padding:"6px 14px", borderRadius:20,
            border: b.filled ? "none" : "1px solid #CBD5E1",
            background: b.filled ? "#2451CB" : "white",
            color: b.filled ? "white" : "#000000",
            fontWeight:500, fontSize:12, cursor:"pointer", letterSpacing:"0.01em",
          }}>⬇ {b.label}</button>
        ))}
      </div>

      {/* Textual legend — labels each colour so the figure is
          intelligible to screen readers and colour-blind users. */}
      <div role="note" aria-label="Figure legend"
        style={{ display:"flex", flexWrap:"wrap", gap:14, justifyContent:"center",
                 alignItems:"center", fontSize:12, color:"#000000" }}>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <span aria-hidden="true" style={{ display:"inline-block", width:14, height:14, background:_humanFill, opacity:0.72, borderRadius:2 }} />
          Human (outer ring)
        </span>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <span aria-hidden="true" style={{ display:"inline-block", width:14, height:14, background:_aiFill, opacity:0.72, borderRadius:2 }} />
          AI interaction (1 = some, 2 = extensive)
        </span>
      </div>

      {/* Mini summary */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, maxWidth:560, justifyContent:"center" }}>
        {roles.filter(r => (data[r.id]?.extent || 0) > 0).map(r => (
          <span key={r.id} style={{
            background:r.bg, border:`1px solid ${r.accent}`, color:r.accent,
            borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:600,
          }}>
            {r.label}: {EXTENT_LABELS[data[r.id].extent]}
          </span>
        ))}
      </div>
    </div>
  );
});

// ── Agent ─────────────────────────────────────────────────────
// Phase flow per role:
//   performer → performerLevel (btn) → tool → reason → extent (btn) → addAnother (btn)
//   addAnother: Yes btn → back to performer; No btn → finalizeRole & nextRole
function Agent({ onUpdate, onClose, onSetRoles }) {
  const [msgs, setMsgs] = useState([
    { from:"agent", text:"Hi! I'm your AI Contribution Agent 🤖\n\nFirst, which taxonomy would you like to use for your sIfA?", taxonomyPicker:true }
  ]);
  const [inp, setInp] = useState("");
  const [ri, setRi] = useState(-1);
  const [phase, setPhase] = useState("taxonomy");
  const [waiting, setWaiting] = useState(true);
  const [customRolesList, setCustomRolesList] = useState([]);
  const bottom = useRef(null);
  const rolesRef = useRef(null);
  // Refs avoid stale-closure bugs in button click handlers
  const currentContribRef  = useRef({});   // { name, level, tool, reason, extent } for the contributor in progress
  const currentContribsRef = useRef([]);   // finished contributors for the current role
  const getRoles = () => rolesRef.current || ROLES;

  useEffect(() => { bottom.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs]);

  const add = (from, text, extra = {}) => setMsgs(m => [...m, { from, text, ...extra }]);

  const LEVEL_WEIGHT = { Sole: 1.0, Lead: 0.7, Equal: 0.5, Support: 0.3 };

  const pickTaxonomy = (choice) => {
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.taxonomyPicker
      ? {...msg, taxonomyPicker:false, text: msg.text + (choice === 'credit' ? '\n→ CRediT taxonomy selected.' : '\n→ Own taxonomy selected.')}
      : msg));
    if (choice === 'credit') {
      rolesRef.current = ROLES;
      onSetRoles(ROLES, 'credit');
      setPhase("start");
      add("agent", "Great! I'll walk you through each of the 14 CRediT authorship roles and ask whether — and how — you used AI at each stage.", { startBtn:true });
    } else {
      setPhase("collectingRoles");
      add("agent", "What contribution would you like to include in your sIfA?");
    }
  };

  const pickAddRole = (choice) => {
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.addRolePicker
      ? {...msg, addRolePicker:false, text: msg.text + (choice === 'yes' ? '\n→ Adding another.' : '\n→ Done collecting.')}
      : msg));
    if (choice === 'yes') {
      add("agent", "What contribution would you like to include in your sIfA?");
    } else {
      const customRoles = buildCustomRoles(customRolesList);
      rolesRef.current = customRoles;
      onSetRoles(customRoles, 'custom');
      setPhase("start");
      add("agent",
        `Your ${customRoles.length} contribution${customRoles.length !== 1 ? 's' : ''} have been added:\n${customRoles.map(r => '  · '+r.label).join('\n')}\n\nI'll now walk you through each one.`,
        { startBtn:true });
    }
  };

  const finalizeRole = (roleId, roleIdx) => {
    const contribs = currentContribsRef.current;
    const { wSum, wTotal } = contribs.reduce((acc, c) => {
      const w = LEVEL_WEIGHT[c.level] || 0.5;
      return { wSum: acc.wSum + (c.extent||0)*w, wTotal: acc.wTotal + w };
    }, { wSum:0, wTotal:0 });
    onUpdate(roleId, {
      contributors: contribs,
      extent:  wTotal > 0 ? wSum / wTotal : 0,
      tool:    [...new Set(contribs.map(c => c.tool).filter(Boolean))].join(', '),
      reason:  [...new Set(contribs.map(c => c.reason).filter(Boolean))].join('; '),
    });
    const n = contribs.length;
    add("agent", `Saved ${n} contributor${n!==1?'s':''} for **${getRoles().find(r=>r.id===roleId)?.label}**. Moving on…`);
    setTimeout(() => nextRole(roleIdx + 1), 400);
  };

  const nextRole = idx => {
    currentContribRef.current  = {};
    currentContribsRef.current = [];
    const aRoles = getRoles();
    if (idx >= aRoles.length) {
      setPhase("done");
      add("agent", "All done! 🎉 Your table is now complete.\n\nYou can still edit any field directly in the table. When you're satisfied, use Export CSV or Print/PDF to save your AI Contribution Statement.");
      return;
    }
    setRi(idx);
    setPhase("performer");
    const r = aRoles[idx];
    const taskList = (ROLE_TASKS[r.id]||[]).map(t => `  · ${t}`).join('\n');
    const roleMsg = `(${idx+1}/${aRoles.length}) **${r.label}**` +
      (r.def ? `\n_${r.def}_` : '') +
      (taskList ? `\n\nThis role typically covers:\n${taskList}` : '') +
      `\n\n**Who performed this role? Please enter the name of the person responsible.**`;
    add("agent", roleMsg, { skipPicker:true, roleId:r.id, accent:r.accent, roleIdx:idx });
  };

  // ── Button handlers ──────────────────────────────────────────

  const pickSkipRole = (roleIdx) => {
    setMsgs(m => m.map(msg => msg.skipPicker && msg.roleIdx===roleIdx
      ? {...msg, skipPicker:false, text: msg.text+'\n→ Skipped.'} : msg));
    onUpdate(getRoles()[roleIdx].id, { skipped: true });
    add("agent", `Skipping **${getRoles()[roleIdx].label}**. Moving on…`);
    setTimeout(() => nextRole(roleIdx + 1), 300);
  };

  const beginInterview = () => {
    setMsgs(m => m.map(msg => msg.startBtn ? {...msg, startBtn:false} : msg));
    nextRole(0);
  };

  const pickLevel = (roleId, level) => {
    currentContribRef.current = { ...currentContribRef.current, level };
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.levelPicker && msg.roleId===roleId
      ? {...msg, levelPicker:false, text: msg.text+`\n→ **${level}** selected.`} : msg));
    setPhase("tool");
    const r  = getRoles().find(r => r.id===roleId);
    const nm = currentContribRef.current.name;
    setTimeout(() => add("agent",
      `Write the name of the tool **${nm}** used for **${r.label}** — or click the button if no AI was used.`,
      { toolPicker:true, roleId, accent:r.accent }
    ), 300);
  };

  const pickNoTool = (roleId) => {
    const name = currentContribRef.current.name;
    setMsgs(m => m.map(msg => msg.toolPicker && msg.roleId===roleId
      ? {...msg, toolPicker:false, text: msg.text+`\n→ No AI used.`} : msg));
    currentContribRef.current = { ...currentContribRef.current, tool:"", reason:"", extent:0 };
    currentContribsRef.current = [...currentContribsRef.current, {...currentContribRef.current}];
    const r = getRoles().find(r => r.id===roleId);
    setPhase("addAnother");
    setWaiting(true);
    setTimeout(() => add("agent",
      `No AI used by **${name}** for **${r.label}**.\n\nWould you like to add another contributor to this role?`,
      { addAnotherPicker:true, roleId, accent:r.accent }
    ), 200);
  };

  const pickExtent = (roleId, val) => {
    currentContribRef.current = { ...currentContribRef.current, extent: val };
    currentContribsRef.current = [...currentContribsRef.current, {...currentContribRef.current}];
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.picker && msg.roleId===roleId
      ? {...msg, picker:false, text: msg.text+`\n→ **${EXTENT_LABELS[val]}** (${val}/2) selected.`} : msg));
    const r = getRoles().find(r => r.id===roleId);
    setPhase("addAnother");
    setWaiting(true);
    setTimeout(() => add("agent",
      `Would you like to add another contributor to **${r.label}**?`,
      { addAnotherPicker:true, roleId, accent:r.accent }
    ), 300);
  };

  const pickAddAnother = (roleId, choice, roleIdx) => {
    const r = getRoles().find(r => r.id===roleId);
    if (choice === 'reset') {
      setWaiting(false);
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Starting this role over.'} : msg));
      currentContribRef.current = {};
      currentContribsRef.current = [];
      setPhase("performer");
      add("agent", `Starting fresh for **${r.label}**. Who was the first contributor?`);
      return;
    }
    if (choice === 'yes') {
      setWaiting(false);
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Adding another contributor.'} : msg));
      currentContribRef.current = {};
      setPhase("performer");
      add("agent", `Who else performed **${r.label}**? Please enter their name.`);
      return;
    }
    // 'no': check Rule 3 — all-Support guard (Sole contributor is always valid alone)
    const contribs = currentContribsRef.current;
    const hasSoleContrib = contribs.some(c => c.level === "Sole");
    const allSupport = !hasSoleContrib && contribs.length > 0 && contribs.every(c => c.level === "Support");
    if (allSupport) {
      // Don't close the picker — show a warning and keep it open (re-issued)
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Moving on.'} : msg));
      add("agent",
        `⚠ All contributors listed are **Support** — at least one must be **Equal** or **Lead**.\n\nPlease add another contributor at the appropriate level, or start this role over to reassign levels.`,
        { addAnotherPicker:true, roleId, accent:r.accent }
      );
      return;
    }
    // Single contributor listed as Equal — verify whether Lead was intended (not for Sole)
    const singleEqual = contribs.length === 1 && contribs[0].level === "Equal" && !hasSoleContrib;
    if (singleEqual) {
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Moving on.'} : msg));
      setWaiting(true);
      add("agent",
        `**${contribs[0].name}** is the only contributor listed for **${r.label}** and is assigned **Equal**. Since there is no one to be equal to, should their level be changed to **Lead**?`,
        { verifyLeadPicker:true, roleId, accent:r.accent }
      );
      return;
    }
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
      ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Moving on.'} : msg));
    finalizeRole(roleId, roleIdx);
  };

  const pickVerifyLead = (roleId, choice, roleIdx) => {
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.verifyLeadPicker && msg.roleId===roleId
      ? {...msg, verifyLeadPicker:false, text: msg.text+(choice==='yes' ? '\n→ Changed to Lead.' : '\n→ Kept as Equal.')}
      : msg));
    if (choice === 'yes') {
      currentContribsRef.current = currentContribsRef.current.map((c, i) =>
        i === 0 ? {...c, level:"Lead"} : c
      );
    }
    finalizeRole(roleId, roleIdx);
  };

  // ── Text input (names, tool names, reasons) ──────────────────
  const send = text => {
    if (!text.trim() || waiting) return;
    add("user", text);
    setInp("");
    const low = text.toLowerCase().trim();

    if (phase === "start") {
      if (parseYesNo(text) === 'yes') {
