        setMsgs(m => m.map(msg => msg.startBtn ? {...msg, startBtn:false} : msg));
        nextRole(0);
      } else add("agent", "Click **Begin interview** to start!");
      return;
    }
    if (phase === "done") return;
    const r = getRoles()[ri];

    if (phase === "collectingRoles") {
      const newList = [...customRolesList, text.trim()];
      setCustomRolesList(newList);
      setWaiting(true);
      add("agent", `Added: **${text.trim()}**\n\nWould you like to include another contribution in your sIfA?`, { addRolePicker:true });
      return;
    }

    if (phase === "performer") {
      currentContribRef.current = { name: text };
      setPhase("performerLevel");
      setWaiting(true);
      const existing = currentContribsRef.current;
      const hasLead  = existing.some(c => c.level === "Lead");
      const hasEqual = existing.some(c => c.level === "Equal");
      const hasSole  = existing.some(c => c.level === "Sole");
      const availLevels = hasSole   ? []
                        : hasLead  ? ["Support"]
                        : hasEqual ? ["Equal"]
                        : ["Sole", "Lead", "Equal", "Support"];
      const constraint = hasSole   ? "\n_A Sole contributor is already assigned — no further contributors can be added._"
                       : hasLead  ? "\n_One Lead is already assigned — this contributor must be Support._"
                       : hasEqual ? "\n_All contributors for this role must be Equal._"
                       : "";
      add("agent", `What is **${text}**'s level of contribution to **${r.label}**?${constraint}`, { levelPicker:true, roleId:r.id, accent:r.accent, availLevels });
      return;
    }

    if (phase === "tool") {
      const no = parseYesNo(text) === 'no';
      setMsgs(m => m.map(msg => msg.toolPicker && msg.roleId===r.id ? {...msg, toolPicker:false} : msg));
      if (no) {
        pickNoTool(r.id);
      } else {
        currentContribRef.current = { ...currentContribRef.current, tool: text };
        setPhase("reason");
        add("agent", `Got it — **${text}**.\n\nFor **${r.label}**: **how was AI used?** Was it generative or non-generative? Is there an audit trail? (e.g. "generative — drafted introduction; full chat log retained", "non-generative — searched literature with Elicit; results exported to Zotero")`);
      }
      return;
    }

    if (phase === "reason") {
      currentContribRef.current = { ...currentContribRef.current, reason: text };
      setPhase("extent");
      setWaiting(true);
      add("agent",
        `Noted.\n\nHow extensively did **${currentContribRef.current.name}** rely on AI for **${r.label}**?\n_1 = some use of AI · 2 = extensive use of AI_`,
        { picker:true, roleId:r.id, accent:r.accent }
      );
      return;
    }
  };

  const pct = ri >= 0 ? Math.round((ri / getRoles().length) * 100) : 0;

  const btnStyle = (accent) => ({
    padding:"7px 18px", borderRadius:8, border:`2px solid ${accent}`,
    background:"white", color:accent, fontWeight:700, fontSize:13,
    cursor:"pointer", transition:"all 0.15s",
  });
  const onHover = (e, accent) => { e.currentTarget.style.background=accent; e.currentTarget.style.color="white"; };
  const onLeave = (e, accent) => { e.currentTarget.style.background="white"; e.currentTarget.style.color=accent; };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:"#F8FAFC" }}>
      {/* Agent header */}
      <div style={{ background:"#111111", color:"white", padding:"13px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
        <div>
          <div style={{ fontWeight:700, fontSize:15 }}>🤖 sIfA Agent</div>
          <div style={{ fontSize:12, opacity:0.75 }}>Guided AI contribution interview</div>
        </div>
        <button onClick={onClose} style={{ background:"none", border:"none", color:"white", fontSize:22, cursor:"pointer", lineHeight:1 }}>×</button>
      </div>

      {/* Progress */}
      {ri >= 0 && phase !== "done" && (
        <div style={{ padding:"8px 14px", background:"white", borderBottom:"1px solid #E2E8F0", flexShrink:0 }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#000000", marginBottom:5 }}>
            <span>Progress</span><span>{ri}/{getRoles().length} completed</span>
          </div>
          <div style={{ height:5, background:"#E2E8F0", borderRadius:3 }}>
            <div style={{ height:4, borderRadius:1, background:"#2451CB", width:pct+"%", transition:"width 0.4s" }} />
          </div>
        </div>
      )}

      {/* Messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"12px 14px", display:"flex", flexDirection:"column", gap:10 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ alignSelf: m.from === "agent" ? "flex-start" : "flex-end", maxWidth:"90%" }}>
            <div style={{
              background: m.from === "agent" ? "white" : "#111111",
              color: m.from === "agent" ? "#1E293B" : "white",
              border: m.from === "agent" ? "1px solid #E2E8F0" : "none",
              borderRadius: m.from === "agent" ? "4px 14px 14px 14px" : "14px 4px 14px 14px",
              padding:"10px 13px", fontSize:13, lineHeight:1.58,
              boxShadow:"0 1px 4px rgba(0,0,0,0.06)", whiteSpace:"pre-wrap",
            }}>
              {m.text.split(/(\*\*[^*]+\*\*|_[^_]+_)/).map((chunk, j) => {
                if (chunk.startsWith("**") && chunk.endsWith("**"))
                  return <strong key={j}>{chunk.slice(2,-2)}</strong>;
                if (chunk.startsWith("_") && chunk.endsWith("_"))
                  return <em key={j} style={{ opacity:0.8 }}>{chunk.slice(1,-1)}</em>;
                return chunk;
              })}
            </div>
            {/* Begin interview button */}
            {m.startBtn && (
              <div style={{ marginTop:8, paddingLeft:4 }}>
                <button onClick={beginInterview}
                  style={{ padding:"8px 22px", borderRadius:2, border:"none", background:"#2451CB", color:"white", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                  Begin interview →
                </button>
              </div>
            )}
            {/* Taxonomy picker buttons */}
            {m.taxonomyPicker && (
              <div style={{ display:"flex", gap:8, marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickTaxonomy('credit')}
                  style={{ padding:"8px 22px", borderRadius:2, border:"none", background:"#2451CB", color:"white", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                  CRediT
                </button>
                <button onClick={() => pickTaxonomy('own')}
                  style={{ padding:"8px 22px", borderRadius:2, border:"2px solid #2451CB", background:"white", color:"#2451CB", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                  Own Taxonomy
                </button>
              </div>
            )}
            {/* Add-another-role buttons */}
            {m.addRolePicker && (
              <div style={{ display:"flex", gap:8, marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickAddRole('yes')}
                  style={btnStyle("#2451CB")}
                  onMouseEnter={e => onHover(e, "#2451CB")} onMouseLeave={e => onLeave(e, "#2451CB")}
                >✓ Yes, add another</button>
                <button onClick={() => pickAddRole('no')}
                  style={btnStyle("#94A3B8")}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
>→ No, start interview</button>
              </div>
            )}
            {/* Skip role button */}
            {m.skipPicker && (
              <div style={{ marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickSkipRole(m.roleIdx)}
                  style={{...btnStyle("#94A3B8"), borderStyle:"dashed"}}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >⏭ Skip this role</button>
              </div>
            )}
            {/* Contribution level buttons */}
            {m.levelPicker && (
              <div style={{ display:"flex", gap:8, marginTop:8, paddingLeft:4 }}>
                {(m.availLevels || ["Lead","Equal","Support"]).map(lv => (
                  <button key={lv} onClick={() => pickLevel(m.roleId, lv)}
                    style={btnStyle(m.accent)}
                    onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                  >{lv}</button>
                ))}
              </div>
            )}
            {/* No AI tool button */}
            {m.toolPicker && (
              <div style={{ marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickNoTool(m.roleId)}
                  style={btnStyle(m.accent)}
                  onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                >✗ No AI used for this role</button>
              </div>
            )}
            {/* Extent picker */}
            {m.picker && (
              <div style={{ display:"flex", gap:6, marginTop:8, paddingLeft:4 }}>
                {[1,2].map(v => (
                  <button key={v} onClick={() => pickExtent(m.roleId, v)} title={EXTENT_LABELS[v]}
                    style={{ width:56, height:56, borderRadius:8, border:`2px solid ${m.accent}`, background:"white", color:m.accent, fontWeight:700, fontSize:20, cursor:"pointer", transition:"all 0.15s" }}
                    onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                  >{v}</button>
                ))}
              </div>
            )}
            {/* Add-another buttons */}
            {m.addAnotherPicker && (
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickAddAnother(m.roleId, 'yes', ri)}
                  style={btnStyle(m.accent)}
                  onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                >✓ Yes, add another</button>
                <button onClick={() => pickAddAnother(m.roleId, 'no', ri)}
                  style={btnStyle("#94A3B8")}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >→ No, move on</button>
                <button onClick={() => pickAddAnother(m.roleId, 'reset', ri)}
                  style={{...btnStyle("#94A3B8"), borderStyle:"dashed"}}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >↩ Start role over</button>
              </div>
            )}
            {/* Single-Equal verification buttons */}
            {m.verifyLeadPicker && (
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickVerifyLead(m.roleId, 'yes', ri)}
                  style={btnStyle(m.accent)}
                  onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                >✓ Yes, change to Lead</button>
                <button onClick={() => pickVerifyLead(m.roleId, 'no', ri)}
                  style={btnStyle("#94A3B8")}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >→ No, keep as Equal</button>
              </div>
            )}
          </div>
        ))}
        <div ref={bottom} />
      </div>

      {/* Input — for text responses only (names, tool names, reasons) */}
      {phase !== "done" ? (
        <div style={{ padding:"10px 12px", borderTop:"1px solid #E2E8F0", display:"flex", gap:8, background:"white", flexShrink:0 }}>
          <input value={inp} onChange={e => setInp(e.target.value)}
            onKeyDown={e => e.key==="Enter" && send(inp)}
            placeholder={
              waiting        ? "Click a button above…" :
              phase==="tool" ? "Type the AI tool name, or click the button above if none…" :
              phase==="taxonomy"? "Click a button above…" :
              phase==="collectingRoles"? "Type the contribution name…" :
              phase==="start"? "Or click Begin interview above…" :
                               "Type your response…"
            }
            disabled={waiting}
            style={{ flex:1, border:"1px solid #CBD5E1", borderRadius:8, padding:"8px 12px", fontSize:13, outline:"none", background: waiting ? "#F1F5F9" : "white" }} />
          <button onClick={() => send(inp)} disabled={waiting || !inp.trim()}
            style={{
              padding:"8px 14px", borderRadius:8, border:"none",
              background: waiting || !inp.trim() ? "#CBD5E1" : "#2451CB",
              color:"white", fontWeight:600, fontSize:13,
              cursor: waiting || !inp.trim() ? "default" : "pointer",
            }}>Send</button>
        </div>
      ) : (
        <div style={{ padding:14, borderTop:"1px solid #E2E8F0", background:"white", textAlign:"center", flexShrink:0 }}>
          <div style={{ fontSize:13, color:"#16A34A", fontWeight:600 }}>✓ Interview complete — review your table</div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
// ── Save / Load helpers ──────────────────────────────────────
// ── parseYesNo ─────────────────────────────────────────────
// Maps short free-text responses ('yep', 'nope', 'not really') to
// 'yes' | 'no' | null. Used by the agent flow when the user types
// instead of clicking a button — replaces the original regex that
// only caught a handful of patterns and missed common negations.
const _YN_AFFIRM = new Set([
  'y','yes','ye','yep','yeah','yea','ya','yup',
  'ok','okay','k','kk','sure','fine','alright',
  'aye','indeed','correct','right','true','affirmative',
  'absolutely','definitely','certainly','of course','for sure',
  'ready','start','go','begin',
  // Interview-style hedges that still imply assent
  'yeah kind of','sort of','kinda','kind of',
  'i guess','i guess so','somewhat','a bit','a little',
]);
const _YN_NEGATE = new Set([
  'n','no','nope','nah','naw','nay',
  'never','negative','not really','not at all','not now',
  "don't","dont","do not","don't think so","dont think so",
  "didn't","didnt","did not",
  "haven't","havent","have not",
  "won't","wont","will not",
  'none','nothing','nothing yet','no thanks','no thank you',
  'skip','pass',
  'na','n/a','not applicable',
  // Common hedged negations heard in interviews
  "i dont think so","i don't think so",'not exactly','not really sure',
  'doubt it','hardly',
]);
const parseYesNo = (txt) => {
  if (txt == null) return null;
  let s = String(txt).toLowerCase().trim();
  // Strip trailing punctuation and "please", which often trails responses
  s = s.replace(/[.!?]+$/g, '').replace(/\s+please$/, '').trim();
  if (!s) return null;
  if (_YN_AFFIRM.has(s)) return 'yes';
  if (_YN_NEGATE.has(s)) return 'no';
  // Multi-word starts: take the leading clause up to the first comma /
  // period / semicolon — covers "nope, never used it" or "yes, I did".
  const lead = s.split(/[,;.]/)[0].trim();
  if (lead !== s) {
    if (_YN_AFFIRM.has(lead)) return 'yes';
    if (_YN_NEGATE.has(lead)) return 'no';
  }
  // Last resort: single-token first word (catches 'yes please too')
  const first = s.split(/\s+/)[0];
  if (_YN_AFFIRM.has(first)) return 'yes';
  if (_YN_NEGATE.has(first)) return 'no';
  return null;
};

// ── LazyOnVisible ─────────────────────────────────────────────
// Renders a small placeholder until its container scrolls within
// rootMargin of the viewport, then swaps in `children`. Used to
// keep the 47-KB inlined EXAMPLE_SVG out of the initial render
// path so first paint is faster — users who never scroll to the
// example pay no parsing cost at all.
function LazyOnVisible({ children, minHeight = 160, rootMargin = '300px' }) {
  const [seen, setSeen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (seen || !ref.current || typeof IntersectionObserver === 'undefined') {
      // Fallback for ancient browsers: just render immediately.
      if (!seen && typeof IntersectionObserver === 'undefined') setSeen(true);
      return;
    }
    const obs = new IntersectionObserver(entries => {
      if (entries.some(e => e.isIntersecting)) {
        setSeen(true);
        obs.disconnect();
      }
    }, { rootMargin });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [seen, rootMargin]);
  if (seen) return children;
  return (
    <div ref={ref} aria-hidden="true"
      style={{ minHeight, background:"#F8FAFC", borderRadius:3,
               display:"flex", alignItems:"center", justifyContent:"center",
               color:"#000000", fontSize:12, fontStyle:"italic" }}>
      Example loads when it scrolls into view…
    </div>
  );
}

const STORAGE_KEY = 'sifa_autosave_v1';

const _loadAutosave = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    return (obj && typeof obj === 'object') ? obj : null;
  } catch { return null; }
};

// ── Persisted save-file handles ──────────────────────────────────────────
// localStorage can only hold strings, but a FileSystemFileHandle is a live
// object — IndexedDB can store it directly (structured-clone capable). This
// is what lets 'Save' keep writing to the same file across a page reload,
// not just within one in-memory session: on load we pull the handle back
// out of IndexedDB; the browser itself still governs whether write access
// is silently reinstated (queryPermission) or needs one user-gesture click
// to reconfirm (requestPermission, called from saveToFile/savePortfolioToFile
// on the next Save click) — that gate is a browser security rule, not
// something a page can bypass.
const HANDLE_DB_NAME = 'sifa-handles';
const HANDLE_STORE = 'handles';

const _openHandleDB = () => new Promise((resolve, reject) => {
  if (typeof indexedDB === 'undefined') { reject(new Error('IndexedDB unavailable')); return; }
  const req = indexedDB.open(HANDLE_DB_NAME, 1);
  req.onupgradeneeded = () => { req.result.createObjectStore(HANDLE_STORE); };
  req.onsuccess = () => resolve(req.result);
  req.onerror = () => reject(req.error);
});

const _storeHandle = async (key, handle) => {
  try {
    const db = await _openHandleDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readwrite');
      tx.objectStore(HANDLE_STORE).put(handle, key);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch (e) { console.warn('Could not persist file handle:', e); }
};

const _getHandle = async (key) => {
  try {
    const db = await _openHandleDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(HANDLE_STORE, 'readonly');
      const req = tx.objectStore(HANDLE_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch (e) { return null; }
};

const _clearHandle = async (key) => {
  try {
    const db = await _openHandleDB();
    const tx = db.transaction(HANDLE_STORE, 'readwrite');
    tx.objectStore(HANDLE_STORE).delete(key);
  } catch (e) { /* nothing to clear, or IndexedDB unavailable */ }
};

// For canonical CRediT role IDs, prefer the current ROLES entry so palette updates
// take effect on restore. For custom roles (no matching canonical id), keep the saved entry.
const _reconcileRoles = (saved) => {
  if (!Array.isArray(saved) || saved.length === 0) return null;
  return saved.map(s => {
    const canon = ROLES.find(r => r.id === s.id);
    return canon ? canon : s;
  });
};

const _reconcilePortfolio = (saved) => {
  if (!Array.isArray(saved)) return [];
  return saved.map(e => ({ ...e, roles: _reconcileRoles(e.roles) || e.roles || [] }));
};

// ── TaxonomyPicker modal ─────────────────────────────────────
// Lets you add, edit, or remove roles for the taxonomy currently in use —
// whether that's the standard CRediT list or an existing custom one. Always
// pre-fills with the roles you're already using (each row carries its id),
// so appending a new role never requires retyping the others, and unedited
// rows keep every bit of data already entered against them (see
// mergeCustomRoles, which does the id-preserving merge on Apply).
function TaxonomyPicker({ open, onClose, onApply, onUseCRediT, currentMode, currentRoles }) {
  // Each entry is {id, label, desc} — id is present for pre-existing roles
  // (CRediT or custom) and absent for freshly typed rows; desc is optional
  // explanatory text shown as a hover tooltip on the role name in the table.
  const seedRoles = () => (currentRoles && currentRoles.length > 0)
    ? currentRoles.map(r => ({ id: r.id, label: r.label, desc: r.def || '' }))
    : [{ label:'', desc:'' }];
  const [roles, setRoles] = useState(seedRoles);
  const [draft, setDraft] = useState('');
  // Track which rows have the description field expanded
  const [descOpen, setDescOpen] = useState({});

  // Reset whenever the modal opens
  React.useEffect(() => {
    if (open) {
      setRoles(seedRoles());
      setDraft('');
      setDescOpen({});
    }
  }, [open]);

  if (!open) return null;

  const addRole = () => {
    const t = draft.trim();
    if (!t) return;
    setRoles(rs => {
      const next = [...rs.filter(r => r.label), { label:t, desc:'' }];
      // Open the definition field on the newly added row right away, so a
      // description can be entered as part of adding — no extra click needed.
      setDescOpen(o => ({ ...o, [next.length - 1]: true }));
      return next;
    });
    setDraft('');
  };
  const updateLabel = (i, v) => setRoles(rs => rs.map((r, idx) => idx === i ? {...r, label:v} : r));
  const updateDesc  = (i, v) => setRoles(rs => rs.map((r, idx) => idx === i ? {...r, desc:v}  : r));
  const removeRole  = (i) => setRoles(rs => rs.filter((_, idx) => idx !== i));
  const toggleDesc  = (i) => setDescOpen(o => ({...o, [i]: !o[i]}));
  // Clears the pre-filled list (whether seeded from CRediT or a prior
  // custom taxonomy) so the user can build a taxonomy from a blank slate.
  const startNewTaxonomy = () => {
    setRoles([{ label:'', desc:'' }]);
    setDescOpen({});
    setDraft('');
  };

  const cleaned = roles.map(r => ({id:r.id, label:(r.label||'').trim(), desc:(r.desc||'').trim()})).filter(r => r.label);
  const canApply = cleaned.length >= 1;

  const apply = () => {
    if (!canApply) return;
    onApply(cleaned);
  };

  return (
    <div className="no-print" style={{
      position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
      display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000,
      backdropFilter:"blur(3px)",
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background:"white", borderRadius:8, padding:"24px 28px",
        maxWidth:560, width:"94%", maxHeight:"90vh", overflowY:"auto",
        boxShadow:"0 20px 60px rgba(0,0,0,0.35)",
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
          <div>
            <h2 style={{ fontSize:17, fontWeight:700, color:"#1E293B", margin:0 }}>
              {currentMode === 'custom' ? 'Edit your taxonomy' : 'Add a role'}
            </h2>
            <p style={{ fontSize:12, color:"#000000", margin:"4px 0 0", lineHeight:1.45 }}>
              {currentMode === 'custom'
                ? <>List the contributor roles that apply to your work. Each becomes one row in the table.
                   Optionally define a role — it appears as a tooltip when hovering the role name.</>
                : <>CRediT is offered below as a starting point — add a new role at the bottom, or edit/remove
                   existing ones. Saving switches you from standard CRediT to your own taxonomy; any role you
                   leave unchanged keeps all the data you've already entered for it. Prefer to build your own
                   list from scratch instead? Use "Start a new taxonomy" below.</>}
            </p>
          </div>
          <button onClick={onClose} style={{
            background:"none", border:"none", fontSize:22, cursor:"pointer",
            color:"#000000", lineHeight:1, padding:"0 4px",
          }}>×</button>
        </div>

        {currentMode !== 'custom' && (
          <div style={{ marginBottom:12 }}>
            <button onClick={startNewTaxonomy}
              title="Clear the CRediT-seeded list and build your own taxonomy from scratch"
              style={{ border:"1px solid #CBD5E1", background:"white", color:"#000000", borderRadius:4, padding:"6px 12px", cursor:"pointer", fontSize:12, fontWeight:600 }}>
              Start a new taxonomy
            </button>
          </div>
        )}

        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:12 }}>
          {roles.map((r, i) => (
            <div key={i} style={{ display:"flex", flexDirection:"column", gap:3 }}>
              <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                <span style={{ fontSize:12, color:"#000000", width:22, textAlign:"right", flexShrink:0 }}>{i + 1}.</span>
                <input value={r.label} onChange={e => updateLabel(i, e.target.value)}
                  placeholder="e.g. Drafting, Editing, Visual design…"
                  style={{ flex:1, padding:"7px 10px", border:"1px solid #CBD5E1", borderRadius:4, fontSize:13, outline:"none" }} />
                <button onClick={() => toggleDesc(i)}
                  title={descOpen[i] ? "Hide definition" : "Define this role (shown as tooltip in table)"}
                  style={{ border:"1px solid #CBD5E1", background: descOpen[i] ? "#EFF6FF" : "#F8FAFC",
                    color: descOpen[i] ? "#2451CB" : "#000000",
                    borderRadius:4, padding:"5px 9px", cursor:"pointer", fontSize:11, fontWeight:600, flexShrink:0 }}>
                  {descOpen[i] ? "▲ define" : "▼ define"}
                </button>
                <button onClick={() => removeRole(i)}
                  title="Remove this role"
                  style={{ border:"none", background:"#F1F5F9", color:"#000000", borderRadius:4, padding:"6px 10px", cursor:"pointer", fontSize:13, flexShrink:0 }}>×</button>
              </div>
              {descOpen[i] && (
                <div style={{ display:"flex", gap:6, paddingLeft:28 }}>
                  <textarea value={r.desc} onChange={e => updateDesc(i, e.target.value)}
                    placeholder="Brief description of what this role entails — shown on hover in the table…"
                    rows={2}
                    style={{ flex:1, padding:"6px 10px", border:"1px solid #CBD5E1", borderRadius:4, fontSize:12,
                      outline:"none", resize:"vertical", fontFamily:"inherit", lineHeight:1.45,
                      color:"#000000" }} />
                </div>
              )}
            </div>
          ))}
        </div>

        <div style={{ display:"flex", gap:6, marginBottom:18 }}>
          <span style={{ fontSize:12, color:"#000000", width:22, textAlign:"right", alignSelf:"center", flexShrink:0 }}>+</span>
          <input value={draft} onChange={e => setDraft(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addRole(); } }}
            placeholder="Add another role and press Enter…"
            style={{ flex:1, padding:"7px 10px", border:"1px dashed #CBD5E1", borderRadius:4, fontSize:13, outline:"none" }} />
          <button onClick={addRole}
            style={{ border:"1px solid #2451CB", background:"white", color:"#2451CB", borderRadius:4, padding:"6px 14px", cursor:"pointer", fontSize:13, fontWeight:600, flexShrink:0 }}>
            + Add
          </button>
        </div>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:10, paddingTop:12, borderTop:"1px solid #E2E8F0" }}>
          <button onClick={onUseCRediT}
            disabled={currentMode === 'credit'}
            style={{
              border:"none", background:"none", color: currentMode === 'credit' ? "#CBD5E1" : "#000000",
              cursor: currentMode === 'credit' ? "default" : "pointer",
              fontSize:12, padding:"4px 0", textDecoration: currentMode === 'credit' ? "none" : "underline",
            }}>
            ← Switch back to CRediT
          </button>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={onClose}
              style={{ border:"1px solid #CBD5E1", background:"white", color:"#000000", borderRadius:4, padding:"7px 14px", cursor:"pointer", fontSize:13 }}>
              Cancel
            </button>
            <button onClick={apply} disabled={!canApply}
              style={{
                border:"none", background: canApply ? "#2451CB" : "#CBD5E1",
                color:"white", borderRadius:4, padding:"7px 16px",
                cursor: canApply ? "pointer" : "default",
                fontWeight:600, fontSize:13,
              }}>
              {currentMode === 'custom' ? 'Update taxonomy' : 'Save as custom taxonomy'} ({cleaned.length})
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const _restored = _loadAutosave();
  const _initialRoles = (_restored && _reconcileRoles(_restored.activeRoles)) || ROLES;
  const initData = (rls) => Object.fromEntries(rls.map(r => [r.id, { contributors:[], tool:"", reason:"", extent:0, skipped:false }]));

  const [activeRoles, setActiveRoles] = useState(_initialRoles);
  const [taxonomyMode, setTaxonomyMode] = useState(_restored?.taxonomyMode || 'credit');
  const [data, setData] = useState(() => _restored?.data || initData(_initialRoles));
  // ── Undo/redo history stack (capped at 50). The history holds
  // serialised data snapshots. We track the current index so redo
  // works after stepping back. The agent flow pauses history capture
  // and commits a single coalesced snapshot when it finishes.
  const HISTORY_CAP = 50;
  const [history, setHistory] = useState(() => [JSON.parse(JSON.stringify(_restored?.data || initData(_initialRoles)))]);
  const [historyIndex, setHistoryIndex] = useState(0);
  const _historyPaused = React.useRef(false);
  // pushHistory commits a new snapshot, truncating any redo branch
  // and capping length. Called from the setData wrapper below.
  const pushHistory = (snapshot) => {
    if (_historyPaused.current) return;
    setHistory(h => {
      const trimmed = h.slice(0, historyIndex + 1);
      trimmed.push(JSON.parse(JSON.stringify(snapshot)));
      const overflow = trimmed.length - HISTORY_CAP;
      const out = overflow > 0 ? trimmed.slice(overflow) : trimmed;
      setHistoryIndex(out.length - 1);
      return out;
    });
  };
  // Wrap setData so every external edit pushes a history entry.
  // Functional updaters are resolved first so we capture the result.
  const setDataAndPush = (next) => {
    setData(prev => {
      const v = typeof next === 'function' ? next(prev) : next;
      pushHistory(v);
      return v;
    });
  };
  const canUndo = historyIndex > 0;
  const canRedo = historyIndex < history.length - 1;
  const undo = () => {
    if (!canUndo) return;
    const i = historyIndex - 1;
    setHistoryIndex(i);
    setData(JSON.parse(JSON.stringify(history[i])));
  };
  const redo = () => {
    if (!canRedo) return;
    const i = historyIndex + 1;
    setHistoryIndex(i);
    setData(JSON.parse(JSON.stringify(history[i])));
  };
  const [agentOpen, setAgentOpen] = useState(false);
  const [radarOpen, setRadarOpen] = useState(false);
  // { roleId, reason } when there is role-level reason text that needs to be
  // assigned to a contributor; null when no prompt is pending.
  const [reasonTransferPrompt, setReasonTransferPrompt] = useState(null);
  // Colour scheme: 'multi' (14 hues) | 'mono' (slate) | 'rainbow' (vivid) | 'custom'
  const [colorScheme, setColorScheme] = useState('multi');
  const [customScheme, setCustomScheme] = useState({});
  const [customSchemeOpen, setCustomSchemeOpen] = useState(false);
  // Toolbar dropdown open-states
  const [exportMenuOpen, setExportMenuOpen] = useState(false);
  const [moreMenuOpen, setMoreMenuOpen] = useState(false);
  const [schemeMenuOpen, setSchemeMenuOpen] = useState(false);
  const exportMenuRef = useRef(null);
  const moreMenuRef = useRef(null);
  const schemeMenuRef = useRef(null);
  const [exampleOpen, setExampleOpen] = useState(false);
  // About panel collapsed by default; the prominent header makes it easy to find and open.
  const [aboutOpen, setAboutOpen] = useState(false);
  const radarRef = useRef(null);
  const portfolioRadarRef = useRef(null);
  const [portfolio, setPortfolio] = useState(_restored ? _reconcilePortfolio(_restored.portfolio) : []);
  const [portfolioOpen, setPortfolioOpen] = useState(false);
  const [restoredNotice, setRestoredNotice] = useState(!!_restored);
  const [figureFont, setFigureFont] = useState(_restored?.figureFont || 'montserrat');
  // Project name — a free-text label for which project this sIfA belongs to
  // (e.g. "Op-Ed", "WorldBank consultancy"). Shown in the toolbar next to
  // Colours, saved with the file, and carried onto portfolio entries so a
  // portfolio can hold sIfAs from several projects without losing track.
  const [projectName, setProjectName] = useState(_restored?.projectName || '');
  const [projectMenuOpen, setProjectMenuOpen] = useState(false);
  const [projectNameDraft, setProjectNameDraft] = useState('');
  const projectMenuRef = useRef(null);
  const [taxonomyPickerOpen, setTaxonomyPickerOpen] = useState(false);
  // Name-prompt modal — opens when the user clicks 'Add to Portfolio'
  // so they can give the entry a meaningful name at the point of
  // saving (rather than having to rename it afterwards).
  const [namePromptOpen, setNamePromptOpen] = useState(false);
  const [namePromptValue, setNamePromptValue] = useState('');
  // Autosave-nudge state — time-based reminder to write a .sifa.json
  // after a stretch of editing without a file save. lastSaveTime tracks
  // the last time the user wrote a portable file; lastEditTime tracks
  // any data mutation. The nudge appears when the user has been
  // editing in the last 5 min but hasn't saved in the last 20 min.
  // editsSinceFileSave is retained (set but currently unused for the
  // banner trigger) so the loaded-file count reset remains harmless.
  const [editsSinceFileSave, setEditsSinceFileSave] = useState(0);
  const [nudgeDismissed, setNudgeDismissed] = useState(false);
  const [lastSaveTime, setLastSaveTime] = useState(() => Date.now());
  const [lastEditTime, setLastEditTime] = useState(() => Date.now());
  // Tick state advances every 30s so the time-based nudge re-evaluates
  // without needing a state change elsewhere.
  const [_nudgeTick, setNudgeTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setNudgeTick(t => t + 1), 30 * 1000);
    return () => clearInterval(id);
  }, []);

  // Close toolbar dropdowns when the user clicks outside them
  useEffect(() => {
    const handler = (e) => {
      if (exportMenuRef.current && !exportMenuRef.current.contains(e.target)) setExportMenuOpen(false);
      if (moreMenuRef.current   && !moreMenuRef.current.contains(e.target))   setMoreMenuOpen(false);
      if (schemeMenuRef.current && !schemeMenuRef.current.contains(e.target)) setSchemeMenuOpen(false);
      if (projectMenuRef.current && !projectMenuRef.current.contains(e.target)) setProjectMenuOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  // File handles from the File System Access API. Restored from IndexedDB
  // on mount (see effect below) so repeated saves — including the first
  // save after a page reload — overwrite the same file the user originally
  // named, instead of prompting for a new name each time. Cleared on
  // loading a full-state file, since that swaps in a different document
  // with (usually) a different file on disk to write back to.
  const fileHandleRef = useRef(null);
  const portfolioFileHandleRef = useRef(null);
  useEffect(() => {
    (async () => {
      const h = await _getHandle('main');
      if (h) fileHandleRef.current = h;
      const ph = await _getHandle('portfolio');
      if (ph) portfolioFileHandleRef.current = ph;
    })();
  }, []);
  const _autosaveHasMounted = useRef(false);
  const fileInputRef = useRef(null);
  const tableSectionRef = useRef(null);

  // Scroll the table area into view (used by Option 2 and the inline 'table' link)
  const scrollToTable = () => {
    if (tableSectionRef.current) {
      tableSectionRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  // Inline-link style for the hyperlinks in the About panel
  const _linkStyle = {
    background: 'none', border: 'none', padding: 0, margin: 0, cursor: 'pointer',
    color: '#2451CB', textDecoration: 'underline', font: 'inherit', display: 'inline',
  };

  // Apply a custom taxonomy from the table-mode shortcut. Roles that were
  // already active (matched by id — see mergeCustomRoles) keep their id and
  // colour, so adding a role alongside an unchanged list — CRediT or custom —
  // never discards existing data. Confirms only when a role is genuinely
  // being dropped (removed or renamed) and had data entered against it.
  const applyCustomTaxonomy = (entries) => {
    const newRoles = mergeCustomRoles(entries, activeRoles);
    const newIds = new Set(newRoles.map(r => r.id));
    const filledIds = activeRoles.filter(r => {
      const d = data[r.id];
      return d && ((d.contributors||[]).length > 0 || d.extent > 0 || d.tool || d.reason);
    }).map(r => r.id);
    const losing = filledIds.filter(id => !newIds.has(id));
    if (losing.length > 0) {
      const proceed = confirm(`Switching taxonomy will discard data in ${losing.length} role${losing.length === 1 ? '' : 's'} that don't appear in the new list. Continue?`);
      if (!proceed) return;
    }
    onSetRoles(newRoles, 'custom');
    setTaxonomyPickerOpen(false);
  };

  const switchToCRediT = () => {
    if (taxonomyMode === 'credit') return;
    const filledIds = activeRoles.filter(r => {
      const d = data[r.id];
      return d && ((d.contributors||[]).length > 0 || d.extent > 0 || d.tool || d.reason);
    }).map(r => r.id);
    const credIds = new Set(ROLES.map(r => r.id));
    const losing = filledIds.filter(id => !credIds.has(id));
    if (losing.length > 0) {
      const proceed = confirm(`Switching to CRediT will discard data in ${losing.length} custom role${losing.length === 1 ? '' : 's'}. Continue?`);
      if (!proceed) return;
    }
    onSetRoles(ROLES, 'credit');
    setTaxonomyPickerOpen(false);
  };

  // Quiet autosave — runs whenever the editable state changes.
  // Also bumps an edit counter so the nudge banner knows when to
  // appear, suggesting the user write out a portable .sifa.json.
  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        version: 1,
        savedAt: new Date().toISOString(),
        projectName, activeRoles, taxonomyMode, data, portfolio, figureFont,
      }));
    } catch {}
    if (_autosaveHasMounted.current) {
      setEditsSinceFileSave(n => n + 1);
      setLastEditTime(Date.now());
    } else {
      _autosaveHasMounted.current = true;
    }
  }, [projectName, activeRoles, taxonomyMode, data, portfolio, figureFont]);

  // Cmd/Ctrl+S → trigger the same Save-sIfA action as the toolbar.
  // The native "save webpage" dialog is preempted (it's never what a
  // user means in a single-page tool of this shape).
  useEffect(() => {
    const onKey = (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && (e.key === 's' || e.key === 'S')) {
        e.preventDefault();
        saveToFile();
        return;
      }
      // Cmd/Ctrl+P → Save as PDF (preempt browser print)
      if (mod && (e.key === 'p' || e.key === 'P')) {
        e.preventDefault();
        saveAsPDF();
        return;
      }
      // Undo / redo. Shift+Z (or Ctrl+Y on non-Mac) redoes.
      if (mod && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
        e.preventDefault();
        undo();
        return;
      }
      if (mod && e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
        e.preventDefault();
        redo();
        return;
      }
      if (mod && (e.key === 'y' || e.key === 'Y')) {
        e.preventDefault();
        redo();
        return;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  // Save to a .sifa.json file the user controls.
  // Uses the File System Access API (showSaveFilePicker) when available so the user
  // gets a real "Save as…" dialog; falls back to the legacy download flow otherwise.
  const saveToFile = async () => {
    const payload = {
      version: 1,
      kind: 'sifa-tool-state',
      savedAt: new Date().toISOString(),
      projectName, activeRoles, taxonomyMode, data, portfolio, figureFont,
    };
    const json = JSON.stringify(payload, null, 2);

    // Reuse the handle from a previous save in this session, if we have
    // one and still hold write permission — this is what makes repeated
    // saves overwrite the same named file instead of prompting for a new
    // name every time. The user only sees the "Save as…" dialog once.
    if (fileHandleRef.current) {
      try {
        const handle = fileHandleRef.current;
        const already = (await handle.queryPermission?.({ mode: 'readwrite' })) ?? 'granted';
        const granted = already === 'granted' || (await handle.requestPermission?.({ mode: 'readwrite' })) === 'granted';
        if (granted) {
          const writable = await handle.createWritable();
          await writable.write(json);
          await writable.close();
          setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
          return;
        }
      } catch (err) {
        // Handle gone stale (file moved/deleted, permission revoked) —
        // drop it (including the persisted copy) and fall through to
        // asking for a location again.
        fileHandleRef.current = null;
        _clearHandle('main');
        console.warn('Saved file handle no longer usable, re-prompting:', err);
      }
    }

    const ts = new Date().toISOString().slice(0,10);
    const fname = `sIfA_${ts}.sifa.json`;

    // Modern path — Chromium-based browsers support window.showSaveFilePicker
    if (typeof window !== 'undefined' && window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: fname,
          types: [{ description: 'sIfA file', accept: { 'application/json': ['.sifa.json', '.json'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        fileHandleRef.current = handle;
        _storeHandle('main', handle);
        setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
        return;
      } catch (err) {
        // User cancelled the save dialog — respect that and bail out silently
        if (err && (err.name === 'AbortError' || err.code === 20)) return;
        // Any other error (API not really supported, permissions, etc.) → fall through to download
        console.warn('Save-as dialog unavailable, falling back to download:', err);
      }
    }

    // Fallback — triggers the browser's standard download flow. No file
    // handle exists in this path, so there is nothing to persist; every
    // save here is necessarily a fresh download.
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);
    setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
  };

  // Slim save — writes ONLY the portfolio entries to a .sifa.json so
  // a user can archive or share a portfolio without dragging the
  // current in-progress draft along with it. The matching load path
  // recognises kind === 'sifa-portfolio' and merges entries into the
  // existing portfolio rather than replacing the full state.
  const savePortfolioToFile = async () => {
    if (portfolio.length === 0) return;
    const payload = {
      version: 1,
      kind: 'sifa-portfolio',
      savedAt: new Date().toISOString(),
      portfolio,
    };
    const json  = JSON.stringify(payload, null, 2);

    // Reuse the handle from a previous portfolio save in this session —
    // same reasoning as saveToFile above.
    if (portfolioFileHandleRef.current) {
      try {
        const handle = portfolioFileHandleRef.current;
        const already = (await handle.queryPermission?.({ mode: 'readwrite' })) ?? 'granted';
        const granted = already === 'granted' || (await handle.requestPermission?.({ mode: 'readwrite' })) === 'granted';
        if (granted) {
          const writable = await handle.createWritable();
          await writable.write(json);
          await writable.close();
          setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
          return;
        }
      } catch (err) {
        portfolioFileHandleRef.current = null;
        _clearHandle('portfolio');
        console.warn('Saved portfolio file handle no longer usable, re-prompting:', err);
      }
    }

    const ts    = new Date().toISOString().slice(0,10);
    const fname = `sIfA-portfolio_${ts}.sifa.json`;

    if (typeof window !== 'undefined' && window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: fname,
          types: [{ description: 'sIfA portfolio file', accept: { 'application/json': ['.sifa.json', '.json'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        portfolioFileHandleRef.current = handle;
        _storeHandle('portfolio', handle);
        setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
        return;
      } catch (err) {
        if (err && (err.name === 'AbortError' || err.code === 20)) return;
        console.warn('Save-as dialog unavailable, falling back to download:', err);
      }
    }
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);
    setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
  };

  // ── saveAsPDFWithFigure: inserts the sIfA figure SVG before the table in the
  // print output, prints, then removes it. Called from the figure panel.
  const saveAsPDFWithFigure = () => {
    // Mirror input values so print serialisation sees typed text
    try {
      document.querySelectorAll('input').forEach(el => el.setAttribute('value', el.value));
      document.querySelectorAll('textarea').forEach(el => { el.textContent = el.value; });
    } catch(e) {}

    let svgData = null;
    try { svgData = radarRef.current?._buildFigureOnlySVG?.(); } catch(e) {}

    if (svgData) {
      const div = document.createElement('div');
      div.className = 'print-figure-section no-screen';
      div.innerHTML = svgData;
      document.body.insertBefore(div, document.body.firstChild);
      // 200ms gives browsers time to parse and lay out the injected SVG
      setTimeout(() => {
        window.print();
        setTimeout(() => { if (div.parentNode) div.parentNode.removeChild(div); }, 500);
      }, 200);
    } else {
      // Fallback: print without figure
      window.print();
    }
  };

  // ── saveAsPDF: opens the browser's print dialog so the user can
  // pick "Save as PDF" as the destination. The enriched @media print
  // block in the top-of-file <style> hides controls/banners, sets A4
  // page size + margins, avoids splitting figures/portfolio entries
  // across pages, and switches typography to a print-friendly stack.
  // We print the live DOM directly (not a popup-cloned copy) because
  // a popup using document.body.innerHTML would lose all user-typed
  // input values — HTML serialisation captures only the original
  // `value=` attribute, not the current React-controlled value.
  // Before printing, we mirror each input's live value into its
  // `value` attribute so any code path that reads from attribute
  // state (rather than the IDL property) still sees typed text.
  // Bound to Cmd/Ctrl+P and the toolbar button.
  const saveAsPDF = () => {
    try {
      document.querySelectorAll('input').forEach(el => {
        el.setAttribute('value', el.value);
      });
      document.querySelectorAll('textarea').forEach(el => {
        // textareas serialise their value as text children
        el.textContent = el.value;
      });
    } catch (e) {}

    // This path prints the live table with no figure injected (unlike
    // saveAsPDFWithFigure, whose SVG already carries a Project subtitle) —
    // add the same subtitle as a print-only banner so a table-only PDF
    // still says which project it belongs to.
    const pn = projectName.trim();
    let banner = null;
    if (pn) {
      banner = document.createElement('div');
      banner.className = 'print-project-banner';
      banner.textContent = `Project: ${pn}`;
      document.body.insertBefore(banner, document.body.firstChild);
    }
    window.print();
    if (banner && banner.parentNode) banner.parentNode.removeChild(banner);
  };

  const loadFromFile = () => fileInputRef.current?.click();

  const handleFileLoad = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        if (!obj || typeof obj !== 'object') throw new Error('Invalid file');

        // Portfolio-only file → merge entries into the existing portfolio,
        // leaving the current draft untouched. Ids are regenerated to
        // avoid collisions with anything already in the portfolio.
        const portfolioOnly = obj.kind === 'sifa-portfolio'
          || (Array.isArray(obj.portfolio) && !obj.data);
        if (portfolioOnly) {
          if (!Array.isArray(obj.portfolio)) throw new Error('Invalid portfolio file');
          const incoming = _reconcilePortfolio(obj.portfolio);
          if (incoming.length === 0) {
            alert('That portfolio file is empty — nothing to add.');
            return;
          }
          let _seed = Date.now();
          const reIded = incoming.map(entry => ({
            ...entry,
            id: ++_seed + Math.floor(Math.random() * 1000),
          }));
          setPortfolio(prev => [...prev, ...reIded]);
          return;
        }

        // Full-state file → replace everything (existing behaviour).
        if (!obj.data) throw new Error('Invalid file');
        const newRoles = _reconcileRoles(obj.activeRoles) || ROLES;
        setActiveRoles(newRoles);
        setTaxonomyMode(obj.taxonomyMode || 'credit');
        setData(obj.data);
        setPortfolio(_reconcilePortfolio(obj.portfolio));
        if (obj.figureFont) setFigureFont(obj.figureFont);
        setProjectName(obj.projectName || '');
        setRestoredNotice(false);
        // This is a different document from whatever we may have been
        // saving to before — the next Save should ask where to put it.
        fileHandleRef.current = null;
        _clearHandle('main');
        setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
      } catch {
        alert('Could not load this file. It may be corrupted or in the wrong format.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Opens the name-prompt modal pre-filled with the default name.
  // Cancelling closes the modal without adding anything.
  const openAddToPortfolio = () => {
    if (!anyFilled) return;
    setNamePromptValue(`sIfA ${portfolio.length + 1}`);
    setNamePromptOpen(true);
  };
  // Commits the entry once a name has been chosen. Blank input falls
  // back to the auto-generated default so a quick Enter still works.
  const addToPortfolio = (rawName) => {
    if (!anyFilled) return;
    const fallback = `sIfA ${portfolio.length + 1}`;
    const name = (rawName == null ? '' : String(rawName)).trim() || fallback;
    setPortfolio(p => [...p, {
      id: Date.now(),
      name,
      projectName,
      data: JSON.parse(JSON.stringify(data)),
      roles: [...activeRoles],
      taxonomyMode,
    }]);
    setNamePromptOpen(false);
  };

  const removeFromPortfolio = (id) => setPortfolio(p => p.filter(e => e.id !== id));

  // Overwrite a portfolio entry with the current draft. Asks first so a
  // stray click can't replace a saved entry.
  const updatePortfolioFromDraft = (id) => {
    const entry = portfolio.find(e => e.id === id);
    if (!entry) return;
    if (!confirm(`Update '${entry.name}' with the current draft? This replaces the saved entry.`)) return;
    setPortfolio(p => p.map(e => e.id === id ? {
      ...e,
      projectName,
      data: JSON.parse(JSON.stringify(data)),
      roles: [...activeRoles],
      taxonomyMode,
      figureFont,
    } : e));
  };

  // Pull a saved entry back into the live draft. Closes the portfolio
  // panel so the user lands on the populated table.
  const loadPortfolioIntoDraft = (id) => {
    const entry = portfolio.find(e => e.id === id);
    if (!entry) return;
    if (!confirm(`Load '${entry.name}' into the draft? This replaces what you're currently editing.`)) return;
    const newRoles = _reconcileRoles(entry.roles) || ROLES;
    setActiveRoles(newRoles);
    setTaxonomyMode(entry.taxonomyMode || 'credit');
    setData(JSON.parse(JSON.stringify(entry.data)));
    if (entry.figureFont) setFigureFont(entry.figureFont);
    setProjectName(entry.projectName || '');
    setPortfolioOpen(false);
  };

  const renamePortfolioEntry = (id, name) =>
    setPortfolio(p => p.map(e => e.id === id ? {...e, name} : e));

  const computePortfolioAvg = () => {
    if (portfolio.length === 0) return { avgData:{}, avgRoles:[] };
    const roleMap = new Map();
    portfolio.forEach(e => e.roles.forEach(r => { if (!roleMap.has(r.id)) roleMap.set(r.id, r); }));
    const avgRoles = [...roleMap.values()];
    const avgData = {};
    avgRoles.forEach(r => {
      const vals = portfolio
        .filter(e => e.data[r.id] && !e.data[r.id].skipped)
        .map(e => e.data[r.id]?.extent || 0);
      avgData[r.id] = vals.length > 0
        ? { extent: vals.reduce((s,v) => s+v, 0) / vals.length, contributors:[], tool:'', reason:'', skipped:false }
        : { extent:0, contributors:[], tool:'', reason:'', skipped:true };
    });
    return { avgData, avgRoles };
  };

  const onSetRoles = (newRoles, mode) => {
    setActiveRoles(newRoles);
    setTaxonomyMode(mode || 'credit');
    setDataAndPush(prev => {
      const nd = initData(newRoles);
      newRoles.forEach(r => { if (prev[r.id]) nd[r.id] = prev[r.id]; });
      return nd;
    });
  };

  const update = (id, patch) => setDataAndPush(p => ({ ...p, [id]: { ...p[id], ...patch } }));

  const LW = { Sole: 1.0, Lead: 0.7, Equal: 0.5, Support: 0.3 };
  const reweigh = (contribs) => {
    const { wSum, wTotal } = contribs.reduce((acc, c) => {
      const w = LW[c.level] || 0.5;
      return { wSum: acc.wSum + (c.extent||0)*w, wTotal: acc.wTotal + w };
    }, { wSum:0, wTotal:0 });
    return wTotal > 0 ? wSum/wTotal : 0;
  };
  const updateContrib = (roleId, idx, fields) =>
    setDataAndPush(prev => {
      const d = prev[roleId];
      const cs = (d.contributors||[]).map((c,i) => i===idx ? {...c,...fields} : c);
      return { ...prev, [roleId]: { ...d, contributors:cs, extent:reweigh(cs) }};
    });
  const addContrib = (roleId) => {
    // If there was role-level "how was AI used" text typed before any contributor
    // existed, surface a prompt so the user can decide what to do with it.
    const existingD = data[roleId];
    if ((existingD?.contributors || []).length === 0 && (existingD?.reason || '').trim()) {
      setReasonTransferPrompt({ roleId, reason: existingD.reason.trim() });
    }
    setDataAndPush(prev => {
      const d = prev[roleId];
      const existing = d.contributors || [];
      // First contributor on a role has nothing to share credit with, so
      // Sole is the only level that makes sense as a default. Adding a
      // second flips both to Equal — a reasonable starting assumption for
      // two people on one role — which can then be adjusted by hand (e.g.
      // to Lead/Support) if the split isn't actually even. From a third
      // contributor onward, new entries default to Equal too, matching
      // the existing rule that all contributors must share Equal once the
      // group is in that mode (see the AI-agent interview's own level
      // constraints above).
      const newLevel = existing.length === 0 ? 'Sole' : 'Equal';
      const cs = existing.length === 1
        ? [{ ...existing[0], level: 'Equal' }, { name:'', level:'Equal', tool:'', reason:'', extent:0 }]
        : [...existing, { name:'', level:newLevel, tool:'', reason:'', extent:0 }];
      return { ...prev, [roleId]: { ...d, contributors:cs, extent:reweigh(cs) }};
    });
  };
  const removeContrib = (roleId, idx) =>
    setDataAndPush(prev => {
      const d = prev[roleId];
      const cs = (d.contributors||[]).filter((_,i) => i!==idx);
      return { ...prev, [roleId]: { ...d, contributors:cs, extent:reweigh(cs) }};
    });

  const exportCSV = () => {
    // One row per contributor. The CRediT Role and the Average extent columns
    // appear once per role (on the first contributor row); on continuation
    // rows for the same role they are left blank, so the file opens as a
    // grouped table — like merged cells in a spreadsheet — without losing
    // any per-contributor detail (extent / how / tool sit on their own rows).
    const hdr = "CRediT Role,Performed by,Extent of AI use per contributor,Average extent of AI use across contributors,How was AI used,Tool / Service\n";
    const fmt1 = (n) => {
      const x = (typeof n === 'number') ? n : Number(n);
      return (Number.isFinite(x)) ? x.toFixed(1) : '';
    };
    const esc = (s) => String(s ?? '').replace(/"/g, '""');
    const rows = [];
    activeRoles.forEach(r => {
      const d = data[r.id] || {};
      const contribs = d.contributors || [];
      const avgExtent = fmt1(d.extent);
      if (contribs.length === 0) {
        // No per-contributor data — emit a single row carrying legacy fields
        // (if any) so .sifa.json state from older versions still round-trips.
        rows.push(`"${esc(r.label)}","","","${avgExtent}","${esc(d.reason || '')}","${esc(d.tool || '')}"`);
        return;
      }
      contribs.forEach((c, i) => {
        const labelCol = (i === 0) ? esc(r.label) : '';
        const avgCol   = (i === 0) ? avgExtent   : '';
        const performedBy = c.level ? `${c.name} (${c.level})` : (c.name || '');
        rows.push(`"${labelCol}","${esc(performedBy)}","${fmt1(c.extent ?? 0)}","${avgCol}","${esc(c.reason || '')}","${esc(c.tool || '')}"`);
      });
    });
    const body = rows.join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([hdr+body], { type:"text/csv" }));
    a.download = "AI_Contribution_Statement.csv";
    a.click();
  };

  const reset = () => { if (confirm("Clear all entries?")) setDataAndPush(initData(activeRoles)); };

  const anyFilled = activeRoles.some(r => {
    const d = data[r.id];
    return (d?.contributors||[]).length > 0 || d?.extent > 0 || d?.tool || d?.reason;
  });
  // Only hide roles explicitly skipped — never restructure the table mid-edit
  const visibleRoles = activeRoles.filter(r => !data[r.id]?.skipped);

  // Derive per-role colours based on the active colour scheme
  const getSchemeStyle = (role, i) => {
    if (colorScheme === 'mono')    return MONO_STYLE;
    if (colorScheme === 'rainbow') return RAINBOW_STYLES[i % RAINBOW_STYLES.length];
    if (colorScheme === 'custom') {
      const c = customScheme[role.id] || {};
      return { bg: c.bg||role.bg, accent: c.accent||role.accent, border: c.border||role.border };
    }
    return { bg: role.bg, accent: role.accent, border: role.border };
  };

  // All unique contributor names entered anywhere in the table — used to offer
  // one-click autofill chips for empty name fields so repeat contributors
  // don't need re-typing across roles.
  const allContribNames = (() => {
    const seen = new Set();
    const names = [];
    for (const r of activeRoles) {
      for (const c of (data[r.id]?.contributors || [])) {
        const nm = (c.name || '').trim();
        if (nm && !seen.has(nm)) { seen.add(nm); names.push(nm); }
      }
    }
    return names;
  })();

  // Same idea for Tool/Service — every distinct tool name typed anywhere,
  // offered as chips on empty tool fields. Replaces the old native
  // <datalist> autocomplete, which can't attach to a <textarea>; the Tool
  // field is now multiline so long tool lists actually wrap instead of
  // scrolling sideways in a narrow single-line input.
  const allToolNames = (() => {
    const seen = new Set();
    const tools = [];
    for (const r of activeRoles) {
      const d = data[r.id] || {};
      const candidates = [(d.tool || '').trim(), ...(d.contributors || []).map(c => (c.tool || '').trim())];
      for (const t of candidates) {
        if (t && !seen.has(t)) { seen.add(t); tools.push(t); }
      }
    }
    return tools;
  })();

  const filled = activeRoles.filter(r => (data[r.id]?.extent || 0) > 0 || data[r.id]?.tool).length;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>

      {/* Hidden file input for Load sIfA */}
      <input ref={fileInputRef} type="file" accept=".json,application/json"
        onChange={handleFileLoad} style={{ display:"none" }} />

      {/* Autosave-nudge banner — appears after 20 minutes of editing
          without writing out a portable .sifa.json, and only if the
          user is still active (an edit in the last 5 min). The 30 s
          tick (above) re-evaluates this. Dismissible. */}
      {!restoredNotice && !nudgeDismissed && (Date.now() - lastSaveTime) > 20 * 60 * 1000 && (Date.now() - lastEditTime) < 5 * 60 * 1000 && (
        <div className="no-print" role="status" aria-live="polite" style={{
          background:"#EFF6FF", borderBottom:"1px solid #BFDBFE",
          padding:"8px 28px", display:"flex", justifyContent:"space-between",
          alignItems:"center", fontSize:12, color:"#1E40AF", flexShrink:0, gap:12,
        }}>
          <span>💾 You haven't saved a <code style={{ background:"#DBEAFE", padding:"1px 5px", borderRadius:2, fontSize:12 }}>.sifa.json</code> in the last 20 minutes — your work is otherwise only in this browser's local storage.</span>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <button onClick={saveToFile}
              title="Save the current sIfA to a .sifa.json file (also: ⌘/Ctrl+S)"
              style={{ border:"1px solid #2451CB", background:"#2451CB", color:"white", cursor:"pointer", fontSize:12, fontWeight:700, padding:"4px 12px", borderRadius:3, whiteSpace:"nowrap" }}>
              💾 Save sIfA
            </button>
            <button onClick={() => setNudgeDismissed(true)} aria-label="Dismiss save reminder"
              title="Dismiss this reminder until the next save"
              style={{ border:"none", background:"transparent", color:"#1E40AF", cursor:"pointer", fontSize:14, fontWeight:700, padding:"0 4px" }}>×</button>
          </div>
        </div>
      )}

      {/* Restored-from-autosave notice */}
      {restoredNotice && (
        <div className="no-print" role="status" aria-live="polite" style={{
          background:"#FEF3C7", borderBottom:"1px solid #FCD34D",
          padding:"8px 28px", display:"flex", justifyContent:"space-between",
          alignItems:"center", fontSize:12, color:"#78350F", flexShrink:0, gap:12,
        }}>
          <span>↻ Restored your previous sIfA from this browser. Use 💾 Save sIfA to keep a copy elsewhere.</span>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <button onClick={() => {
              if (confirm("Start a fresh sIfA? This will clear the autosaved entries in this browser. Your downloaded .sifa.json files are not affected.")) {
                try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
                window.location.reload();
              }
            }}
              title="Clear the autosaved sIfA and start over"
              style={{ border:"1px solid #B45309", background:"white", color:"#78350F", cursor:"pointer", fontSize:12, fontWeight:600, padding:"3px 10px", borderRadius:3, whiteSpace:"nowrap" }}>
              ↻ Start fresh
            </button>
            <button onClick={() => setRestoredNotice(false)}
              title="Dismiss this notice (keeps your restored entries)"
              style={{ border:"none", background:"transparent", color:"#78350F", cursor:"pointer", fontSize:14, fontWeight:700, padding:"0 4px" }}>×</button>
          </div>
        </div>
      )}

      {/* ── Header ── */}
      <header className="no-print" style={{
        background:"white", borderBottom:"2px solid #F1F5F9",
        padding:"0 16px", flexShrink:0, height:56,
        display:"flex", alignItems:"center", gap:6,
        boxShadow:"0 1px 6px rgba(0,0,0,0.06)",
      }}>

        {/* Brand */}
        <div style={{
          background:"#DD5510", borderRadius:8, padding:"8px 18px",
          display:"flex", alignItems:"baseline", gap:8, marginRight:10, flexShrink:0,
          boxShadow:"0 2px 6px rgba(221,85,16,0.35)",
        }}>
          <span style={{ fontSize:24, fontWeight:900, color:"white", letterSpacing:"-0.04em" }}>sIfA</span>
          <span style={{ fontSize:14, color:"rgba(255,255,255,0.85)", fontWeight:700 }}>v{APP_VERSION}</span>
        </div>

        {/* Separator */}
        <div style={{ width:1, height:24, background:"#E2E8F0", marginRight:2, flexShrink:0 }} />

        {/* Entry mode */}
        <button onClick={() => { _historyPaused.current = true; setAgentOpen(true); }}
          title="Fill in your sIfA with a guided agent"
          style={{ padding:"6px 14px", borderRadius:6, border:"none",
            background:"#2563EB", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer", flexShrink:0 }}>
          AI agent
        </button>
        <button onClick={() => { setAgentOpen(false); scrollToTable(); }}
          title="Fill in the table directly"
          style={{ padding:"6px 14px", borderRadius:6, border:"none",
            background:"#0D9488", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer", flexShrink:0 }}>
          Fill table
        </button>

        {/* Separator */}
        <div style={{ width:1, height:24, background:"#E2E8F0", margin:"0 2px", flexShrink:0 }} />

        {/* Figure */}
        <button onClick={() => setRadarOpen(true)}
          title="View the sIfA figure"
          style={{ padding:"6px 14px", borderRadius:6, border:"none",
            background:"#7C3AED", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer", flexShrink:0 }}>
          View figure
        </button>

        {/* Export dropdown */}
        <div ref={exportMenuRef} style={{ position:"relative", flexShrink:0 }}>
          <button onClick={() => setExportMenuOpen(o => !o)}
            title="Download SVG or JPEG exports"
            style={{ padding:"6px 14px", borderRadius:6, border:"none",
              background:"#D97706", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer",
              display:"flex", alignItems:"center", gap:5 }}>
            Export <span style={{ fontSize:12, opacity:0.8 }}>▾</span>
          </button>
          {exportMenuOpen && (
            <div style={{
              position:"absolute", top:"calc(100% + 4px)", left:0, zIndex:200,
              background:"white", border:"1px solid #E2E8F0", borderRadius:8,
              boxShadow:"0 4px 16px rgba(0,0,0,0.12)", padding:"6px 0", minWidth:220,
            }}>
              {[
                { label:"Table & Figure — SVG",  action:() => radarRef.current?.downloadSVG('svg') },
                { label:"Table & Figure — JPEG", action:() => radarRef.current?.downloadSVG('jpeg') },
                { label:"Figure only — SVG",     action:() => radarRef.current?.downloadFigureOnly('svg') },
                { label:"Figure only — JPEG",    action:() => radarRef.current?.downloadFigureOnly('jpeg') },
                { label:"Export CSV",            action:exportCSV },
              ].map(item => (
                <button key={item.label} onClick={() => { item.action(); setExportMenuOpen(false); }}
                  style={{ display:"block", width:"100%", textAlign:"left",
                    padding:"8px 16px", border:"none", background:"transparent",
                    color:"#000000", fontSize:12, cursor:"pointer" }}
                  onMouseEnter={e => e.currentTarget.style.background='#F8FAFC'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                  {item.label}
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Separator */}
        <div style={{ width:1, height:24, background:"#E2E8F0", margin:"0 2px", flexShrink:0 }} />

        {/* Save dropdown */}
        <div ref={moreMenuRef} style={{ position:"relative", flexShrink:0 }}>
          <button onClick={() => setMoreMenuOpen(o => !o)}
            title="Save options"
            style={{ padding:"6px 14px", borderRadius:6, border:"none",
              background:"#059669", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer",
              display:"flex", alignItems:"center", gap:5 }}>
            💾 Save <span style={{ fontSize:12, opacity:0.8 }}>▾</span>
          </button>
          {moreMenuOpen && (
            <div style={{
              position:"absolute", top:"calc(100% + 4px)", left:0, zIndex:200,
              background:"white", border:"1px solid #E2E8F0", borderRadius:8,
              boxShadow:"0 4px 16px rgba(0,0,0,0.12)", padding:"6px 0", minWidth:190,
            }}>
              {[
                { label:"💾 Save sIfA (.json)", action:saveToFile },
                { label:"📄 Save as PDF",        action:saveAsPDFWithFigure },
              ].map(item => (
                <button key={item.label} onClick={() => { item.action(); setMoreMenuOpen(false); }}
                  style={{ display:"block", width:"100%", textAlign:"left",
                    padding:"8px 16px", border:"none", background:"transparent",
                    color:"#000000", fontSize:12, cursor:"pointer" }}
                  onMouseEnter={e => e.currentTarget.style.background='#F8FAFC'}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                  {item.label}
                </button>
              ))}
              <div style={{ height:1, background:"#F1F5F9", margin:"4px 0" }} />
              <button onClick={() => { reset(); setMoreMenuOpen(false); }}
                style={{ display:"block", width:"100%", textAlign:"left",
                  padding:"8px 16px", border:"none", background:"transparent",
                  color:"#EF4444", fontSize:12, cursor:"pointer" }}
                onMouseEnter={e => e.currentTarget.style.background='#FEF2F2'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                ↺ Reset
              </button>
            </div>
          )}
        </div>

        {/* Load */}
        <button onClick={loadFromFile}
          title="Load a previously saved .sifa.json"
          style={{ padding:"6px 14px", borderRadius:6, border:"none",
            background:"#475569", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer", flexShrink:0 }}>
          📂 Load
        </button>

        {/* Separator */}
        <div style={{ width:1, height:24, background:"#E2E8F0", margin:"0 2px", flexShrink:0 }} />

        {/* Undo / Redo */}
        <button onClick={undo} disabled={!canUndo} title="Undo (⌘Z)" aria-label="Undo"
          style={{ padding:"6px 12px", borderRadius:6,
            border: canUndo?"2px solid #334155":"1px solid #CBD5E1",
            background: canUndo?"#F8FAFC":"white", color: canUndo?"#0F172A":"#A0AEC0",
            fontSize:20, fontWeight:800, cursor: canUndo?"pointer":"not-allowed", flexShrink:0,
            lineHeight:1 }}>↶</button>
        <button onClick={redo} disabled={!canRedo} title="Redo (⌘⇧Z)" aria-label="Redo"
          style={{ padding:"6px 12px", borderRadius:6,
            border: canRedo?"2px solid #334155":"1px solid #CBD5E1",
            background: canRedo?"#F8FAFC":"white", color: canRedo?"#0F172A":"#A0AEC0",
            fontSize:20, fontWeight:800, cursor: canRedo?"pointer":"not-allowed", flexShrink:0,
            lineHeight:1 }}>↷</button>

        {/* Colours picker */}
        <div ref={schemeMenuRef} style={{ position:"relative", flexShrink:0 }}>
          <button onClick={() => setSchemeMenuOpen(o => !o)} title="Change colour scheme"
            style={{ padding:"6px 14px", borderRadius:6, border:"none",
              background:"#DB2777", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer",
              display:"flex", alignItems:"center", gap:6 }}>
            🎨 Colours <span style={{ fontSize:12, opacity:0.8 }}>▾</span>
          </button>
          {schemeMenuOpen && (
            <div style={{
              position:"absolute", top:"calc(100% + 4px)", right:0, zIndex:200,
              background:"white", border:"1px solid #E2E8F0", borderRadius:8,
              boxShadow:"0 4px 16px rgba(0,0,0,0.12)", padding:"6px 0", minWidth:180,
            }}>
              {[
                { key:'multi',   label:'Multi-colour', desc:'14 distinct role hues' },
                { key:'rainbow', label:'Rainbow',      desc:'Vivid saturated colours' },
                { key:'mono',    label:'Monochrome',   desc:'Neutral slate palette' },
              ].map(s => (
                <button key={s.key} onClick={() => { setColorScheme(s.key); setSchemeMenuOpen(false); }}
                  style={{ display:"block", width:"100%", textAlign:"left",
                    padding:"8px 16px", border:"none",
                    background: colorScheme===s.key ? '#FDF2F8' : 'transparent', cursor:"pointer" }}
                  onMouseEnter={e => { if (colorScheme!==s.key) e.currentTarget.style.background='#F8FAFC'; }}
                  onMouseLeave={e => { if (colorScheme!==s.key) e.currentTarget.style.background='transparent'; }}>
                  <div style={{ fontSize:12, fontWeight:colorScheme===s.key?700:400, color:colorScheme===s.key?'#DB2777':'#000000' }}>{s.label}</div>
                  <div style={{ fontSize:12, color:"#000000", marginTop:1 }}>{s.desc}</div>
                </button>
              ))}
              <div style={{ height:1, background:"#F1F5F9", margin:"4px 0" }} />
              <button onClick={() => { setSchemeMenuOpen(false); setCustomSchemeOpen(true); }}
                style={{ display:"block", width:"100%", textAlign:"left",
                  padding:"8px 16px", border:"none",
                  background:colorScheme==='custom'?'#FDF2F8':'transparent', cursor:"pointer" }}
                onMouseEnter={e => { if (colorScheme!=='custom') e.currentTarget.style.background='#F8FAFC'; }}
                onMouseLeave={e => { if (colorScheme!=='custom') e.currentTarget.style.background='transparent'; }}>
                <div style={{ fontSize:12, fontWeight:colorScheme==='custom'?700:400, color:colorScheme==='custom'?'#DB2777':'#000000' }}>Custom</div>
                <div style={{ fontSize:12, color:"#000000", marginTop:1 }}>Enter your own hex codes</div>
              </button>
            </div>
          )}
        </div>

        {/* Project name */}
        <div ref={projectMenuRef} style={{ position:"relative", flexShrink:0 }}>
          <button onClick={() => { setProjectNameDraft(projectName); setProjectMenuOpen(o => !o); }}
            title="Tag this sIfA with a project name"
            style={{ padding:"6px 14px", borderRadius:6, border:"none",
              background:"#334155", color:"white", fontWeight:700, fontSize:12.5, cursor:"pointer",
              display:"flex", alignItems:"center", gap:6, maxWidth:220 }}>
            <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              Project: {projectName || 'enter name'}
            </span>
          </button>
          {projectMenuOpen && (
            <div style={{
              position:"absolute", top:"calc(100% + 4px)", right:0, zIndex:200,
              background:"white", border:"1px solid #E2E8F0", borderRadius:8,
              boxShadow:"0 4px 16px rgba(0,0,0,0.12)", padding:10, minWidth:230,
            }}>
              <input
                autoFocus
                type="text"
                value={projectNameDraft}
                onChange={e => setProjectNameDraft(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter')  { setProjectName(projectNameDraft.trim()); setProjectMenuOpen(false); }
                  if (e.key === 'Escape') { setProjectMenuOpen(false); }
                }}
                placeholder="e.g. Op-Ed, WorldBank consultancy…"
                style={{ width:"100%", boxSizing:"border-box", padding:"6px 8px",
                  borderRadius:4, border:"1px solid #CBD5E1", fontSize:12.5 }}
              />
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, gap:8 }}>
                <button onClick={() => { setProjectName(''); setProjectNameDraft(''); setProjectMenuOpen(false); }}
                  style={{ border:"none", background:"transparent", color:"#EF4444",
                    fontSize:12, cursor:"pointer", padding:"4px 6px" }}>
                  Clear
                </button>
                <button onClick={() => { setProjectName(projectNameDraft.trim()); setProjectMenuOpen(false); }}
                  style={{ border:"none", background:"#334155", color:"white", fontWeight:700,
                    fontSize:12, cursor:"pointer", padding:"5px 12px", borderRadius:4 }}>
                  Done
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Portfolio — pushed to right */}
        <div style={{ display:"flex", gap:6, marginLeft:"auto", flexShrink:0 }}>
          {anyFilled && (
