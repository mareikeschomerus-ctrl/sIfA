        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:12 }}>
          {labels.map((l, i) => (
            <div key={i} style={{ display:"flex", gap:6, alignItems:"center" }}>
              <span style={{ fontSize:11, color:"#94A3B8", width:22, textAlign:"right" }}>{i + 1}.</span>
              <input value={l} onChange={e => updateLabel(i, e.target.value)}
                placeholder="e.g. Drafting, Editing, Visual design…"
                style={{ flex:1, padding:"7px 10px", border:"1px solid #CBD5E1", borderRadius:4, fontSize:13, outline:"none" }} />
              <button onClick={() => removeLabel(i)}

            </div>
          ))}
        </div>

        <div style={{ display:"flex", gap:6, marginBottom:18 }}>
          <span style={{ fontSize:11, color:"#94A3B8", width:22, textAlign:"right", alignSelf:"center" }}>+</span>
          <input value={draft} onChange={e => setDraft(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addLabel(); } }}
            placeholder="Add another role and press Enter…"
            style={{ flex:1, padding:"7px 10px", border:"1px dashed #CBD5E1", borderRadius:4, fontSize:13, outline:"none" }} />
          <button onClick={addLabel}

          </button>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:10, paddingTop:12, borderTop:"1px solid #E2E8F0" }}>

            disabled={currentMode === 'credit'}
            style={{
              border:"none", background:"none", color: currentMode === 'credit' ? "#CBD5E1" : "#64748B",
              cursor: currentMode === 'credit' ? "default" : "pointer",
              fontSize:12, padding:"4px 0", textDecoration: currentMode === 'credit' ? "none" : "underline",
            }}>

              style={{

  );

function App() {
  const _restored = _loadAutosave();
  const _initialRoles = (_restored && _reconcileRoles(_restored.activeRoles)) || ROLES;
  const initData = (rls) => Object.fromEntries(rls.map(r => [r.id, { contributors:[], tool:"", reason:"", extent:0, skipped:false }]));

  const [activeRoles, setActiveRoles] = useState(_initialRoles);
  const [taxonomyMode, setTaxonomyMode] = useState(_restored?.taxonomyMode || 'credit');
  const [data, setData] = useState(() => _restored?.data || initData(_initialRoles));
  // ── Undo/redo history stack (capped at 50). The history holds
  // serialised data snapshots. We track the current index so redo
  // works after stepping back. The agent flow pauses history capture
  // and commits a single coalesced snapshot when it finishes.
  const HISTORY_CAP = 50;
  const [history, setHistory] = useState(() => [JSON.parse(JSON.stringify(_restored?.data || initData(_initialRoles)))]);
  const [historyIndex, setHistoryIndex] = useState(0);
  const _historyPaused = React.useRef(false);
  // pushHistory commits a new snapshot, truncating any redo branch
  // and capping length. Called from the setData wrapper below.
  const pushHistory = (snapshot) => {
    if (_historyPaused.current) return;
    setHistory(h => {
      const trimmed = h.slice(0, historyIndex + 1);
      trimmed.push(JSON.parse(JSON.stringify(snapshot)));
      const overflow = trimmed.length - HISTORY_CAP;
      const out = overflow > 0 ? trimmed.slice(overflow) : trimmed;
      setHistoryIndex(out.length - 1);
      return out;
    });
  };
  // Wrap setData so every external edit pushes a history entry.
  // Functional updaters are resolved first so we capture the result.
  const setDataAndPush = (next) => {
    setData(prev => {
      const v = typeof next === 'function' ? next(prev) : next;
      pushHistory(v);
      return v;
    });
  };
  const canUndo = historyIndex > 0;
  const canRedo = historyIndex < history.length - 1;
  const undo = () => {
    if (!canUndo) return;
    const i = historyIndex - 1;
    setHistoryIndex(i);
    setData(JSON.parse(JSON.stringify(history[i])));
  };
  const redo = () => {
    if (!canRedo) return;
    const i = historyIndex + 1;
    setHistoryIndex(i);
    setData(JSON.parse(JSON.stringify(history[i])));
  };
  const [agentOpen, setAgentOpen] = useState(false);
  const [radarOpen, setRadarOpen] = useState(false);
  const [exampleOpen, setExampleOpen] = useState(false);
  // About panel collapsed by default — keeps first paint cheap and
  // means the 47-KB EXAMPLE_SVG is never parsed unless the user opens it.
  const [aboutOpen, setAboutOpen] = useState(false);
  const radarRef = useRef(null);
  const portfolioRadarRef = useRef(null);
  const [portfolio, setPortfolio] = useState(_restored ? _reconcilePortfolio(_restored.portfolio) : []);
  const [portfolioOpen, setPortfolioOpen] = useState(false);
  const [restoredNotice, setRestoredNotice] = useState(!!_restored);
  const [figureFont, setFigureFont] = useState(_restored?.figureFont || 'montserrat');
  const [taxonomyPickerOpen, setTaxonomyPickerOpen] = useState(false);
  // Name-prompt modal — opens when the user clicks 'Add to Portfolio'
  // so they can give the entry a meaningful name at the point of
  // saving (rather than having to rename it afterwards).
  const [namePromptOpen, setNamePromptOpen] = useState(false);
  const [namePromptValue, setNamePromptValue] = useState('');
  // Autosave-nudge state — time-based reminder to write a .sifa.json
  // after a stretch of editing without a file save. lastSaveTime tracks
  // the last time the user wrote a portable file; lastEditTime tracks
  // any data mutation. The nudge appears when the user has been
  // editing in the last 5 min but hasn't saved in the last 20 min.
  // editsSinceFileSave is retained (set but currently unused for the
  // banner trigger) so the loaded-file count reset remains harmless.
  const [editsSinceFileSave, setEditsSinceFileSave] = useState(0);
  const [nudgeDismissed, setNudgeDismissed] = useState(false);
  const [lastSaveTime, setLastSaveTime] = useState(() => Date.now());
  const [lastEditTime, setLastEditTime] = useState(() => Date.now());
  // Tick state advances every 30s so the time-based nudge re-evaluates
  // without needing a state change elsewhere.
  const [_nudgeTick, setNudgeTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setNudgeTick(t => t + 1), 30 * 1000);
    return () => clearInterval(id);
  }, []);
  const _autosaveHasMounted = useRef(false);
  const fileInputRef = useRef(null);
  const tableSectionRef = useRef(null);

  // Scroll the table area into view (used by Option 2 and the inline 'table' link)
  const scrollToTable = () => {
    if (tableSectionRef.current) {
      tableSectionRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  // Inline-link style for the hyperlinks in the About panel
  const _linkStyle = {
    background: 'none', border: 'none', padding: 0, margin: 0, cursor: 'pointer',
    color: '#2451CB', textDecoration: 'underline', font: 'inherit', display: 'inline',
  };

  // Apply a custom taxonomy from the table-mode shortcut. Confirms before discarding data
  // when the new role-IDs don't overlap with what the user has already filled in.
  const applyCustomTaxonomy = (labels) => {
    const newRoles = buildCustomRoles(labels);
    const newIds = new Set(newRoles.map(r => r.id));
    const filledIds = activeRoles.filter(r => {
      const d = data[r.id];
      return d && ((d.contributors||[]).length > 0 || d.extent > 0 || d.tool || d.reason);
    }).map(r => r.id);
    const losing = filledIds.filter(id => !newIds.has(id));
    if (losing.length > 0) {
      const proceed = confirm(`Switching taxonomy will discard data in ${losing.length} role${losing.length === 1 ? '' : 's'} that don't appear in the new list. Continue?`);
      if (!proceed) return;
    }
    onSetRoles(newRoles, 'custom');
    setTaxonomyPickerOpen(false);
  };

  const switchToCRediT = () => {
    if (taxonomyMode === 'credit') return;
    const filledIds = activeRoles.filter(r => {
      const d = data[r.id];
      return d && ((d.contributors||[]).length > 0 || d.extent > 0 || d.tool || d.reason);
    }).map(r => r.id);
    const credIds = new Set(ROLES.map(r => r.id));
    const losing = filledIds.filter(id => !credIds.has(id));
    if (losing.length > 0) {
      const proceed = confirm(`Switching to CRediT will discard data in ${losing.length} custom role${losing.length === 1 ? '' : 's'}. Continue?`);
      if (!proceed) return;
    }
    onSetRoles(ROLES, 'credit');
    setTaxonomyPickerOpen(false);
  };

  // Quiet autosave — runs whenever the editable state changes.
  // Also bumps an edit counter so the nudge banner knows when to
  // appear, suggesting the user write out a portable .sifa.json.
  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        version: 1,
        savedAt: new Date().toISOString(),
        activeRoles, taxonomyMode, data, portfolio, figureFont,
      }));
    } catch {}
    if (_autosaveHasMounted.current) {
      setEditsSinceFileSave(n => n + 1);
      setLastEditTime(Date.now());
    } else {
      _autosaveHasMounted.current = true;
    }
  }, [activeRoles, taxonomyMode, data, portfolio, figureFont]);

  // Cmd/Ctrl+S → trigger the same Save-sIfA action as the toolbar.
  // The native "save webpage" dialog is preempted (it's never what a
  // user means in a single-page tool of this shape).
  useEffect(() => {
    const onKey = (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && (e.key === 's' || e.key === 'S')) {
        e.preventDefault();
        saveToFile();
        return;
      }
      // Cmd/Ctrl+P → Save as PDF (preempt browser print)
      if (mod && (e.key === 'p' || e.key === 'P')) {
        e.preventDefault();
        saveAsPDF();
        return;
      }
      // Undo / redo. Shift+Z (or Ctrl+Y on non-Mac) redoes.
      if (mod && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
        e.preventDefault();
        undo();
        return;
      }
      if (mod && e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
        e.preventDefault();
        redo();
        return;
      }
      if (mod && (e.key === 'y' || e.key === 'Y')) {
        e.preventDefault();
        redo();
        return;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  // Save to a .sifa.json file the user controls.
  // Uses the File System Access API (showSaveFilePicker) when available so the user
  // gets a real "Save as…" dialog; falls back to the legacy download flow otherwise.
  const saveToFile = async () => {
    const payload = {
      version: 1,
      kind: 'sifa-tool-state',
      savedAt: new Date().toISOString(),
      activeRoles, taxonomyMode, data, portfolio, figureFont,
    };
    const json = JSON.stringify(payload, null, 2);
    const ts = new Date().toISOString().slice(0,10);
    const fname = `sIfA_${ts}.sifa.json`;

    // Modern path — Chromium-based browsers support window.showSaveFilePicker
    if (typeof window !== 'undefined' && window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: fname,
          types: [{ description: 'sIfA file', accept: { 'application/json': ['.sifa.json', '.json'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
        return;
      } catch (err) {
        // User cancelled the save dialog — respect that and bail out silently
        if (err && (err.name === 'AbortError' || err.code === 20)) return;
        // Any other error (API not really supported, permissions, etc.) → fall through to download
        console.warn('Save-as dialog unavailable, falling back to download:', err);
      }
    }

    // Fallback — triggers the browser's standard download flow
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);
    setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
  };

  // Slim save — writes ONLY the portfolio entries to a .sifa.json so
  // a user can archive or share a portfolio without dragging the
  // current in-progress draft along with it. The matching load path
  // recognises kind === 'sifa-portfolio' and merges entries into the
  // existing portfolio rather than replacing the full state.
  const savePortfolioToFile = async () => {
    if (portfolio.length === 0) return;
    const payload = {
      version: 1,
      kind: 'sifa-portfolio',
      savedAt: new Date().toISOString(),
      portfolio,
    };
    const json  = JSON.stringify(payload, null, 2);
    const ts    = new Date().toISOString().slice(0,10);
    const fname = `sIfA-portfolio_${ts}.sifa.json`;

    if (typeof window !== 'undefined' && window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: fname,
          types: [{ description: 'sIfA portfolio file', accept: { 'application/json': ['.sifa.json', '.json'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
        return;
      } catch (err) {
        if (err && (err.name === 'AbortError' || err.code === 20)) return;
        console.warn('Save-as dialog unavailable, falling back to download:', err);
      }
    }
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);
    setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
  };

  // ── saveAsPDF: opens the browser's print dialog so the user can
  // pick "Save as PDF" as the destination. The enriched @media print
  // block in the top-of-file <style> hides controls/banners, sets A4
  // page size + margins, avoids splitting figures/portfolio entries
  // across pages, and switches typography to a print-friendly stack.
  // We print the live DOM directly (not a popup-cloned copy) because
  // a popup using document.body.innerHTML would lose all user-typed
  // input values — HTML serialisation captures only the original
  // `value=` attribute, not the current React-controlled value.
  // Before printing, we mirror each input's live value into its
  // `value` attribute so any code path that reads from attribute
  // state (rather than the IDL property) still sees typed text.
  // Bound to Cmd/Ctrl+P and the toolbar button.
  const saveAsPDF = () => {
    try {
      document.querySelectorAll('input').forEach(el => {
        el.setAttribute('value', el.value);
      });
      document.querySelectorAll('textarea').forEach(el => {
        // textareas serialise their value as text children
        el.textContent = el.value;
      });
    } catch (e) {}
    window.print();
  };

  const loadFromFile = () => fileInputRef.current?.click();

  const handleFileLoad = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        if (!obj || typeof obj !== 'object') throw new Error('Invalid file');

        // Portfolio-only file → merge entries into the existing portfolio,
        // leaving the current draft untouched. Ids are regenerated to
        // avoid collisions with anything already in the portfolio.
        const portfolioOnly = obj.kind === 'sifa-portfolio'
          || (Array.isArray(obj.portfolio) && !obj.data);
        if (portfolioOnly) {
          if (!Array.isArray(obj.portfolio)) throw new Error('Invalid portfolio file');
          const incoming = _reconcilePortfolio(obj.portfolio);
          if (incoming.length === 0) {
            alert('That portfolio file is empty — nothing to add.');
            return;
          }
          let _seed = Date.now();
          const reIded = incoming.map(entry => ({
            ...entry,
            id: ++_seed + Math.floor(Math.random() * 1000),
          }));
          setPortfolio(prev => [...prev, ...reIded]);
          return;
        }

        // Full-state file → replace everything (existing behaviour).
        if (!obj.data) throw new Error('Invalid file');
        const newRoles = _reconcileRoles(obj.activeRoles) || ROLES;
        setActiveRoles(newRoles);
        setTaxonomyMode(obj.taxonomyMode || 'credit');
        setData(obj.data);
        setPortfolio(_reconcilePortfolio(obj.portfolio));
        if (obj.figureFont) setFigureFont(obj.figureFont);
        setRestoredNotice(false);
        setEditsSinceFileSave(0); setNudgeDismissed(false); setLastSaveTime(Date.now()); setLastEditTime(Date.now());
      } catch {
        alert('Could not load this file. It may be corrupted or in the wrong format.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Opens the name-prompt modal pre-filled with the default name.
  // Cancelling closes the modal without adding anything.
  const openAddToPortfolio = () => {
    if (!anyFilled) return;
    setNamePromptValue(`sIfA ${portfolio.length + 1}`);
    setNamePromptOpen(true);
  };
  // Commits the entry once a name has been chosen. Blank input falls
  // back to the auto-generated default so a quick Enter still works.
  const addToPortfolio = (rawName) => {
    if (!anyFilled) return;
    const fallback = `sIfA ${portfolio.length + 1}`;
    const name = (rawName == null ? '' : String(rawName)).trim() || fallback;
    setPortfolio(p => [...p, {
      id: Date.now(),
      name,
      data: JSON.parse(JSON.stringify(data)),
      roles: [...activeRoles],
      taxonomyMode,
    }]);
    setNamePromptOpen(false);
  };

  const removeFromPortfolio = (id) => setPortfolio(p => p.filter(e => e.id !== id));

  // Overwrite a portfolio entry with the current draft. Asks first so a
  // stray click can't replace a saved entry.
  const updatePortfolioFromDraft = (id) => {
    const entry = portfolio.find(e => e.id === id);
    if (!entry) return;
    if (!confirm(`Update '${entry.name}' with the current draft? This replaces the saved entry.`)) return;
    setPortfolio(p => p.map(e => e.id === id ? {
      ...e,
      data: JSON.parse(JSON.stringify(data)),
      roles: [...activeRoles],
      taxonomyMode,
      figureFont,
    } : e));
  };

  // Pull a saved entry back into the live draft. Closes the portfolio
  // panel so the user lands on the populated table.
  const loadPortfolioIntoDraft = (id) => {
    const entry = portfolio.find(e => e.id === id);
    if (!entry) return;
    if (!confirm(`Load '${entry.name}' into the draft? This replaces what you're currently editing.`)) return;
    const newRoles = _reconcileRoles(entry.roles) || ROLES;
    setActiveRoles(newRoles);
    setTaxonomyMode(entry.taxonomyMode || 'credit');
    setData(JSON.parse(JSON.stringify(entry.data)));
    if (entry.figureFont) setFigureFont(entry.figureFont);
    setPortfolioOpen(false);
  };

  const renamePortfolioEntry = (id, name) =>
    setPortfolio(p => p.map(e => e.id === id ? {...e, name} : e));

  const computePortfolioAvg = () => {
    if (portfolio.length === 0) return { avgData:{}, avgRoles:[] };
    const roleMap = new Map();
    portfolio.forEach(e => e.roles.forEach(r => { if (!roleMap.has(r.id)) roleMap.set(r.id, r); }));
    const avgRoles = [...roleMap.values()];
    const avgData = {};
    avgRoles.forEach(r => {
      const vals = portfolio
        .filter(e => e.data[r.id] && !e.data[r.id].skipped)
        .map(e => e.data[r.id]?.extent || 0);
      avgData[r.id] = vals.length > 0
        ? { extent: vals.reduce((s,v) => s+v, 0) / vals.length, contributors:[], tool:'', reason:'', skipped:false }
        : { extent:0, contributors:[], tool:'', reason:'', skipped:true };
    });
    return { avgData, avgRoles };
  };

  const onSetRoles = (newRoles, mode) => {
    setActiveRoles(newRoles);
    setTaxonomyMode(mode || 'credit');
    setDataAndPush(prev => {
      const nd = initData(newRoles);
      newRoles.forEach(r => { if (prev[r.id]) nd[r.id] = prev[r.id]; });
      return nd;
    });
  };

  const update = (id, patch) => setDataAndPush(p => ({ ...p, [id]: { ...p[id], ...patch } }));

  const LW = { Sole: 1.0, Lead: 0.7, Equal: 0.5, Support: 0.3 };
  const reweigh = (contribs) => {
    const { wSum, wTotal } = contribs.reduce((acc, c) => {
      const w = LW[c.level] || 0.5;
      return { wSum: acc.wSum + (c.extent||0)*w, wTotal: acc.wTotal + w };
    }, { wSum:0, wTotal:0 });
    return wTotal > 0 ? wSum/wTotal : 0;
  };
  const updateContrib = (roleId, idx, fields) =>
    setDataAndPush(prev => {
      const d = prev[roleId];
      const cs = (d.contributors||[]).map((c,i) => i===idx ? {...c,...fields} : c);
      return { ...prev, [roleId]: { ...d, contributors:cs, extent:reweigh(cs) }};
    });
  const addContrib = (roleId) =>
    setDataAndPush(prev => {
      const d = prev[roleId];
      const cs = [...(d.contributors||[]), { name:'', level:'Equal', tool:'', reason:'', extent:0 }];
      return { ...prev, [roleId]: { ...d, contributors:cs, extent:reweigh(cs) }};
    });
  const removeContrib = (roleId, idx) =>
    setDataAndPush(prev => {
      const d = prev[roleId];
      const cs = (d.contributors||[]).filter((_,i) => i!==idx);
      return { ...prev, [roleId]: { ...d, contributors:cs, extent:reweigh(cs) }};
    });

  const exportCSV = () => {
    // One row per contributor. The CRediT Role and the Average extent columns
    // appear once per role (on the first contributor row); on continuation
    // rows for the same role they are left blank, so the file opens as a
    // grouped table — like merged cells in a spreadsheet — without losing
    // any per-contributor detail (extent / how / tool sit on their own rows).
    const hdr = "CRediT Role,Performed by,Extent of AI use per contributor,Average extent of AI use across contributors,How was AI used,Tool / Service\n";
    const fmt1 = (n) => {
      const x = (typeof n === 'number') ? n : Number(n);
      return (Number.isFinite(x)) ? x.toFixed(1) : '';
    };
    const esc = (s) => String(s ?? '').replace(/"/g, '""');
    const rows = [];
    activeRoles.forEach(r => {
      const d = data[r.id] || {};
      const contribs = d.contributors || [];
      const avgExtent = fmt1(d.extent);
      if (contribs.length === 0) {
        // No per-contributor data — emit a single row carrying legacy fields
        // (if any) so .sifa.json state from older versions still round-trips.
        rows.push(`"${esc(r.label)}","","","${avgExtent}","${esc(d.reason || '')}","${esc(d.tool || '')}"`);
        return;
      }
      contribs.forEach((c, i) => {
        const labelCol = (i === 0) ? esc(r.label) : '';
        const avgCol   = (i === 0) ? avgExtent   : '';
        const performedBy = c.level ? `${c.name} (${c.level})` : (c.name || '');
        rows.push(`"${labelCol}","${esc(performedBy)}","${fmt1(c.extent ?? 0)}","${avgCol}","${esc(c.reason || '')}","${esc(c.tool || '')}"`);
      });
    });
    const body = rows.join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([hdr+body], { type:"text/csv" }));
    a.download = "AI_Contribution_Statement.csv";
    a.click();
  };

  const reset = () => { if (confirm("Clear all entries?")) setDataAndPush(initData(activeRoles)); };

  const anyFilled = activeRoles.some(r => {
    const d = data[r.id];
    return (d?.contributors||[]).length > 0 || d?.extent > 0 || d?.tool || d?.reason;
  });
  // Only hide roles explicitly skipped — never restructure the table mid-edit
  const visibleRoles = activeRoles.filter(r => !data[r.id]?.skipped);

  // First contributor name entered anywhere in the table — used to offer a one-click
  // autofill for empty name fields, so repeat contributors don't need re-typing.
  const firstContribName = (() => {
    for (const r of activeRoles) {
      for (const c of (data[r.id]?.contributors || [])) {
        const nm = (c.name || '').trim();
        if (nm) return nm;
      }
    }
    return '';
  })();

  const filled = activeRoles.filter(r => (data[r.id]?.extent || 0) > 0 || data[r.id]?.tool).length;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>

      {/* Hidden file input for Load sIfA */}
      <input ref={fileInputRef} type="file" accept=".json,application/json"
        onChange={handleFileLoad} style={{ display:"none" }} />

      {/* Session-local Tool/Service autocomplete — collects every
          distinct non-empty tool string from the live data so the same
          tool name doesn't have to be re-typed in every row. */}
      <datalist id="tool-service-suggestions">
        {Array.from(new Set(
          activeRoles.flatMap(r => {
            const d = data[r.id] || {};
            const fromRow = (d.tool || '').trim();
            const fromContribs = (d.contributors || []).map(c => (c.tool || '').trim());
            return [fromRow, ...fromContribs].filter(Boolean);
          })
        )).sort((a,b) => a.localeCompare(b)).map(t => <option key={t} value={t} />)}
      </datalist>

      {/* Autosave-nudge banner — appears after 20 minutes of editing
          without writing out a portable .sifa.json, and only if the
          user is still active (an edit in the last 5 min). The 30 s
          tick (above) re-evaluates this. Dismissible. */}
      {!restoredNotice && !nudgeDismissed && (Date.now() - lastSaveTime) > 20 * 60 * 1000 && (Date.now() - lastEditTime) < 5 * 60 * 1000 && (
        <div className="no-print" role="status" aria-live="polite" style={{
          background:"#EFF6FF", borderBottom:"1px solid #BFDBFE",
          padding:"8px 28px", display:"flex", justifyContent:"space-between",
          alignItems:"center", fontSize:12, color:"#1E40AF", flexShrink:0, gap:12,
        }}>
          <span>💾 You haven't saved a <code style={{ background:"#DBEAFE", padding:"1px 5px", borderRadius:2, fontSize:11 }}>.sifa.json</code> in the last 20 minutes — your work is otherwise only in this browser's local storage.</span>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <button onClick={saveToFile}
              title="Save the current sIfA to a .sifa.json file (also: ⌘/Ctrl+S)"
              style={{ border:"1px solid #2451CB", background:"#2451CB", color:"white", cursor:"pointer", fontSize:11.5, fontWeight:700, padding:"4px 12px", borderRadius:3, whiteSpace:"nowrap" }}>
              💾 Save sIfA
            </button>
            <button onClick={() => setNudgeDismissed(true)} aria-label="Dismiss save reminder"
              title="Dismiss this reminder until the next save"
              style={{ border:"none", background:"transparent", color:"#1E40AF", cursor:"pointer", fontSize:14, fontWeight:700, padding:"0 4px" }}>×</button>
          </div>
        </div>
      )}

      {/* Restored-from-autosave notice */}
      {restoredNotice && (
        <div className="no-print" role="status" aria-live="polite" style={{
          background:"#FEF3C7", borderBottom:"1px solid #FCD34D",
          padding:"8px 28px", display:"flex", justifyContent:"space-between",
          alignItems:"center", fontSize:12, color:"#78350F", flexShrink:0, gap:12,
        }}>
          <span>↻ Restored your previous sIfA from this browser. Use 💾 Save sIfA to keep a copy elsewhere.</span>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <button onClick={() => {
              if (confirm("Start a fresh sIfA? This will clear the autosaved entries in this browser. Your downloaded .sifa.json files are not affected.")) {
                try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
                window.location.reload();
              }
            }}
              title="Clear the autosaved sIfA and start over"
              style={{ border:"1px solid #B45309", background:"white", color:"#78350F", cursor:"pointer", fontSize:11.5, fontWeight:600, padding:"3px 10px", borderRadius:3, whiteSpace:"nowrap" }}>
              ↻ Start fresh
            </button>
            <button onClick={() => setRestoredNotice(false)}
              title="Dismiss this notice (keeps your restored entries)"
              style={{ border:"none", background:"transparent", color:"#78350F", cursor:"pointer", fontSize:14, fontWeight:700, padding:"0 4px" }}>×</button>
          </div>
        </div>
      )}

      {/* ── Header ── */}
      <header className="no-print" style={{ background:"#111111", color:"white", padding:"18px 28px", flexShrink:0 }}>
        <div style={{ maxWidth:1260, margin:"0 auto" }}>
          <h1 style={{ fontSize:21, fontWeight:700, marginBottom:4 }}>
            sIfA Tool (Statement of Intellectual Fellowship and Accountability)
          </h1>
          <p style={{ fontSize:13, opacity:0.78, marginBottom:14 }}>
            Use this tool to create your sIfA.
          </p>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {[
              { label:"🤖 Option 1: With an agent", action:() => { _historyPaused.current = true; setAgentOpen(true); }, primary:true },
              { label:"📝 Option 2: Directly in the table", action:() => { setAgentOpen(false); scrollToTable(); }, primary:true },
              { label:"🧠 View your sIfA Figure", action:() => setRadarOpen(true), primary:true },
              { label:"⬇ Table & Figure · SVG", action:() => radarRef.current?.downloadSVG('svg'), primary:true },
              { label:"⬇ Table & Figure · JPEG", action:() => radarRef.current?.downloadSVG('jpeg'), primary:true },
              { label:"⬇ Figure only · SVG", action:() => radarRef.current?.downloadFigureOnly('svg'), primary:true },
              { label:"⬇ Figure only · JPEG", action:() => radarRef.current?.downloadFigureOnly('jpeg'), primary:true },
              { label:"⬇ Export CSV", action:exportCSV, primary:false },
              { label:"💾 Save sIfA", action:saveToFile, primary:false },
              { label:"📂 Load sIfA", action:loadFromFile, primary:false },
              { label:"📄 Save as PDF", action:saveAsPDF, primary:false },
              { label:"↺ Reset", action:reset, primary:false },
            ].map(b => (
              <button key={b.label} onClick={b.action} style={{
                padding:"8px 18px", borderRadius:2,
                border: b.primary ? "none" : "1px solid rgba(255,255,255,0.35)",
                background: b.primary ? "#2451CB" : "transparent",
                color:"white", fontWeight:600, fontSize:12, cursor:"pointer",
                letterSpacing:"0.03em", textTransform:"uppercase",
              }}>{b.label}</button>
            ))}
            {/* Undo/Redo — placed at the end of the toolbar so they're easy to find */}
            <button onClick={undo} disabled={!canUndo}
              title="Undo last edit (⌘/Ctrl+Z)" aria-label="Undo last edit"
              style={{ padding:"8px 14px", borderRadius:2, border:"1px solid rgba(255,255,255,0.35)",
                background:"transparent", color: canUndo ? "white" : "rgba(255,255,255,0.35)",
                fontWeight:600, fontSize:12, cursor: canUndo ? "pointer" : "not-allowed",
                letterSpacing:"0.03em", textTransform:"uppercase" }}>↶ Undo</button>
            <button onClick={redo} disabled={!canRedo}
              title="Redo (⌘/Ctrl+Shift+Z, Ctrl+Y)" aria-label="Redo"
              style={{ padding:"8px 14px", borderRadius:2, border:"1px solid rgba(255,255,255,0.35)",
                background:"transparent", color: canRedo ? "white" : "rgba(255,255,255,0.35)",
                fontWeight:600, fontSize:12, cursor: canRedo ? "pointer" : "not-allowed",
                letterSpacing:"0.03em", textTransform:"uppercase" }}>↷ Redo</button>
            {anyFilled && (
              <button onClick={openAddToPortfolio}
                title="Save current sIfA as a portfolio entry"
                style={{ padding:"8px 18px", borderRadius:2, border:"1px solid rgba(255,255,255,0.5)", background:"transparent", color:"white", fontWeight:600, fontSize:12, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                ➕ Add to Portfolio
              </button>
            )}
            {portfolio.length > 0 && (
              <button onClick={() => setPortfolioOpen(true)}
                style={{ padding:"8px 18px", borderRadius:2, border:"1px solid #2451CB", background:"#2451CB", color:"white", fontWeight:600, fontSize:12, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                📊 Portfolio ({portfolio.length})
              </button>
            )}
          </div>
        </div>
      </header>

      {/* ── Body ── */}
      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>

        {/* Table area */}
        <div style={{ flex:1, overflowY:"auto", padding:"22px 28px" }}>
          <div style={{ maxWidth:1280 }}>

            {/* ── About sIfA panel ── collapsible; closed by default so
                first paint skips the 47-KB EXAMPLE_SVG entirely. */}
            <div style={{
              background:"white", border:"1px solid #E8E8E8", borderRadius:3,
              marginBottom:22,
              boxShadow:"0 1px 4px rgba(0,0,0,0.05)", fontSize:13, color:"#222222", lineHeight:1.7,
            }}>
              <button
                onClick={() => setAboutOpen(o => !o)}
                aria-expanded={aboutOpen}
                aria-controls="about-sifa-body"
                className="no-print"
                style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                         width:"100%", padding:"14px 28px", border:"none", background:"transparent",
                         cursor:"pointer", fontSize:13, fontWeight:700, color:"#111111",
                         textTransform:"uppercase", letterSpacing:"0.08em" }}>
                <span>About sIfA</span>
                <span aria-hidden="true" style={{ fontSize:14, color:"#2451CB" }}>{aboutOpen ? '▴' : '▾'}</span>
              </button>
              {aboutOpen && (
              <div id="about-sifa-body" style={{ padding:"4px 28px 22px" }}>
              <h3 style={{ fontSize:11, fontWeight:700, color:"#111111", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.1em", paddingBottom:6, borderBottom:"2px solid #2451CB", display:"inline-block" }}>What is sIfA?</h3>
              <p style={{ marginBottom:18 }}>
                sIfA is an invitation to reflect on how knowledge or other types of outputs are
                created in interaction with AI. It acknowledges that such work involves many roles
                and contributors, inspired by the Contributor Role Taxonomy (CRediT). It also
                acknowledges that AI can play different parts in each of those roles. Thus, sIfA
                asks questions about how humans have collaborated with each other first, followed
                by questions on how each contributor has interacted with AI. For research products,
                the 14 contributor roles of the CRediT taxonomy can be used. For outputs that
                require a different taxonomy, there is an option to set up an own taxonomy. The
                tool creates both a table as well as the sIfA figure: a radar diagram in the shape
                of a brain that can be used as a catchy visual to foster a culture of transparent
                reflection and learning when it comes to interactions between humans and machines.
              </p>

              <h3 style={{ fontSize:11, fontWeight:700, color:"#111111", marginBottom:12, textTransform:"uppercase", letterSpacing:"0.1em", paddingBottom:6, borderBottom:"2px solid #2451CB", display:"inline-block" }}>How to use the sIfA tool</h3>
              <p style={{ marginBottom:12 }}>
                The sIfA tool can be used by answering a set of questions from the{" "}
                <button onClick={() => { _historyPaused.current = true; setAgentOpen(true); }} style={_linkStyle}>chatbot</button>{" "}
                or by simply filling in the{" "}
                <button onClick={scrollToTable} style={_linkStyle}>table</button>.
                We recommend setting up a sIfA at the start of a project and filling it in as the
                project progresses, to make reflection as accurate as possible.
              </p>
              <p style={{ marginBottom:12 }}>
                The tool asks a number of questions to identify the relevant contributor roles for an
                output. CRediT is offered as an option, along with the choice to set up your{" "}
                <button onClick={() => setTaxonomyPickerOpen(true)} style={_linkStyle}>own taxonomy</button>.
                For each role, the tool asks who the contributors are, and what their level of
                engagement in this role was (Lead, Equal, Support, Sole). Each contributor is then
                asked about their use of AI in the different roles, their reasons for using AI, and
                what tool they used. For each role, the extent of AI use is rated:
              </p>
              <ul style={{ marginBottom:12, paddingLeft:22, listStyle:"disc" }}>
                <li style={{ marginBottom:4 }}><strong>0:</strong> no interaction between humans and AI in this task</li>
                <li style={{ marginBottom:4 }}><strong>1:</strong> some interaction between humans and AI in this task</li>
                <li style={{ marginBottom:4 }}><strong>2:</strong> extensive interaction between humans and AI in this task</li>
              </ul>
              <p style={{ marginBottom:12 }}>
                If more than one contributor is listed under a role, each contributor records their AI
                use separately. In the table, these are displayed separately. In the sIfA diagram, the
                average of AI usage is calculated per contributor role, with a Lead role weighted at
                70%, Equal at 50%, Support at 30%, and Sole at 100%.
              </p>
              <p style={{ marginBottom:12 }}>
                The sIfA can be{" "}
                <button onClick={saveToFile} style={_linkStyle}>saved</button>{" "}
                for further editing along the way. The final sIfA figure and table can be{" "}
                <button onClick={() => radarRef.current?.downloadSVG('svg')} style={_linkStyle}>saved</button>,{" "}
                <button onClick={saveAsPDF} style={_linkStyle}
                  title="Opens a print preview — choose 'Save as PDF' in the browser dialog"
                >saved as PDF</button>{" "}
                and{" "}
                <button onClick={() => radarRef.current?.downloadSVG('jpeg')} style={_linkStyle}>exported</button>{" "}
                in different formats.
              </p>

              {/* Where your work is saved — clarifies the difference
                  between the per-browser autosave and the portable
                  .sifa.json file, so users don't assume the
                  portfolio is durably stored somewhere by default. */}
              <div style={{ background:"#F8FAFC", border:"1px solid #E2E8F0", borderLeft:"3px solid #2451CB", borderRadius:3, padding:"10px 14px", margin:"4px 0 14px", fontSize:13, lineHeight:1.55 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#2451CB", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>

        )}
      </div>

      {/* ── Radar Chart Modal — always mounted so radarRef.current is always available for direct export ── */}
      <div className="no-print" style={{
        position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
        display: radarOpen ? "flex" : "none",
        alignItems:"center", justifyContent:"center", zIndex:1000,
        backdropFilter:"blur(3px)",
      }} onClick={e => e.target === e.currentTarget && setRadarOpen(false)}>
        <div style={{
          background:"white", borderRadius:16, padding:"28px 32px",
          maxWidth:660, width:"95%", maxHeight:"92vh", overflowY:"auto",
          boxShadow:"0 20px 60px rgba(0,0,0,0.35)",
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
            <div>
              <h2 style={{ fontSize:18, fontWeight:700, color:"#1E293B", margin:0 }}>
                sIfA
              </h2>
              <p style={{ fontSize:12, color:"#64748B", margin:"3px 0 0" }}>
                Outer ring = Human · Centre = AI · Each axis = one contributor role
              </p>
            </div>
            <button onClick={() => setRadarOpen(false)} style={{
              background:"none", border:"none", fontSize:24, cursor:"pointer",
              color:"#64748B", lineHeight:1, padding:"0 4px",
            }}>×</button>
          </div>

          {/* Font picker — choose the font baked into the figure and its export */}
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, fontSize:12, color:"#475569", flexWrap:"wrap" }}>
            <span style={{ fontWeight:600 }}>Font:</span>
            {FONT_OPTIONS.map(opt => (
              <label key={opt.id} style={{ display:"inline-flex", alignItems:"center", gap:5, cursor:"pointer", fontFamily: opt.family, fontSize:13 }}>
                <input type="radio" name="sifa-font" value={opt.id}
                  checked={figureFont === opt.id}
                  onChange={() => setFigureFont(opt.id)} />
                {opt.label}
              </label>
            ))}
          </div>

          <RadarChart ref={radarRef} data={data} roles={activeRoles} fontFamily={fontFamilyById(figureFont)} taxonomyMode={taxonomyMode} />
        </div>
      </div>

      {/* ── Name-prompt Modal — shown when adding to portfolio ───────── */}
      {namePromptOpen && (
        <div className="no-print" style={{
          position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
          display:"flex", alignItems:"center", justifyContent:"center",
          zIndex:1100, backdropFilter:"blur(3px)",
        }} onClick={e => e.target === e.currentTarget && setNamePromptOpen(false)}>
          <div style={{
            background:"white", borderRadius:8, padding:"22px 26px",
            width:"min(480px, 94vw)", boxShadow:"0 20px 60px rgba(0,0,0,0.35)",
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
              <div>
                <h2 style={{ fontSize:17, fontWeight:700, color:"#1E293B", margin:0 }}>Name this sIfA</h2>
                <p style={{ fontSize:12, color:"#64748B", margin:"4px 0 0", lineHeight:1.45 }}>
                  Give this portfolio entry a name. Leave blank to use the default — you can rename it later.
                </p>
              </div>
              <button onClick={() => setNamePromptOpen(false)} aria-label="Close"
                style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#64748B", lineHeight:1, padding:"0 4px" }}>×</button>
            </div>

            <input autoFocus
              value={namePromptValue}
              onChange={e => setNamePromptValue(e.target.value)}
              onFocus={e => e.target.select()}
              onKeyDown={e => {
                if (e.key === 'Enter')  { e.preventDefault(); addToPortfolio(namePromptValue); }
                if (e.key === 'Escape') { e.preventDefault(); setNamePromptOpen(false); }
              }}
              placeholder={`sIfA ${portfolio.length + 1}`}
              style={{ width:"100%", boxSizing:"border-box", padding:"9px 12px", border:"1px solid #CBD5E1", borderRadius:4, fontSize:14, outline:"none", marginBottom:18 }} />

            <div style={{ display:"flex", justifyContent:"flex-end", gap:10 }}>
              <button onClick={() => setNamePromptOpen(false)}
                style={{ border:"1px solid #CBD5E1", background:"white", color:"#475569", borderRadius:4, padding:"8px 16px", cursor:"pointer", fontSize:13, fontWeight:600 }}>
                Cancel
              </button>
              <button onClick={() => addToPortfolio(namePromptValue)}
                style={{ border:"1px solid #2451CB", background:"#2451CB", color:"white", borderRadius:4, padding:"8px 18px", cursor:"pointer", fontSize:13, fontWeight:700, letterSpacing:"0.03em", textTransform:"uppercase" }}>
                ➕ Add
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Taxonomy Picker Modal ────────────────────────────────────── */}
      <TaxonomyPicker
        open={taxonomyPickerOpen}
        currentMode={taxonomyMode}
        currentRoles={activeRoles}
        onClose={() => setTaxonomyPickerOpen(false)}
        onApply={applyCustomTaxonomy}
        onUseCRediT={switchToCRediT}
      />

      {/* ── Portfolio Modal ─────────────────────────────────────────── */}
      <div className="no-print" style={{
        position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
        display: portfolioOpen ? "flex" : "none",
        alignItems:"stretch", justifyContent:"center", zIndex:1000,
        backdropFilter:"blur(3px)",
      }} onClick={e => e.target === e.currentTarget && setPortfolioOpen(false)}>
        <div style={{
          background:"white", display:"flex", flexDirection:"column",
          width:"min(1240px,98vw)", margin:"18px", borderRadius:6,
          boxShadow:"0 20px 60px rgba(0,0,0,0.35)", overflow:"hidden",
        }}>
          {/* Header */}
          <div style={{ background:"#111111", color:"white", padding:"14px 22px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0, gap:16 }}>
            <div>
              <div style={{ fontWeight:700, fontSize:16 }}>📊 sIfA Portfolio</div>
              <div style={{ fontSize:11, opacity:0.7, marginTop:2 }}>
                Averaged AI interaction across saved sIfA statements
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              {portfolio.length > 0 && (
                <button onClick={savePortfolioToFile}
                  title="Save just the portfolio entries as a .sifa.json — without the current draft"
                  style={{ border:"1px solid rgba(255,255,255,0.55)", background:"transparent", color:"white", padding:"7px 12px", borderRadius:2, cursor:"pointer", fontSize:11, fontWeight:700, letterSpacing:"0.05em", textTransform:"uppercase" }}>
                  💾 Save Portfolio
                </button>
              )}
              <button onClick={() => setPortfolioOpen(false)} aria-label="Close portfolio panel"
                style={{ background:"none", border:"none", color:"white", fontSize:24, cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
            </div>
          </div>

          {/* Body */}
          <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
            {/* Left — entry list */}
            <div style={{ width:300, flexShrink:0, borderRight:"1px solid #E2E8F0", overflowY:"auto", padding:"18px 16px", background:"#F8FAFC" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#64748B", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:12, paddingBottom:6, borderBottom:"1px solid #E2E8F0" }}>
                Saved sIfAs ({portfolio.length})
              </div>
              {portfolio.length === 0 && (
                <p style={{ fontSize:12, color:"#94A3B8", fontStyle:"italic" }}>No sIfAs saved yet. Close this panel and click ➕ Add to Portfolio.</p>
              )}
              {portfolio.map((entry) => {
                const aiRoles = entry.roles.filter(r => (entry.data[r.id]?.extent || 0) > 0 && !entry.data[r.id]?.skipped);
                const activeR = entry.roles.filter(r => !entry.data[r.id]?.skipped);
                const avgAI = aiRoles.length > 0
                  ? (aiRoles.reduce((s,r) => s + (entry.data[r.id]?.extent||0), 0) / aiRoles.length).toFixed(1)
                  : '0.0';
                return (
                  <div key={entry.id} style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:4, padding:"12px 12px", marginBottom:10, boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                      <input
                        value={entry.name}
                        onChange={e => renamePortfolioEntry(entry.id, e.target.value)}
                        style={{ fontWeight:700, fontSize:13, color:"#1E293B", border:"none", background:"transparent", outline:"none", width:"100%", padding:0 }}
                      />
                      <div style={{ display:"flex", alignItems:"center", gap:2, flexShrink:0, marginLeft:4 }}>
                        <button onClick={() => updatePortfolioFromDraft(entry.id)}
                          title={`Overwrite '${entry.name}' with the current draft`}
                          aria-label={`Update '${entry.name}' from current draft`}
                          style={{ border:"none", background:"none", color:"#64748B", cursor:"pointer", fontSize:13, lineHeight:1, padding:"2px 4px", borderRadius:2 }}
                          onMouseEnter={e => { e.currentTarget.style.background='#EFF6FF'; e.currentTarget.style.color='#2451CB'; }}
                          onMouseLeave={e => { e.currentTarget.style.background='none'; e.currentTarget.style.color='#64748B'; }}>↻</button>
                        <button onClick={() => loadPortfolioIntoDraft(entry.id)}
                          title={`Load '${entry.name}' into the draft`}
                          aria-label={`Load '${entry.name}' into draft`}
                          style={{ border:"none", background:"none", color:"#64748B", cursor:"pointer", fontSize:13, lineHeight:1, padding:"2px 4px", borderRadius:2 }}
                          onMouseEnter={e => { e.currentTarget.style.background='#EFF6FF'; e.currentTarget.style.color='#2451CB'; }}
                          onMouseLeave={e => { e.currentTarget.style.background='none'; e.currentTarget.style.color='#64748B'; }}>📥</button>
                        <button onClick={() => removeFromPortfolio(entry.id)}
                          title="Remove from portfolio"
                          aria-label={`Remove '${entry.name}' from portfolio`}
                          style={{ border:"none", background:"none", color:"#CBD5E1", cursor:"pointer", fontSize:16, lineHeight:1 }}>×</button>
                      </div>
                    </div>
                    <div style={{ fontSize:11, color:"#64748B" }}>
                      {entry.taxonomyMode === 'credit' ? 'CRediT' : 'Custom'} · {activeR.length} roles · {aiRoles.length} with AI
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:5 }}>
                      <div style={{ fontSize:11, color:"#334155", fontWeight:600 }}>Avg AI: {avgAI}/5</div>
                      <div style={{ flex:1, height:5, background:"#E2E8F0", borderRadius:3, overflow:"hidden" }}>
                        <div style={{ height:"100%", background:"#7C3AED", borderRadius:3, width: `${(parseFloat(avgAI)/5)*100}%`, transition:"width 0.3s" }} />
                      </div>
                    </div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginTop:7 }}>
                      {aiRoles.slice(0,8).map(r => (
                        <span key={r.id} style={{ fontSize:9, padding:"1px 6px", borderRadius:10, background:r.bg||"#F1F5F9", color:r.accent||"#334155", border:`1px solid ${r.accent||"#94A3B8"}`, fontWeight:600 }}>
                          {r.label.length > 14 ? r.label.slice(0,13)+'…' : r.label}
                        </span>
                      ))}
                      {aiRoles.length > 8 && <span style={{ fontSize:9, color:"#94A3B8" }}>+{aiRoles.length-8} more</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Right — averaged radar */}
            <div style={{ flex:1, overflowY:"auto", padding:"22px 28px", display:"flex", flexDirection:"column", alignItems:"center" }}>
              {(() => {
                const { avgData, avgRoles } = computePortfolioAvg();
                const hasData = portfolio.length > 0;
                const nRolesWithAI = avgRoles.filter(r => (avgData[r.id]?.extent||0) > 0).length;
                const overallAvg = nRolesWithAI > 0
                  ? (avgRoles.filter(r => (avgData[r.id]?.extent||0)>0).reduce((s,r) => s+(avgData[r.id]?.extent||0), 0) / nRolesWithAI).toFixed(1)
                  : '0.0';
                return (
                  <>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", width:"100%", maxWidth:560, marginBottom:10 }}>
                      <div>
                        <h2 style={{ fontSize:16, fontWeight:700, color:"#1E293B", margin:0 }}>Portfolio Average</h2>
                        <p style={{ fontSize:12, color:"#64748B", margin:"3px 0 0" }}>
                          {hasData ? `${portfolio.length} sIfA${portfolio.length>1?'s':''} · ${nRolesWithAI} role${nRolesWithAI!==1?'s':''} with AI · overall avg ${overallAvg}/2` : 'No entries yet'}
                        </p>
                      </div>
                      {hasData && (
                        <button onClick={() => portfolioRadarRef.current?.downloadSVG()}
                          style={{ padding:"7px 16px", background:"#2451CB", color:"white", border:"none", borderRadius:2, cursor:"pointer", fontWeight:600, fontSize:12, textTransform:"uppercase", letterSpacing:"0.03em" }}>
                          ⬇ Download SVG
                        </button>
                      )}
                    </div>
                    {hasData
                      ? <RadarChart ref={portfolioRadarRef} data={avgData} roles={avgRoles} fontFamily={fontFamilyById(figureFont)} />
                      : <div style={{ width:560, height:560, display:"flex", alignItems:"center", justifyContent:"center", background:"#F8FAFC", border:"1px dashed #CBD5E1", borderRadius:8, color:"#94A3B8", fontSize:14 }}>
                          Add sIfAs to see the averaged radar
                        </div>
                    }
                    {hasData && (
                      <div style={{ maxWidth:560, width:"100%", marginTop:16, padding:"12px 16px", background:"#F8FAFC", borderRadius:4, border:"1px solid #E2E8F0", fontSize:11, color:"#64748B", lineHeight:1.6 }}>
                        <strong style={{ color:"#334155" }}>How averages are calculated:</strong> Each role's average is computed only across the sIfAs in which that role was active — roles absent or skipped in an entry do not pull the average down. For roles with multiple contributors, the weighted average extent (Lead 70%, Equal 50%, Support 30%, Sole 100%) is used per entry before cross-sIfA averaging. Roles from different taxonomies are treated as distinct.
                      </div>
                    )}
                  </>
                );
              })()}
            </div>
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
