// ── TableInput ────────────────────────────────────────────────
// Controlled local state so typing never triggers a parent re-render.
// lastCommit ref tracks what we last sent to the parent so we can
// ignore the parent echoing our own commit back as a prop change.
// External changes (e.g. agent filling a field) still sync in correctly.
function TableInput({ value, onCommit, placeholder, style, multiline, list, ariaLabel }) {
  const [local, setLocal] = React.useState(value ?? "");
  const lastCommit = React.useRef(value ?? "");
  const taRef = React.useRef(null);

  React.useEffect(() => {
    const v = value ?? "";
    // Only sync when the parent changed the value for an external reason
    // (e.g. agent interview), not as an echo of our own onBlur commit.
    if (v !== lastCommit.current) {
      lastCommit.current = v;
      setLocal(v);
    }
  }, [value]);

  // Auto-grow the textarea to fit its content (multiline mode only)
  React.useEffect(() => {
    if (multiline && taRef.current) {
      taRef.current.style.height = 'auto';
      taRef.current.style.height = taRef.current.scrollHeight + 'px';
    }
  }, [local, multiline]);

  const commit = (v) => {
    lastCommit.current = v;   // mark before calling onCommit so the echo is ignored
    onCommit(v);
  };

  if (multiline) {
    return (
      <textarea
        ref={taRef}
        value={local}
        onChange={e => setLocal(e.target.value)}
        onBlur={e => commit(e.target.value)}
        placeholder={placeholder}
        aria-label={ariaLabel || placeholder}
        rows={1}
        style={{ resize:"none", overflow:"hidden", lineHeight:1.4, fontFamily:"inherit", ...style }}
      />
    );
  }

  return (
    <input
      value={local}
      onChange={e => setLocal(e.target.value)}
      onBlur={e => commit(e.target.value)}
      onKeyDown={e => e.key === "Enter" && e.currentTarget.blur()}
      placeholder={placeholder}
      aria-label={ariaLabel || placeholder}
      list={list}
      style={style}
    />
  );
}

const RadarChart = React.forwardRef(function RadarChart({ data, roles: rolesProp, fontFamily, taxonomyMode }, ref) {
  const _ff = fontFamily || "'Montserrat','Segoe UI',Arial,sans-serif";
  const _isCRediT = taxonomyMode === 'credit';
  // Attribution shown beneath the figure when CRediT is the active taxonomy
  const _creditAttrib1 = "Contributor roles are based on the Contributor Role Taxonomy (CRediT).";
  const _creditAttrib2 = "More info at https://credit.niso.org";
  const svgRef = useRef(null);
  React.useImperativeHandle(ref, () => ({ downloadSVG, downloadFigureOnly }));
  const roles = rolesProp || ROLES;
  const getShortLabel = (r) => {
    if (SHORT[r.id]) return SHORT[r.id];
    const words = r.label.split(' ');
    if (words.length <= 1) return [r.label];
    const mid = Math.ceil(words.length / 2);
    return [words.slice(0, mid).join(' '), words.slice(mid).join(' ')];
  };
  const cx = 310, cy = 310;
  // dataR = max data radius (val=5 maps here); outer brain ring beyond this is always human
  const dataR = 148;
  // Show all roles visible in the table (non-skipped)
  const activeRoles = roles.filter(r => !data[r.id]?.skipped);
  const N = activeRoles.length;
  const ang = i => (i * 2 * Math.PI / N) - Math.PI / 2;

  // val=0 → centre, val=2 → dataR
  const pt = (i, val) => ({
    x: cx + (val / 2) * dataR * Math.cos(ang(i)),
    y: cy + (val / 2) * dataR * Math.sin(ang(i)),
  });

  // Organic ring at fraction of dataR — gently wobbled to mimic brain tissue layers
  const organicRing = frac => {
    const npts = 120;
    const r = frac * dataR;
    return Array.from({length: npts}, (_, i) => {
      const a = (i / npts) * 2 * Math.PI;
      const wobble = 3.2 * Math.sin(a * 5 + frac * 8.3)
                   + 2.1 * Math.sin(a * 3 - frac * 5.1)
                   + 1.4 * Math.sin(a * 7 + frac * 3.7);
      const ri = r + wobble;
      return `${i===0?"M":"L"}${(cx + ri*Math.cos(a)).toFixed(1)},${(cy + ri*Math.sin(a)).toFixed(1)}`;
    }).join(" ") + " Z";
  };

  // ── Brain silhouette — lateral (side) view, closer to classic engraved illustration ──
  // Elliptical base (wider horizontally). Frontal lobe faces left. Temporal lobe bulges
  // downward at ~5:30. Pronounced gyri along top. Deep Sylvian fissure notch at lower-left.
  // All radii clamped to ≥157 so the outer "always-human" ring is always visible.
  const brainPath = (() => {
    const nPts = 400;
    const bCx = cx + 4, bCy = cy - 8; // slightly right/up to better frame the chart
    const pts = [];
    for (let i = 0; i <= nPts; i++) {
      const t = (i / nPts) * 2 * Math.PI - Math.PI / 2; // 0 at top, clockwise
      const cosT = Math.cos(t), sinT = Math.sin(t);
      // True ellipse base: semi-major 188 (horizontal) × semi-minor 162 (vertical)
      const a = 188, b = 162;
      let r = (a * b) / Math.sqrt(b*b*cosT*cosT + a*a*sinT*sinT);
      // Frontal lobe (left, t ≈ ±π) is slightly flatter than occipital
      const dFrontal = Math.abs(Math.abs(t) - Math.PI);
      r -= 13 * Math.exp(-Math.pow(dFrontal / 0.52, 2));
      // Temporal lobe — downward bulge at ~5:30 o'clock (t ≈ 1.28)
      r += 14 * Math.exp(-Math.pow((t - 1.28) / 0.50, 2));
      // Primary gyri — 8 prominent bumps, most visible along top arc
      r += 17 * Math.sin(t * 8 + 1.05);
      // Secondary gyri detail
      r += 7  * Math.sin(t * 14 - 0.85);
      // Lobe-scale undulations
      r += 6  * Math.sin(t * 4  + 1.95);
      // Fine cortical texture
      r += 3  * Math.sin(t * 22 + 0.65);
      // Sylvian fissure — deep notch at ~7:45 o'clock (t ≈ 2.18)
      r -= 26 * Math.exp(-Math.pow((t - 2.18) / 0.30, 2));
      // Hard floor: brain never closer than 157px from centre
      r = Math.max(r, 157);
      pts.push({ x: bCx + r * cosT, y: bCy + r * sinT });
    }
    return pts.map((p, i) => `${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ") + " Z";
  })();

  // ── Internal sulci — a small set of major fissures only (kept subtle).
  // All paths are clipped to brainPath so they never stray outside.
  const sulci = [
    // Sylvian fissure (lateral sulcus) — dominant horizontal groove
    "M 172 350 C 218 330 288 316 365 318 C 428 320 468 334 492 352",
    // Central sulcus (Rolando) — separates frontal from parietal
    "M 258 148 C 260 190 258 238 252 278 C 248 305 244 325 240 348",
    // Intraparietal sulcus
    "M 298 212 C 340 208 390 212 432 224 C 462 234 480 248 490 265",
    // Superior temporal sulcus
    "M 170 412 C 218 392 292 380 366 382 C 428 384 466 396 488 412",
    // Parieto-occipital sulcus
    "M 428 162 C 452 198 466 238 468 278 C 470 312 462 342 452 368",
  ];

  // ── Inner boundary circle at dataR — for the outer "always human" ring ──
  const innerCirclePath = (() => {
    const npts = 40;
    return Array.from({length: npts}, (_, i) => {
      const a = (i / npts) * 2 * Math.PI;
      return `${i===0?"M":"L"}${(cx + dataR*Math.cos(a)).toFixed(1)},${(cy + dataR*Math.sin(a)).toFixed(1)}`;
    }).join(" ") + " Z";
  })();

  // Outer ring = brain minus inner circle (evenodd → fills only the ring)
  const outerRingPath = brainPath + " " + innerCirclePath;

  // ── AI blob — polygon connecting active role data tips directly ──
  const totalAI = activeRoles.reduce((s, r) => s + (data[r.id]?.extent || 0), 0);
  const avgAI   = (totalAI / N).toFixed(1);

  const aiBlob = activeRoles.map((r, i) => {
    const val = data[r.id]?.extent || 0;
    const x = (cx + (val / 2) * dataR * Math.cos(ang(i))).toFixed(1);
    const y = (cy + (val / 2) * dataR * Math.sin(ang(i))).toFixed(1);
    return `${i === 0 ? "M" : "L"}${x},${y}`;
  }).join(" ") + " Z";

  // ── 4-pointed sparkle shape centred at (x,y) with outer radius r ──
  // Mimics the AI ✦ sparkle: 4 long points at N/E/S/W, narrow waist between them.
  const sparklePt = (x, y, r) => {
    const inner = r * 0.18;
    return Array.from({length: 8}, (_, k) => {
      const a = (k * Math.PI / 4) - Math.PI / 2;
      const rad = k % 2 === 0 ? r : inner;
      return `${k===0?"M":"L"}${(x + rad*Math.cos(a)).toFixed(1)},${(y + rad*Math.sin(a)).toFixed(1)}`;
    }).join(" ") + " Z";
  };

  // Label positions — just outside brain boundary (~215 clears the outermost gyri)
  const labelPt = i => {
    const a = ang(i), r = 215;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), a };
  };
  const anchor = a => {
    const c = Math.cos(a);
    return c > 0.15 ? "start" : c < -0.15 ? "end" : "middle";
  };

  // Build a timestamp suffix like "2026-05-16_1734" — used so every export gets a unique
  // filename, preventing old downloads from being mistaken for new ones.
  const _stamp = () => {
    const d = new Date();
    const z = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}`;
  };

  // Rasterise a built SVG string to a downloadable JPEG (2× pixel density).
  const _rasteriseToJPEG = (svgStr, W, H, baseName) => {
    const scale = 2;
    const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = W * scale;
      canvas.height = H * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        if (!blob) { alert('Could not generate JPEG.'); return; }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${baseName} ${_stamp()}.jpg`;
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/jpeg', 0.92);
    };
    img.onerror = () => { URL.revokeObjectURL(url); alert('Could not render figure to JPEG.'); };
    img.src = url;
  };

  // Pre-flight check: at least one Lead, Equal or Sole must exist among
  // listed contributors. A sIfA with only Support contributors is invalid —
  // someone has to be the lead. Returns true if download may proceed.
  const validateBeforeDownload = () => {
    const allContribs = roles.flatMap(r => (data[r.id]?.contributors || []));
    if (allContribs.length === 0) return true; // nothing to validate
    const hasNonSupport = allContribs.some(c => c.level && c.level !== 'Support');
    if (!hasNonSupport) {
      alert("Cannot export: every listed contributor is marked Support. At least one contributor must be Lead, Equal, or Sole. Please update at least one contributor's level before exporting.");
      return false;
    }
    return true;
  };

  // ── Figure-only download: standalone SVG of just the radar figure,
  //    with the citation embedded so the figure is fully self-describing.
  //    format: 'svg' (default) or 'jpeg'
  const downloadFigureOnly = (format = 'svg') => {
    if (!validateBeforeDownload()) return;
    if (!svgRef.current) return;
    const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const ff  = `font-family="${_ff.replace(/"/g, '&quot;')}"`;

    const chartInner    = svgRef.current.innerHTML;
    const aiActiveRoles = roles.filter(r => (data[r.id]?.extent||0) > 0);
    const totalAI       = aiActiveRoles.reduce((s,r) => s+(data[r.id]?.extent||0), 0);
    const avgExt        = aiActiveRoles.length > 0 ? (totalAI/aiActiveRoles.length).toFixed(1) : '0.0';

    const W = 720;
    // Header now contains only the 'sIfA' title — explanation lives below the figure.
    const headerH = 56;
    // Chart viewBox "-25 0 670 620" hugs the chart content tightly: role labels
    // span viewBox x ∈ [-17, 637] (text-anchor start/end at radius 215), so this
    // window gives ~8 px breathing room on each side. Tighter than before so the
    // figure fills the panel rather than leaving blank space on the right.
    const chartScale = (W - 20) / 670;
    const chartW = Math.round(670 * chartScale);
    const chartH = Math.round(620 * chartScale);
    const chartOffX = Math.round((W - chartW) / 2);
    const chartOffY = headerH;
    // Caption block beneath the figure: counts (2 lines) + legend (2 lines)
    const capY = chartOffY + chartH + 14;
    // capH = 76 (counts row 14 + counts row 34 + legend row 50–68) + 20 for the
    // new "Each axis = one contributor role" line below the swatches.
    const capH = 96;
    const stmtY = capY + capH + 18;
    const stmtH = 50;
    // CRediT attribution sits between the disclaimer and the citation block when active.
    const attribH = _isCRediT ? 36 : 0;
    // Citation block — wrap long lines (URLs included) at safe character widths so
    // nothing ever gets clipped at the right edge of the figure, regardless of font.
    const wrapLines = (txt, maxCh) => {
      const words = txt.split(' ');
      const out = []; let cur = '';
      for (const w of words) {
        const cand = cur ? cur + ' ' + w : w;
        if (cand.length <= maxCh) { cur = cand; }
        else { if (cur) out.push(cur); cur = w; }
      }
      if (cur) out.push(cur);
      return out;
    };
    // Footer block in three logical parts (new ordering): citation first, then website, then licence
    const _citationLines = wrapLines(`This sIfA was created using: Schomerus, M. (${APP_YEAR}). sIfA Tool - Statement of Intellectual Fellowship and Accountability (Version ${APP_VERSION}) [Computer software]. Busara. https://doi.org/10.5281/zenodo.20285993`, 80);
    const _websiteLines  = wrapLines(`The sIfA tool can be used and downloaded at www.busara.global or at https://github.com/mareikeschomerus-ctrl/sIfA.`, 90);
    const _licenceLine   = `Released under the Apache License 2.0`;
    const citY  = stmtY + stmtH + attribH + 18;
    // citH grows with the number of wrapped lines so the box always fits its content
    const citH  = 12 + (_citationLines.length * 14) + 14 + (_websiteLines.length * 14) + 8 + 14 + 12;
    const H     = citY + citH + 20;

    let body = '';
    body += `<rect width="${W}" height="${H}" fill="white"/>`;

    // Title block — just sIfA
    body += `<text x="${W/2}" y="40" text-anchor="middle" ${ff} font-size="28" font-weight="700" fill="#1E293B">sIfA</text>`;

    // Chart
    body += `<svg x="${chartOffX}" y="${chartOffY}" width="${chartW}" height="${chartH}" viewBox="-25 0 670 620" xmlns="http://www.w3.org/2000/svg">${chartInner}</svg>`;

    // Caption block — counts and legend below the figure
    body += `<line x1="20" y1="${capY - 4}" x2="${W-20}" y2="${capY - 4}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    body += `<text x="${W/2}" y="${capY + 14}" text-anchor="middle" ${ff} font-size="13.5" fill="#64748B">AI interaction across specified roles · 0 = no AI · 1 = some · 2 = extensive</text>`;
    body += `<text x="${W/2}" y="${capY + 34}" text-anchor="middle" ${ff} font-size="13.5" fill="#334155">${aiActiveRoles.length} role${aiActiveRoles.length!==1?'s':''} with AI interaction · average extent ${avgExt}/2</text>`;
    // Legend — split across two rows so the full text fits within the panel.
    //   Row 1: [orange swatch] Outer ring = Human   [purple swatch] Centre = AI
    //   Row 2 (italic, smaller, centred): Each axis = one contributor role
    // The previous single-line legend ran past the panel's right edge and was
    // clipped at "contributor r…".  Numbers chosen to keep the two-swatch group
    // visually centred under W/2 = 360.
    const _legGroupStart = Math.round(W/2) - 165;          // group total width ≈ 330
    body += `<rect x="${_legGroupStart}" y="${capY + 50}" width="26" height="18" fill="#DD5510" opacity="0.72" rx="2"/>`;
    body += `<text x="${_legGroupStart + 34}" y="${capY + 64}" ${ff} font-size="15" font-weight="600" fill="#334155">Outer ring = Human</text>`;
    body += `<rect x="${_legGroupStart + 208}" y="${capY + 50}" width="26" height="18" fill="#6E55D6" opacity="0.72" rx="2"/>`;
    body += `<text x="${_legGroupStart + 242}" y="${capY + 64}" ${ff} font-size="15" font-weight="600" fill="#334155">Centre = AI</text>`;
    body += `<text x="${W/2}" y="${capY + 88}" text-anchor="middle" ${ff} font-size="13" font-style="italic" fill="#475569">Each axis = one contributor role</text>`;

    // Disclaimer (large, two lines)
    body += `<line x1="20" y1="${stmtY - 6}" x2="${W-20}" y2="${stmtY - 6}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    const stmtLine1 = "After using any tools or services, the author(s) reviewed and edited";
    const stmtLine2 = "the content as needed and take(s) full responsibility for the content of the publication.";
    body += `<text x="${W/2}" y="${stmtY + 8}" text-anchor="middle" ${ff} font-size="12" fill="#334155" font-style="italic">${esc(stmtLine1)}</text>`;
    body += `<text x="${W/2}" y="${stmtY + 26}" text-anchor="middle" ${ff} font-size="12" fill="#334155" font-style="italic">${esc(stmtLine2)}</text>`;

    // CRediT attribution — only when the active taxonomy is CRediT
    if (_isCRediT) {
      const attrY = stmtY + stmtH + 6;
      body += `<text x="${W/2}" y="${attrY}" text-anchor="middle" ${ff} font-size="10" fill="#64748B">${esc(_creditAttrib1)}</text>`;
      body += `<text x="${W/2}" y="${attrY + 14}" text-anchor="middle" ${ff} font-size="10" fill="#64748B">More info at <tspan font-weight="600" fill="#2451CB">https://credit.niso.org</tspan></text>`;
    }

    // Citation block — emit wrapped lines from the arrays computed above (citation → website → licence)
    body += `<line x1="20" y1="${citY - 8}" x2="${W-20}" y2="${citY - 8}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    {
      let _y = citY + 12;
      _citationLines.forEach(line => {
        body += `<text x="20" y="${_y}" ${ff} font-size="10.5" fill="#334155" font-style="italic">${esc(line)}</text>`;
        _y += 14;
      });
      _y += 6;
      _websiteLines.forEach(line => {
        body += `<text x="20" y="${_y}" ${ff} font-size="10" fill="#64748B">${esc(line)}</text>`;
        _y += 14;
      });
      _y += 4;
      body += `<text x="20" y="${_y}" ${ff} font-size="10" fill="#64748B">${esc(_licenceLine)}</text>`;
      _y += 16;
      body += `<text x="20" y="${_y}" ${ff} font-size="9" fill="#94A3B8">Generated ${_stamp().replace('_', ' ').replace(/(\d{2})$/, ':$1')}</text>`;
    }

    // ── Structured metadata block (machine-readable JSON inside SVG <metadata>) ──
    // Mirrors the metadata embedded in the Table+Figure export so the figure-only
    // download is also fully self-describing for downstream tooling.
    const metaObj = {
      schema: "CRediT Contributor Role Taxonomy — https://credit.niso.org/",
      tool: "sIfA AI Contribution Statement Tool",
      toolVersion: APP_VERSION,
      doi: "10.5281/zenodo.20285993",
      generated: new Date().toISOString(),
      extentScale: "0 = no AI use · 1 = some AI use · 2 = extensive AI use",
      roles: roles.map(r => {
        const d = data[r.id];
        return {
          id: r.id,
          label: r.label,
          definition: r.def,
          contributors: (d.contributors||[]).map(c => ({
            name: c.name,
            level: c.level || null,
            aiTool: c.tool || null,
            reason: c.reason || null,
            extent: c.extent || 0,
            extentLabel: EXTENT_LABELS[c.extent || 0],
          })),
          aiTool: d.tool || null,
          reason: d.reason || null,
          extent: d.extent,
          extentLabel: EXTENT_LABELS[d.extent],
        };
      }),
    };
    const metaJSON = JSON.stringify(metaObj, null, 2);

    const svgStr = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:sifa="https://credit.niso.org/sifa"
     viewBox="0 0 ${W} ${H}"
     width="${W}" height="${H}"
     style="font-family: ${_ff}">
  <metadata>
    <sifa:AIContributionStatement>
      <![CDATA[${metaJSON}]]>
    </sifa:AIContributionStatement>
  </metadata>
${body}
</svg>`;

    if (format === 'jpeg') {
      _rasteriseToJPEG(svgStr, W, H, 'sIfA Figure');
    } else {
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `sIfA Figure ${_stamp()}.svg`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
  };

  const downloadSVG = (format = 'svg') => {
    if (!validateBeforeDownload()) return;
    // ── Composite SVG: table (left) + chart (right) ──
    const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const ff  = `font-family="${_ff.replace(/"/g, '&quot;')}"`;
    const shorten = (s, n) => s && s.length > n ? s.slice(0, n-1)+'…' : (s||'');

    // Extent colour scale (matches EXTENT_COLORS)
    const dlExtColors = ["","#8C78E0","#3B1D7F"];
    const dlExtLabel = v => {
      const rv = parseFloat(v) || 0;
      if (rv === 0)   return "No AI use";
      if (rv <= 0.5)  return "Minimal AI use";
      if (rv <= 1)    return "Some AI use";
      if (rv <= 1.5)  return "Considerable AI use";
      return "Extensive AI use";
    };
    // Two squares showing AI extent; supports 0.5 steps via fill-opacity
    const extSq = (sx, sy, val, sq=8) => {
      const v = parseFloat(val) || 0;
      const op1 = v >= 1 ? 1 : v > 0 ? v / 1 : 0;          // 0→0, 0.5→0.5, 1+→1
      const op2 = v >= 2 ? 1 : v > 1 ? (v - 1) / 1 : 0;    // ≤1→0, 1.5→0.5, 2→1
      const c1 = op1 > 0 ? dlExtColors[1] : "#E2E8F0";
      const c2 = op2 > 0 ? dlExtColors[2] : "#E2E8F0";
      return [
        `<rect x="${(sx).toFixed(1)}" y="${sy}" width="${sq}" height="${sq}" rx="1.5" fill="${c1}" fill-opacity="${op1 > 0 ? op1.toFixed(2) : 1}"/>`,
        `<rect x="${(sx+sq+3).toFixed(1)}" y="${sy}" width="${sq}" height="${sq}" rx="1.5" fill="${c2}" fill-opacity="${op2 > 0 ? op2.toFixed(2) : 1}"/>`,
      ].join('');
    };

    // ── Helpers: full word-wrap for table cells ──
    // wrapLines splits text on word boundaries and never truncates — a
    // single overlong word is hard-broken with a hyphen instead of an
    // ellipsis so no information is silently lost.
    const wrapLines = (txt, maxCh) => {
      if (!txt && txt !== 0) return [];
      const words = String(txt).split(/\s+/).filter(Boolean);
      const out = []; let cur = '';
      for (const w of words) {
        const cand = cur ? cur + ' ' + w : w;
        if (cand.length <= maxCh) { cur = cand; continue; }
        if (cur) { out.push(cur); cur = ''; }
        let rest = w;
        while (rest.length > maxCh) {
          out.push(rest.slice(0, maxCh - 1) + '-');
          rest = rest.slice(maxCh - 1);
        }
        cur = rest;
      }
      if (cur) out.push(cur);
      return out;
    };
    // Role labels — preserves the existing em-dash split so labels like
    // "Writing – original draft" break at the dash rather than mid-word.
    const wrapRoleLabel = (lbl) => {
      if (!lbl) return [''];
      if (lbl.length <= 18) return [lbl];
      const di = lbl.indexOf(' – ');
      if (di > 0 && di <= 18) {
        const a = lbl.slice(0, di + 2);     // includes the " –"
        const b = lbl.slice(di + 3);
        return [a, ...wrapLines(b, 18)];
      }
      return wrapLines(lbl, 18);
    };
    // wrapSvg kept as a thin adapter so existing call-sites still work.
    const wrapSvg = (txt, maxCh, x, startY, dy, attrs) =>
      wrapLines(txt, maxCh)
        .map((l,i) => `<text x="${x}" y="${startY + i*dy}" ${attrs}>${esc(l)}</text>`)
        .join('');

    // Only include roles that have any data (skip blank and explicitly-skipped rows)
    const dlRoles = roles.filter(role => {
      const d = data[role.id];
      if (d.skipped) return false;
      const cs = d.contributors || [];
      return cs.length > 0 || d.extent > 0 || d.tool || d.reason;
    });

    // Dynamic row heights — every text column wraps, and each row grows
    // to fit the tallest cell so no information is clipped.
    const tHdrH = 50, tTitleH = 56;
    const tBodyY = tTitleH + tHdrH;
    // Approximate character widths tuned to the table column widths below.
    // (Sans-serif at the given font size; conservative enough that
    // wrapping never overshoots the column boundary visually.)
    const CH = { nameMulti: 22, nameSingle: 24,
                 auditMulti: 26, auditSingle: 28,
                 toolMulti:  27, toolSingle:  30 };
    const LH = { role: 16, name: 14, level: 13, audit: 13, tool: 13 };
    const layouts = dlRoles.map(role => {
      const d = data[role.id] || {};
      const contribs = d.contributors || [];
      const roleLines = wrapRoleLabel(role.label);
      if (contribs.length >= 1) {
        const multi = contribs.length > 1;
        const subRows = contribs.map(c => {
          // In multi-contributor mode the level abbreviation is inlined
          // with the name so it shares the column; in single mode the
          // full word sits on its own line beneath.
          const lvlAbbr = c.level === 'Sole' ? 'So' : (c.level ? c.level[0] : '');
          const nameTxt = multi && lvlAbbr
            ? `${c.name || ''} (${lvlAbbr})`
            : (c.name || '');
          const nameLines  = wrapLines(nameTxt, multi ? CH.nameMulti  : CH.nameSingle);
          const showLevel  = !multi && !!c.level;
          const reasonRaw  = c.reason || (!multi ? (d.reason || '') : '');
          const toolRaw    = c.tool   || (!multi ? (d.tool   || '') : '');
          const reasonLines= wrapLines(reasonRaw, multi ? CH.auditMulti : CH.auditSingle);
          const toolLines  = wrapLines(toolRaw,   multi ? CH.toolMulti  : CH.toolSingle);
          const nameH  = nameLines.length * LH.name + (showLevel ? LH.level : 0);
          const auditH = reasonLines.length * LH.audit;
          const toolH  = toolLines.length * LH.tool;
          const height = Math.max(nameH, auditH, toolH, 28) + 6;
          return { nameLines, showLevel, levelText: c.level || '',
                   reasonLines, toolLines, extent: c.extent || 0, height };
        });
        const bodyH = subRows.reduce((s, sr) => s + sr.height, 0) + 12;
        const height = Math.max(bodyH, roleLines.length * LH.role + 16, 44);
        return { type: multi ? 'multi' : 'single', roleLines, subRows, height };
      }
      // No contributors — just row-level extent/reason/tool.
      const reasonLines = wrapLines(d.reason || '', CH.auditSingle);
      const toolLines   = wrapLines(d.tool   || '', CH.toolSingle);
      const bodyH = Math.max(reasonLines.length * LH.audit,
                             toolLines.length   * LH.tool, 28) + 16;
      const height = Math.max(bodyH, roleLines.length * LH.role + 16, 44);
      return { type: 'none', roleLines, reasonLines, toolLines,
               extent: d.extent || 0, height };
    });
    const rowHeights = layouts.map(L => L.height);
    const totalTableBodyH = rowHeights.reduce((s,h) => s+h, 0);

    // Layout: figure on the LEFT (smaller), table on the RIGHT (wider).
    // rightW (table) widened so columns no longer clip; rightW (figure) shrunk so it
    // doesn't dominate the page and there's no wasted whitespace on the right.
    const W = 1300;
    const rightW = 520;                    // figure panel (left side)
    const leftW  = W - rightW - 6;         // table panel (right side); 6px gap+divider
    const divX = rightW + 2, rightX = rightW + 6;
    // Match the chart embed's tighter viewBox ("-25 0 670 620") so the
    // pre-computed chart height used for the overall figure-height calculation
    // tracks the chart's actual rendered height (otherwise the layout leaves
    // a gap between the chart and the caption block beneath it).
    const _chartScale = (rightW - 20) / 670;
    const _chartH = Math.round(620 * _chartScale);
    const _chartOffY = 56;                 // chart starts just under the 'sIfA' title
    // Bottom block on the figure side: caption (~76) + disclaimer (~50) + CRediT (~30) + safety (~30)
    // Bottom block on the figure side: caption (~96, now incl. 2-line legend)
    // + disclaimer (~50) + CRediT (~30) + safety (~30).
    const _stmtH = (_isCRediT ? 220 : 190);
    const H = Math.max(_chartOffY + _chartH + _stmtH, tBodyY + totalTableBodyH + 170);

    // Column edges within the (wider) table panel — gives the Tool / Service column real room.
    const cX = [0, 130, 290, 390, 550];  // Performed-by narrowed (level stacks below name), Tool/Service widened so long model names fit
    // Each entry is either a single-line string or an array of lines (rendered stacked).
    const colNames = [
      taxonomyMode === 'credit' ? 'CRediT Role' : 'Role',
      'Performed by',
      'Extent of AI Use',
      ['How was AI used?', 'Audit trail?'],
      'Tool / Service',
    ];

    let left = '';
    left += `<rect width="${leftW}" height="${H}" fill="#F8FAFC"/>`;
    // Title bar
    left += `<rect width="${leftW}" height="${tTitleH}" fill="#111111"/>`;
    left += `<text x="14" y="24" ${ff} font-size="13.5" font-weight="700" fill="white">Statement of Intellectual Fellowship and Accountability (sIfA)</text>`;
    left += `<text x="14" y="44" ${ff} font-size="11" fill="rgba(255,255,255,0.72)">AI interaction across specified contributor roles</text>`;
    // Column header bar (taller to fit 2-line headers)
    left += `<rect y="${tTitleH}" width="${leftW}" height="${tHdrH}" fill="#1A1A1A"/>`;
    colNames.forEach((cn, ci) => {
      const lines = Array.isArray(cn) ? cn : [cn];
      const lineH = 14;
      const startY = tTitleH + tHdrH/2 - ((lines.length - 1) * lineH) / 2 + 4;
      lines.forEach((line, li) => {
        left += `<text x="${cX[ci]+8}" y="${startY + li*lineH}" ${ff} font-size="11.5" font-weight="700" fill="white">${esc(line)}</text>`;
      });
    });

    // Rows — per-contributor stacking with full column wrapping.
    // Every cell can wrap onto as many lines as it needs; row heights
    // come from the pre-computed `layouts` so nothing overflows.
    let ry = tBodyY;
    layouts.forEach((L, ri) => {
      const role = dlRoles[ri];
      const d    = data[role.id] || {};
      const rh   = L.height;
      const contribs = d.contributors || [];
      const active   = d.tool || d.extent > 0 || contribs.length > 0;

      left += `<rect y="${ry}" width="${leftW}" height="${rh}" fill="${active ? '#EFF6FF' : 'white'}"/>`;
      if (ri > 0) left += `<line x1="0" y1="${ry}" x2="${leftW}" y2="${ry}" stroke="#E2E8F0" stroke-width="0.7"/>`;
      left += `<rect x="0" y="${ry}" width="4" height="${rh}" fill="${role.accent}"/>`;

      // Role label — vertically centred, wraps with no truncation
      const roleBlockH = L.roleLines.length * LH.role;
      const roleTopY   = ry + (rh - roleBlockH) / 2 + 12;
      L.roleLines.forEach((line, li) => {
        left += `<text x="10" y="${roleTopY + li * LH.role}" ${ff} font-size="11.5" font-weight="600" fill="${role.accent}">${esc(line)}</text>`;
      });

      if (L.type === 'multi') {
        // ── Multiple contributors: each gets its own sub-row, sized
        //    to fit whichever column wraps the most. ──
        let sy = ry + 8;
        L.subRows.forEach(sr => {
          const baseY = sy + 12;          // first-line baseline within sub-row
          // Name (with level abbreviation already inlined)
          sr.nameLines.forEach((line, li) => {
            left += `<text x="${cX[1]+6}" y="${baseY + li*LH.name}" ${ff} font-size="10.5" fill="#334155">${esc(line)}</text>`;
          });
          // Extent squares — vertically centred within the sub-row
          left += extSq(cX[2]+6, sy + Math.max((sr.height - 16) / 2, 2), sr.extent, 8);
          // Audit trail
          sr.reasonLines.forEach((line, li) => {
            left += `<text x="${cX[3]+6}" y="${baseY + li*LH.audit}" ${ff} font-size="10" fill="#334155">${esc(line)}</text>`;
          });
          // Tool / service
          sr.toolLines.forEach((line, li) => {
            left += `<text x="${cX[4]+6}" y="${baseY + li*LH.tool}" ${ff} font-size="10" fill="#334155">${esc(line)}</text>`;
          });
          sy += sr.height;
        });
      } else if (L.type === 'single') {
        // ── Single contributor — name on lines 1..N, level on its
        //    own line below; audit and tool fill their columns. ──
        const sr = L.subRows[0];
        sr.nameLines.forEach((line, li) => {
          left += `<text x="${cX[1]+6}" y="${ry + 17 + li*LH.name}" ${ff} font-size="11.5" fill="#334155">${esc(line)}</text>`;
        });
        if (sr.showLevel) {
          const lvlY = ry + 17 + sr.nameLines.length * LH.name;
          left += `<text x="${cX[1]+6}" y="${lvlY}" ${ff} font-size="10" font-style="italic" fill="#64748B">${esc(sr.levelText)}</text>`;
        }
        left += extSq(cX[2]+6, ry + rh/2 - 4, sr.extent, 9);
        sr.reasonLines.forEach((line, li) => {
          left += `<text x="${cX[3]+6}" y="${ry + 17 + li*LH.audit}" ${ff} font-size="11" fill="#334155">${esc(line)}</text>`;
        });
        sr.toolLines.forEach((line, li) => {
          left += `<text x="${cX[4]+6}" y="${ry + 17 + li*LH.tool}" ${ff} font-size="11.5" fill="#334155">${esc(line)}</text>`;
        });
      } else {
        // ── No contributors — extent/reason/tool set directly on the row. ──
        if (L.extent > 0) left += extSq(cX[2]+6, ry + rh/2 - 4, L.extent, 9);
        L.reasonLines.forEach((line, li) => {
          left += `<text x="${cX[3]+6}" y="${ry + 17 + li*LH.audit}" ${ff} font-size="11" fill="#334155">${esc(line)}</text>`;
        });
        L.toolLines.forEach((line, li) => {
          left += `<text x="${cX[4]+6}" y="${ry + 17 + li*LH.tool}" ${ff} font-size="11.5" fill="#334155">${esc(line)}</text>`;
        });
      }

      ry += rh;
    });

    // Column dividers
    [1,2,3,4].forEach(ci => {
      left += `<line x1="${cX[ci]}" y1="${tTitleH}" x2="${cX[ci]}" y2="${H}" stroke="#CBD5E1" stroke-width="0.7"/>`;
    });

    // ── Footer text below table ──
    // Three logical lines: website + licence + citation. Long lines (the website
    // sentence and the citation) are wrapped at a safe character width via wrapSvg
    // so the GitHub URL is never clipped at the right edge of the table panel.
    const footerY = tBodyY + totalTableBodyH + 12;
    const _websiteLine  = `The sIfA tool can be used and downloaded at www.busara.global or at https://github.com/mareikeschomerus-ctrl/sIfA.`;
    const _licenceLine  = `Released under the Apache License 2.0`;
    const _citationFull = `This sIfA was created using: ${CITATION_TEXT}`;
    // wrapSvg returns ready-to-go <text> elements; we manage y by counting wrapped lines ourselves
    const _wrapToLines = (txt, maxCh) => {
      const words = txt.split(' '); const out = []; let cur = '';
      for (const w of words) {
        const cand = cur ? cur + ' ' + w : w;
        if (cand.length <= maxCh) cur = cand;
        else { if (cur) out.push(cur); cur = w; }
      }
      if (cur) out.push(cur);
      return out;
    };
    const _wLines = _wrapToLines(_websiteLine, 130);
    const _cLines = _wrapToLines(_citationFull, 110);
    let _fy = footerY;
    // 1) Citation
    _cLines.forEach(line => { left += `<text x="10" y="${_fy}" ${ff} font-size="10.5" fill="#334155" font-style="italic">${esc(line)}</text>`; _fy += 14; });
    _fy += 6;
    // 2) Website
    _wLines.forEach(line => { left += `<text x="10" y="${_fy}" ${ff} font-size="10" fill="#64748B">${esc(line)}</text>`; _fy += 14; });
    _fy += 4;
    // 3) Licence
    left += `<text x="10" y="${_fy}" ${ff} font-size="10" fill="#64748B">${esc(_licenceLine)}</text>`;
    _fy += 16;
    left += `<text x="10" y="${_fy}" ${ff} font-size="9" fill="#94A3B8">Generated ${_stamp().replace('_', ' ').replace(/(\d{2})$/, ':$1')}</text>`;

    // ── FIGURE panel (now on the LEFT of the SVG output) ──
    const activeRoles = roles.filter(r => !data[r.id]?.skipped);
    const aiActiveRoles = roles.filter(r => (data[r.id]?.extent||0) > 0);
    const totalAI = aiActiveRoles.reduce((s,r) => s+(data[r.id]?.extent||0), 0);
    const avgExt = aiActiveRoles.length > 0 ? (totalAI/aiActiveRoles.length).toFixed(1) : '0.0';
    const chartInner = svgRef.current.innerHTML;
    // Chart viewBox "-25 0 670 620" hugs the chart content tightly: role labels
    // span viewBox x ∈ [-17, 637] (text-anchor start/end at radius 215), so this
    // window gives ~8 px breathing room on each side and the figure fills the
    // panel rather than leaving blank space on the right.
    const chartScale = (rightW - 20) / 670;
    const chartW = Math.round(670 * chartScale);
    const chartH = Math.round(620 * chartScale);
    const chartOffX = Math.round((rightW - chartW) / 2);
    const chartOffY = _chartOffY;          // 56 — leaves room for just 'sIfA' title

    let right = '';
    right += `<rect width="${rightW}" height="${H}" fill="white"/>`;
    // Title — just 'sIfA'
    right += `<text x="${rightW/2}" y="36" text-anchor="middle" ${ff} font-size="26" font-weight="700" fill="#1E293B">sIfA</text>`;
    // Embedded chart
    right += `<svg x="${chartOffX}" y="${chartOffY}" width="${chartW}" height="${chartH}" viewBox="-25 0 670 620" xmlns="http://www.w3.org/2000/svg">${chartInner}</svg>`;

    // Caption / legend block beneath the figure
    const capY = chartOffY + chartH + 12;
    right += `<line x1="10" y1="${capY - 4}" x2="${rightW-10}" y2="${capY - 4}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    right += `<text x="${rightW/2}" y="${capY + 14}" text-anchor="middle" ${ff} font-size="12.5" fill="#64748B">AI interaction across specified roles · 0 = no AI · 1 = some · 2 = extensive</text>`;
    right += `<text x="${rightW/2}" y="${capY + 34}" text-anchor="middle" ${ff} font-size="12.5" fill="#334155">${aiActiveRoles.length} role${aiActiveRoles.length!==1?'s':''} with AI interaction · average extent ${avgExt}/2</text>`;
    // Legend — split across two rows so the full text fits within the (narrower)
    // chart panel.  Row 1: two swatches + short labels, group-centred.
    // Row 2 (italic, smaller, centred): Each axis = one contributor role.
    // The previous single-line legend ran past rightW=520 and was clipped at
    // "contributor r…".
    const _legGroupStart = Math.round(rightW/2) - 150;     // group total width ≈ 300
    right += `<rect x="${_legGroupStart}" y="${capY + 50}" width="22" height="16" fill="#DD5510" opacity="0.72" rx="2"/>`;
    right += `<text x="${_legGroupStart + 30}" y="${capY + 63}" ${ff} font-size="14" font-weight="600" fill="#334155">Outer ring = Human</text>`;
    right += `<rect x="${_legGroupStart + 188}" y="${capY + 50}" width="22" height="16" fill="#6E55D6" opacity="0.72" rx="2"/>`;
    right += `<text x="${_legGroupStart + 218}" y="${capY + 63}" ${ff} font-size="14" font-weight="600" fill="#334155">Centre = AI</text>`;
    right += `<text x="${rightW/2}" y="${capY + 85}" text-anchor="middle" ${ff} font-size="12" font-style="italic" fill="#475569">Each axis = one contributor role</text>`;

    // Accountability disclaimer beneath the caption block.
    // 96 = old 76 + 20 px to make room for the new "Each axis…" legend line.
    const stmtY = capY + 96;
    right += `<line x1="10" y1="${stmtY - 6}" x2="${rightW-10}" y2="${stmtY - 6}" stroke="#E2E8F0" stroke-width="0.8"/>`;
    const stmtLine1 = "After using any tools or services, the author(s) reviewed and edited";
    const stmtLine2 = "the content as needed and take(s) full responsibility for the content of the publication.";
    right += `<text x="${rightW/2}" y="${stmtY + 8}" text-anchor="middle" ${ff} font-size="11" fill="#334155" font-style="italic">${esc(stmtLine1)}</text>`;
    right += `<text x="${rightW/2}" y="${stmtY + 24}" text-anchor="middle" ${ff} font-size="11" fill="#334155" font-style="italic">${esc(stmtLine2)}</text>`;

    // CRediT attribution — only when the active taxonomy is CRediT
    if (_isCRediT) {
      const attrY = stmtY + 50;
      right += `<text x="${rightW/2}" y="${attrY}" text-anchor="middle" ${ff} font-size="10" fill="#64748B">${esc(_creditAttrib1)}</text>`;
      right += `<text x="${rightW/2}" y="${attrY + 14}" text-anchor="middle" ${ff} font-size="10" fill="#64748B">More info at <tspan font-weight="600" fill="#2451CB">https://credit.niso.org</tspan></text>`;
    }

    // ── Structured metadata block (machine-readable JSON inside SVG <metadata>) ──
    const metaObj = {
      schema: "CRediT Contributor Role Taxonomy — https://credit.niso.org/",
      tool: "sIfA AI Contribution Statement Tool",
      toolVersion: APP_VERSION,
      doi: "10.5281/zenodo.20285993",
      generated: new Date().toISOString(),
      extentScale: "0 = no AI use · 1 = some AI use · 2 = extensive AI use",
      roles: roles.map(r => {
        const d = data[r.id];
        return {
          id: r.id,
          label: r.label,
          definition: r.def,
          contributors: (d.contributors||[]).map(c => ({
            name: c.name,
            level: c.level || null,
            aiTool: c.tool || null,
            reason: c.reason || null,
            extent: c.extent || 0,
            extentLabel: EXTENT_LABELS[c.extent || 0],
          })),
          aiTool: d.tool || null,
          reason: d.reason || null,
          extent: d.extent,
          extentLabel: EXTENT_LABELS[d.extent],
        };
      }),
    };
    const metaJSON = JSON.stringify(metaObj, null, 2);

    const svgStr = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:sifa="https://credit.niso.org/sifa"
     viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"
     style="font-family: ${_ff}">
  <metadata>
    <sifa:AIContributionStatement>
      <![CDATA[${metaJSON}]]>
    </sifa:AIContributionStatement>
  </metadata>
  <g>${right}</g>
  <line x1="${divX}" y1="0" x2="${divX}" y2="${H}" stroke="#CBD5E1" stroke-width="1"/>
  <g transform="translate(${rightX},0)">${left}</g>
</svg>`;

    if (format === 'jpeg') {
      _rasteriseToJPEG(svgStr, W, H, 'sIfA Table and Figure');
    } else {
      const blob = new Blob([svgStr], { type:"image/svg+xml" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `sIfA Table and Figure ${_stamp()}.svg`;
      a.click();
    }
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
      <svg ref={svgRef} viewBox="0 0 620 620" style={{ width:"100%", maxWidth:340, fontFamily: _ff }}
        xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="brainClip">
            <path d={brainPath} />
          </clipPath>
          {/* Soft blur for blob glow layers */}
          <filter id="blobBlur" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" />
          </filter>
        </defs>

        {/* White background */}
        <rect width="620" height="620" fill="white" />

        {/* Brain — solid uniform blue fill */}
        <path d={brainPath} fill="#DD5510" fillOpacity={0.72} stroke="none" />


        {/* Sulci — faint cream lines for subtle cortical texture on the orange field */}
        <g clipPath="url(#brainClip)" fill="none" stroke="white"
          strokeOpacity={0.30} strokeWidth={1.5} strokeLinecap="round">
          {sulci.map((d, i) => <path key={i} d={d} />)}
        </g>

        {/* Brain outline — darker blue edge */}
        <path d={brainPath} fill="none" stroke="#5D1F08" strokeWidth={1.8} />

        {/* Organic rings — softly wobbled concentric layers, evoke brain tissue depth */}
        <g clipPath="url(#brainClip)">
          {[1,2,3,4,5].map(l => (
            <path key={l} d={organicRing(l/5)} fill="none"
              stroke="white" strokeOpacity={0.27} strokeWidth={0.95} />
          ))}
          {/* Spokes — very faint scale reference lines */}
          {activeRoles.map((_, i) => {
            const ox = cx + dataR * Math.cos(ang(i));
            const oy = cy + dataR * Math.sin(ang(i));
            return <line key={i} x1={cx} y1={cy} x2={ox} y2={oy}
              stroke="white" strokeOpacity={0.22} strokeWidth={0.7} />;
          })}
        </g>

        {/* AI blob — 5 blurred glow layers, lightest (extent≥1) to deepest (extent=5) */}
        <g clipPath="url(#brainClip)">
          {[1,2].map(k => {
            const d = activeRoles.map((r, i) => {
              const val = Math.min(data[r.id]?.extent || 0, k);
              const x = (cx + (val/2)*dataR*Math.cos(ang(i))).toFixed(1);
              const y = (cy + (val/2)*dataR*Math.sin(ang(i))).toFixed(1);
              return `${i===0?"M":"L"}${x},${y}`;
            }).join(" ") + " Z";
            return (
              <path key={k} d={d}
                fill={EXTENT_COLORS[k]} fillOpacity={0.72}
                filter="url(#blobBlur)" />
            );
          })}
        </g>
        {/* Solid fill — always visible regardless of extent size */}
        {totalAI > 0 && (
          <path d={aiBlob} clipPath="url(#brainClip)"
            fill="#6E55D6" fillOpacity={0.55}
            stroke="#5341BC" strokeWidth={5} strokeOpacity={0.9} />
        )}

        {/* Scale rings at val=1 and val=2 — darker burnt orange */}
        <circle cx={cx} cy={cy} r={dataR * 0.5} fill="none"
          stroke="#A53807" strokeOpacity={0.92} strokeWidth={2.6} strokeDasharray="5 4" />
        <circle cx={cx} cy={cy} r={dataR} fill="none"
          stroke="#A53807" strokeOpacity={0.85} strokeWidth={2.3} strokeDasharray="5 4" />
        {/* Scale numbers on first axis — prominent white pill */}
        {[1,2].map(l => {
          const p = pt(0, l);
          return (
            <g key={l}>
              <rect x={p.x + 3} y={p.y - 10} width={20} height={20} rx={4}
                fill="rgba(0,0,0,0.38)" />
              <text x={p.x + 13} y={p.y} textAnchor="middle" dominantBaseline="middle"
                fontSize={16} fontWeight={800} fill="white">{l}</text>
            </g>
          );
        })}

        {/* Data sparkles — ✦ coloured by extent level, light→deep red */}
        {activeRoles.map((r, i) => {
          const val = data[r.id]?.extent || 0;
          if (val === 0) return null;
          const p = pt(i, val);
          return (
            <path key={i} d={sparklePt(p.x, p.y, 11)}
              fill={EXTENT_COLORS[val]} stroke="white" strokeWidth={1.6} strokeOpacity={0.9} opacity={1} />
          );
        })}

        {/* Role labels — outside brain, in each role's accent colour */}
        {activeRoles.map((r, i) => {
          const { x, y, a } = labelPt(i);
          const ta = anchor(a);
          const lines = getShortLabel(r);
          const lh = 15;
          const offsetY = lines.length > 1 ? -(lh * (lines.length - 1)) / 2 : 0;
          return (
            <g key={i}>
              {lines.map((line, li) => (
                <text key={li} x={x} y={y + offsetY + li * lh}
                  textAnchor={ta} dominantBaseline="middle"
                  fontSize={16.5} fontWeight={600} fill={r.accent}>
                  {line}
                </text>
              ))}
            </g>
          );
        })}

      </svg>

      {/* Download / Print */}
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", justifyContent:"center" }}>
        <button onClick={() => downloadSVG('svg')} style={{
          padding:"8px 18px", background:"#2451CB", color:"white",
          border:"none", borderRadius:2, cursor:"pointer", fontWeight:600, fontSize:13,
        }}>⬇ Table & Figure · SVG</button>
        <button onClick={() => downloadSVG('jpeg')} style={{
          padding:"8px 18px", background:"#2451CB", color:"white",
          border:"none", borderRadius:2, cursor:"pointer", fontWeight:600, fontSize:13,
        }}>⬇ Table & Figure · JPEG</button>
        <button onClick={() => downloadFigureOnly('svg')} style={{
          padding:"8px 18px", background:"white", color:"#2451CB",
          border:"1px solid #2451CB", borderRadius:2, cursor:"pointer", fontWeight:600, fontSize:13,
        }}>⬇ Figure only · SVG</button>
        <button onClick={() => downloadFigureOnly('jpeg')} style={{
          padding:"8px 18px", background:"white", color:"#2451CB",
          border:"1px solid #2451CB", borderRadius:2, cursor:"pointer", fontWeight:600, fontSize:13,
        }}>⬇ Figure only · JPEG</button>
        <button onClick={() => window.print()} style={{
          padding:"8px 18px", background:"white", color:"#111111",
          border:"1px solid #111111", borderRadius:2, cursor:"pointer", fontWeight:600, fontSize:13,
        }}>📄 Save as PDF</button>
      </div>

      {/* Textual legend — labels each colour so the figure is
          intelligible to screen readers and colour-blind users. */}
      <div role="note" aria-label="Figure legend"
        style={{ display:"flex", flexWrap:"wrap", gap:14, justifyContent:"center",
                 alignItems:"center", fontSize:12, color:"#334155" }}>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <span aria-hidden="true" style={{ display:"inline-block", width:14, height:14, background:"#DD5510", opacity:0.72, borderRadius:2 }} />
          Human contribution (outer ring)
        </span>
        <span style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
          <span aria-hidden="true" style={{ display:"inline-block", width:14, height:14, background:"#6E55D6", opacity:0.72, borderRadius:2 }} />
          AI use (1 = some, 2 = extensive)
        </span>
      </div>

      {/* Mini summary */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, maxWidth:560, justifyContent:"center" }}>
        {roles.filter(r => (data[r.id]?.extent || 0) > 0).map(r => (
          <span key={r.id} style={{
            background:r.bg, border:`1px solid ${r.accent}`, color:r.accent,
            borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:600,
          }}>
            {r.label}: {EXTENT_LABELS[data[r.id].extent]}
          </span>
        ))}
      </div>
    </div>
  );
});

// ── Agent ─────────────────────────────────────────────────────
// Phase flow per role:
//   performer → performerLevel (btn) → tool → reason → extent (btn) → addAnother (btn)
//   addAnother: Yes btn → back to performer; No btn → finalizeRole & nextRole
function Agent({ onUpdate, onClose, onSetRoles }) {
  const [msgs, setMsgs] = useState([
    { from:"agent", text:"Hi! I'm your AI Contribution Agent 🤖\n\nFirst, which taxonomy would you like to use for your sIfA?", taxonomyPicker:true }
  ]);
  const [inp, setInp] = useState("");
  const [ri, setRi] = useState(-1);
  const [phase, setPhase] = useState("taxonomy");
  const [waiting, setWaiting] = useState(true);
  const [customRolesList, setCustomRolesList] = useState([]);
  const bottom = useRef(null);
  const rolesRef = useRef(null);
  // Refs avoid stale-closure bugs in button click handlers
  const currentContribRef  = useRef({});   // { name, level, tool, reason, extent } for the contributor in progress
  const currentContribsRef = useRef([]);   // finished contributors for the current role
  const getRoles = () => rolesRef.current || ROLES;

  useEffect(() => { bottom.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs]);

  const add = (from, text, extra = {}) => setMsgs(m => [...m, { from, text, ...extra }]);

  const LEVEL_WEIGHT = { Sole: 1.0, Lead: 0.7, Equal: 0.5, Support: 0.3 };

  const pickTaxonomy = (choice) => {
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.taxonomyPicker
      ? {...msg, taxonomyPicker:false, text: msg.text + (choice === 'credit' ? '\n→ CRediT taxonomy selected.' : '\n→ Own taxonomy selected.')}
      : msg));
    if (choice === 'credit') {
      rolesRef.current = ROLES;
      onSetRoles(ROLES, 'credit');
      setPhase("start");
      add("agent", "Great! I'll walk you through each of the 14 CRediT authorship roles and ask whether — and how — you used AI at each stage.", { startBtn:true });
    } else {
      setPhase("collectingRoles");
      add("agent", "What contribution would you like to include in your sIfA?");
    }
  };

  const pickAddRole = (choice) => {
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.addRolePicker
      ? {...msg, addRolePicker:false, text: msg.text + (choice === 'yes' ? '\n→ Adding another.' : '\n→ Done collecting.')}
      : msg));
    if (choice === 'yes') {
      add("agent", "What contribution would you like to include in your sIfA?");
    } else {
      const customRoles = buildCustomRoles(customRolesList);
      rolesRef.current = customRoles;
      onSetRoles(customRoles, 'custom');
      setPhase("start");
      add("agent",
        `Your ${customRoles.length} contribution${customRoles.length !== 1 ? 's' : ''} have been added:\n${customRoles.map(r => '  · '+r.label).join('\n')}\n\nI'll now walk you through each one.`,
        { startBtn:true });
    }
  };

  const finalizeRole = (roleId, roleIdx) => {
    const contribs = currentContribsRef.current;
    const { wSum, wTotal } = contribs.reduce((acc, c) => {
      const w = LEVEL_WEIGHT[c.level] || 0.5;
      return { wSum: acc.wSum + (c.extent||0)*w, wTotal: acc.wTotal + w };
    }, { wSum:0, wTotal:0 });
    onUpdate(roleId, {
      contributors: contribs,
      extent:  wTotal > 0 ? wSum / wTotal : 0,
      tool:    [...new Set(contribs.map(c => c.tool).filter(Boolean))].join(', '),
      reason:  [...new Set(contribs.map(c => c.reason).filter(Boolean))].join('; '),
    });
    const n = contribs.length;
    add("agent", `Saved ${n} contributor${n!==1?'s':''} for **${getRoles().find(r=>r.id===roleId)?.label}**. Moving on…`);
    setTimeout(() => nextRole(roleIdx + 1), 400);
  };

  const nextRole = idx => {
    currentContribRef.current  = {};
    currentContribsRef.current = [];
    const aRoles = getRoles();
    if (idx >= aRoles.length) {
      setPhase("done");
      add("agent", "All done! 🎉 Your table is now complete.\n\nYou can still edit any field directly in the table. When you're satisfied, use Export CSV or Print/PDF to save your AI Contribution Statement.");
      return;
    }
    setRi(idx);
    setPhase("performer");
    const r = aRoles[idx];
    const taskList = (ROLE_TASKS[r.id]||[]).map(t => `  · ${t}`).join('\n');
    const roleMsg = `(${idx+1}/${aRoles.length}) **${r.label}**` +
      (r.def ? `\n_${r.def}_` : '') +
      (taskList ? `\n\nThis role typically covers:\n${taskList}` : '') +
      `\n\n**Who performed this role? Please enter the name of the person responsible.**`;
    add("agent", roleMsg, { skipPicker:true, roleId:r.id, accent:r.accent, roleIdx:idx });
  };

  // ── Button handlers ──────────────────────────────────────────

  const pickSkipRole = (roleIdx) => {
    setMsgs(m => m.map(msg => msg.skipPicker && msg.roleIdx===roleIdx
      ? {...msg, skipPicker:false, text: msg.text+'\n→ Skipped.'} : msg));
    onUpdate(getRoles()[roleIdx].id, { skipped: true });
    add("agent", `Skipping **${getRoles()[roleIdx].label}**. Moving on…`);
    setTimeout(() => nextRole(roleIdx + 1), 300);
  };

  const beginInterview = () => {
    setMsgs(m => m.map(msg => msg.startBtn ? {...msg, startBtn:false} : msg));
    nextRole(0);
  };

  const pickLevel = (roleId, level) => {
    currentContribRef.current = { ...currentContribRef.current, level };
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.levelPicker && msg.roleId===roleId
      ? {...msg, levelPicker:false, text: msg.text+`\n→ **${level}** selected.`} : msg));
    setPhase("tool");
    const r  = getRoles().find(r => r.id===roleId);
    const nm = currentContribRef.current.name;
    setTimeout(() => add("agent",
      `Write the name of the tool **${nm}** used for **${r.label}** — or click the button if no AI was used.`,
      { toolPicker:true, roleId, accent:r.accent }
    ), 300);
  };

  const pickNoTool = (roleId) => {
    const name = currentContribRef.current.name;
    setMsgs(m => m.map(msg => msg.toolPicker && msg.roleId===roleId
      ? {...msg, toolPicker:false, text: msg.text+`\n→ No AI used.`} : msg));
    currentContribRef.current = { ...currentContribRef.current, tool:"", reason:"", extent:0 };
    currentContribsRef.current = [...currentContribsRef.current, {...currentContribRef.current}];
    const r = getRoles().find(r => r.id===roleId);
    setPhase("addAnother");
    setWaiting(true);
    setTimeout(() => add("agent",
      `No AI used by **${name}** for **${r.label}**.\n\nWould you like to add another contributor to this role?`,
      { addAnotherPicker:true, roleId, accent:r.accent }
    ), 200);
  };

  const pickExtent = (roleId, val) => {
    currentContribRef.current = { ...currentContribRef.current, extent: val };
    currentContribsRef.current = [...currentContribsRef.current, {...currentContribRef.current}];
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.picker && msg.roleId===roleId
      ? {...msg, picker:false, text: msg.text+`\n→ **${EXTENT_LABELS[val]}** (${val}/2) selected.`} : msg));
    const r = getRoles().find(r => r.id===roleId);
    setPhase("addAnother");
    setWaiting(true);
    setTimeout(() => add("agent",
      `Would you like to add another contributor to **${r.label}**?`,
      { addAnotherPicker:true, roleId, accent:r.accent }
    ), 300);
  };

  const pickAddAnother = (roleId, choice, roleIdx) => {
    const r = getRoles().find(r => r.id===roleId);
    if (choice === 'reset') {
      setWaiting(false);
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Starting this role over.'} : msg));
      currentContribRef.current = {};
      currentContribsRef.current = [];
      setPhase("performer");
      add("agent", `Starting fresh for **${r.label}**. Who was the first contributor?`);
      return;
    }
    if (choice === 'yes') {
      setWaiting(false);
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Adding another contributor.'} : msg));
      currentContribRef.current = {};
      setPhase("performer");
      add("agent", `Who else performed **${r.label}**? Please enter their name.`);
      return;
    }
    // 'no': check Rule 3 — all-Support guard (Sole contributor is always valid alone)
    const contribs = currentContribsRef.current;
    const hasSoleContrib = contribs.some(c => c.level === "Sole");
    const allSupport = !hasSoleContrib && contribs.length > 0 && contribs.every(c => c.level === "Support");
    if (allSupport) {
      // Don't close the picker — show a warning and keep it open (re-issued)
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Moving on.'} : msg));
      add("agent",
        `⚠ All contributors listed are **Support** — at least one must be **Equal** or **Lead**.\n\nPlease add another contributor at the appropriate level, or start this role over to reassign levels.`,
        { addAnotherPicker:true, roleId, accent:r.accent }
      );
      return;
    }
    // Single contributor listed as Equal — verify whether Lead was intended (not for Sole)
    const singleEqual = contribs.length === 1 && contribs[0].level === "Equal" && !hasSoleContrib;
    if (singleEqual) {
      setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
        ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Moving on.'} : msg));
      setWaiting(true);
      add("agent",
        `**${contribs[0].name}** is the only contributor listed for **${r.label}** and is assigned **Equal**. Since there is no one to be equal to, should their level be changed to **Lead**?`,
        { verifyLeadPicker:true, roleId, accent:r.accent }
      );
      return;
    }
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.addAnotherPicker && msg.roleId===roleId
      ? {...msg, addAnotherPicker:false, text: msg.text+'\n→ Moving on.'} : msg));
    finalizeRole(roleId, roleIdx);
  };

  const pickVerifyLead = (roleId, choice, roleIdx) => {
    setWaiting(false);
    setMsgs(m => m.map(msg => msg.verifyLeadPicker && msg.roleId===roleId
      ? {...msg, verifyLeadPicker:false, text: msg.text+(choice==='yes' ? '\n→ Changed to Lead.' : '\n→ Kept as Equal.')}
      : msg));
    if (choice === 'yes') {
      currentContribsRef.current = currentContribsRef.current.map((c, i) =>
        i === 0 ? {...c, level:"Lead"} : c
      );
    }
    finalizeRole(roleId, roleIdx);
  };

  // ── Text input (names, tool names, reasons) ──────────────────
  const send = text => {
    if (!text.trim() || waiting) return;
    add("user", text);
    setInp("");
    const low = text.toLowerCase().trim();

    if (phase === "start") {
      if (parseYesNo(text) === 'yes') {
        setMsgs(m => m.map(msg => msg.startBtn ? {...msg, startBtn:false} : msg));
        nextRole(0);
      } else add("agent", "Click **Begin interview** to start!");
      return;
    }
    if (phase === "done") return;
    const r = getRoles()[ri];

    if (phase === "collectingRoles") {
      const newList = [...customRolesList, text.trim()];
      setCustomRolesList(newList);
      setWaiting(true);
      add("agent", `Added: **${text.trim()}**\n\nWould you like to include another contribution in your sIfA?`, { addRolePicker:true });
      return;
    }

    if (phase === "performer") {
      currentContribRef.current = { name: text };
      setPhase("performerLevel");
      setWaiting(true);
      const existing = currentContribsRef.current;
      const hasLead  = existing.some(c => c.level === "Lead");
      const hasEqual = existing.some(c => c.level === "Equal");
      const hasSole  = existing.some(c => c.level === "Sole");
      const availLevels = hasSole   ? []
                        : hasLead  ? ["Support"]
                        : hasEqual ? ["Equal"]
                        : ["Sole", "Lead", "Equal", "Support"];
      const constraint = hasSole   ? "\n_A Sole contributor is already assigned — no further contributors can be added._"
                       : hasLead  ? "\n_One Lead is already assigned — this contributor must be Support._"
                       : hasEqual ? "\n_All contributors for this role must be Equal._"
                       : "";
      add("agent", `What is **${text}**'s level of contribution to **${r.label}**?${constraint}`, { levelPicker:true, roleId:r.id, accent:r.accent, availLevels });
      return;
    }

    if (phase === "tool") {
      const no = parseYesNo(text) === 'no';
      setMsgs(m => m.map(msg => msg.toolPicker && msg.roleId===r.id ? {...msg, toolPicker:false} : msg));
      if (no) {
        pickNoTool(r.id);
      } else {
        currentContribRef.current = { ...currentContribRef.current, tool: text };
        setPhase("reason");
        add("agent", `Got it — **${text}**.\n\nFor **${r.label}**: **how was AI used?** Was it generative or non-generative? Is there an audit trail? (e.g. "generative — drafted introduction; full chat log retained", "non-generative — searched literature with Elicit; results exported to Zotero")`);
      }
      return;
    }

    if (phase === "reason") {
      currentContribRef.current = { ...currentContribRef.current, reason: text };
      setPhase("extent");
      setWaiting(true);
      add("agent",
        `Noted.\n\nHow extensively did **${currentContribRef.current.name}** rely on AI for **${r.label}**?\n_1 = some use of AI · 2 = extensive use of AI_`,
        { picker:true, roleId:r.id, accent:r.accent }
      );
      return;
    }
  };

  const pct = ri >= 0 ? Math.round((ri / getRoles().length) * 100) : 0;

  const btnStyle = (accent) => ({
    padding:"7px 18px", borderRadius:8, border:`2px solid ${accent}`,
    background:"white", color:accent, fontWeight:700, fontSize:13,
    cursor:"pointer", transition:"all 0.15s",
  });
  const onHover = (e, accent) => { e.currentTarget.style.background=accent; e.currentTarget.style.color="white"; };
  const onLeave = (e, accent) => { e.currentTarget.style.background="white"; e.currentTarget.style.color=accent; };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:"#F8FAFC" }}>
      {/* Agent header */}
      <div style={{ background:"#111111", color:"white", padding:"13px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
        <div>
          <div style={{ fontWeight:700, fontSize:15 }}>🤖 sIfA Agent</div>
          <div style={{ fontSize:11, opacity:0.75 }}>Guided AI contribution interview</div>
        </div>
        <button onClick={onClose} style={{ background:"none", border:"none", color:"white", fontSize:22, cursor:"pointer", lineHeight:1 }}>×</button>
      </div>

      {/* Progress */}
      {ri >= 0 && phase !== "done" && (
        <div style={{ padding:"8px 14px", background:"white", borderBottom:"1px solid #E2E8F0", flexShrink:0 }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#64748B", marginBottom:5 }}>
            <span>Progress</span><span>{ri}/{getRoles().length} completed</span>
          </div>
          <div style={{ height:5, background:"#E2E8F0", borderRadius:3 }}>
            <div style={{ height:4, borderRadius:1, background:"#2451CB", width:pct+"%", transition:"width 0.4s" }} />
          </div>
        </div>
      )}

      {/* Messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"12px 14px", display:"flex", flexDirection:"column", gap:10 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ alignSelf: m.from === "agent" ? "flex-start" : "flex-end", maxWidth:"90%" }}>
            <div style={{
              background: m.from === "agent" ? "white" : "#111111",
              color: m.from === "agent" ? "#1E293B" : "white",
              border: m.from === "agent" ? "1px solid #E2E8F0" : "none",
              borderRadius: m.from === "agent" ? "4px 14px 14px 14px" : "14px 4px 14px 14px",
              padding:"10px 13px", fontSize:13, lineHeight:1.58,
              boxShadow:"0 1px 4px rgba(0,0,0,0.06)", whiteSpace:"pre-wrap",
            }}>
              {m.text.split(/(\*\*[^*]+\*\*|_[^_]+_)/).map((chunk, j) => {
                if (chunk.startsWith("**") && chunk.endsWith("**"))
                  return <strong key={j}>{chunk.slice(2,-2)}</strong>;
                if (chunk.startsWith("_") && chunk.endsWith("_"))
                  return <em key={j} style={{ opacity:0.8 }}>{chunk.slice(1,-1)}</em>;
                return chunk;
              })}
            </div>
            {/* Begin interview button */}
            {m.startBtn && (
              <div style={{ marginTop:8, paddingLeft:4 }}>
                <button onClick={beginInterview}
                  style={{ padding:"8px 22px", borderRadius:2, border:"none", background:"#2451CB", color:"white", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                  Begin interview →
                </button>
              </div>
            )}
            {/* Taxonomy picker buttons */}
            {m.taxonomyPicker && (
              <div style={{ display:"flex", gap:8, marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickTaxonomy('credit')}
                  style={{ padding:"8px 22px", borderRadius:2, border:"none", background:"#2451CB", color:"white", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                  CRediT
                </button>
                <button onClick={() => pickTaxonomy('own')}
                  style={{ padding:"8px 22px", borderRadius:2, border:"2px solid #2451CB", background:"white", color:"#2451CB", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase" }}>
                  Own Taxonomy
                </button>
              </div>
            )}
            {/* Add-another-role buttons */}
            {m.addRolePicker && (
              <div style={{ display:"flex", gap:8, marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickAddRole('yes')}
                  style={btnStyle("#2451CB")}
                  onMouseEnter={e => onHover(e, "#2451CB")} onMouseLeave={e => onLeave(e, "#2451CB")}
                >✓ Yes, add another</button>
                <button onClick={() => pickAddRole('no')}
                  style={btnStyle("#94A3B8")}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
>→ No, start interview</button>
              </div>
            )}
            {/* Skip role button */}
            {m.skipPicker && (
              <div style={{ marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickSkipRole(m.roleIdx)}
                  style={{...btnStyle("#94A3B8"), borderStyle:"dashed"}}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >⏭ Skip this role</button>
              </div>
            )}
            {/* Contribution level buttons */}
            {m.levelPicker && (
              <div style={{ display:"flex", gap:8, marginTop:8, paddingLeft:4 }}>
                {(m.availLevels || ["Lead","Equal","Support"]).map(lv => (
                  <button key={lv} onClick={() => pickLevel(m.roleId, lv)}
                    style={btnStyle(m.accent)}
                    onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                  >{lv}</button>
                ))}
              </div>
            )}
            {/* No AI tool button */}
            {m.toolPicker && (
              <div style={{ marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickNoTool(m.roleId)}
                  style={btnStyle(m.accent)}
                  onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                >✗ No AI used for this role</button>
              </div>
            )}
            {/* Extent picker */}
            {m.picker && (
              <div style={{ display:"flex", gap:6, marginTop:8, paddingLeft:4 }}>
                {[1,2].map(v => (
                  <button key={v} onClick={() => pickExtent(m.roleId, v)} title={EXTENT_LABELS[v]}
                    style={{ width:56, height:56, borderRadius:8, border:`2px solid ${m.accent}`, background:"white", color:m.accent, fontWeight:700, fontSize:20, cursor:"pointer", transition:"all 0.15s" }}
                    onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                  >{v}</button>
                ))}
              </div>
            )}
            {/* Add-another buttons */}
            {m.addAnotherPicker && (
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickAddAnother(m.roleId, 'yes', ri)}
                  style={btnStyle(m.accent)}
                  onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                >✓ Yes, add another</button>
                <button onClick={() => pickAddAnother(m.roleId, 'no', ri)}
                  style={btnStyle("#94A3B8")}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >→ No, move on</button>
                <button onClick={() => pickAddAnother(m.roleId, 'reset', ri)}
                  style={{...btnStyle("#94A3B8"), borderStyle:"dashed"}}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >↩ Start role over</button>
              </div>
            )}
            {/* Single-Equal verification buttons */}
            {m.verifyLeadPicker && (
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8, paddingLeft:4 }}>
                <button onClick={() => pickVerifyLead(m.roleId, 'yes', ri)}
                  style={btnStyle(m.accent)}
                  onMouseEnter={e => onHover(e, m.accent)} onMouseLeave={e => onLeave(e, m.accent)}
                >✓ Yes, change to Lead</button>
                <button onClick={() => pickVerifyLead(m.roleId, 'no', ri)}
                  style={btnStyle("#94A3B8")}
                  onMouseEnter={e => onHover(e, "#94A3B8")} onMouseLeave={e => onLeave(e, "#94A3B8")}
                >→ No, keep as Equal</button>
              </div>
            )}
          </div>
        ))}
        <div ref={bottom} />
      </div>

      {/* Input — for text responses only (names, tool names, reasons) */}
      {phase !== "done" ? (
        <div style={{ padding:"10px 12px", borderTop:"1px solid #E2E8F0", display:"flex", gap:8, background:"white", flexShrink:0 }}>
          <input value={inp} onChange={e => setInp(e.target.value)}
            onKeyDown={e => e.key==="Enter" && send(inp)}
            placeholder={
              waiting        ? "Click a button above…" :
              phase==="tool" ? "Type the AI tool name, or click the button above if none…" :
              phase==="taxonomy"? "Click a button above…" :
              phase==="collectingRoles"? "Type the contribution name…" :
              phase==="start"? "Or click Begin interview above…" :
                               "Type your response…"
            }
            disabled={waiting}
            style={{ flex:1, border:"1px solid #CBD5E1", borderRadius:8, padding:"8px 12px", fontSize:13, outline:"none", background: waiting ? "#F1F5F9" : "white" }} />
          <button onClick={() => send(inp)} disabled={waiting || !inp.trim()}
            style={{
              padding:"8px 14px", borderRadius:8, border:"none",
              background: waiting || !inp.trim() ? "#CBD5E1" : "#2451CB",
              color:"white", fontWeight:600, fontSize:13,
              cursor: waiting || !inp.trim() ? "default" : "pointer",
            }}>Send</button>
        </div>
      ) : (
        <div style={{ padding:14, borderTop:"1px solid #E2E8F0", background:"white", textAlign:"center", flexShrink:0 }}>
          <div style={{ fontSize:13, color:"#16A34A", fontWeight:600 }}>✓ Interview complete — review your table</div>
        </div>
      )}
    </div>
  );
}

// ── Save / Load helpers ──────────────────────────────────────
// ── parseYesNo ─────────────────────────────────────────────
// Maps short free-text responses ('yep', 'nope', 'not really') to
// 'yes' | 'no' | null. Used by the agent flow when the user types
// instead of clicking a button — replaces the original regex that
// only caught a handful of patterns and missed common negations.
const _YN_AFFIRM = new Set([
  'y','yes','ye','yep','yeah','yea','ya','yup',
  'ok','okay','k','kk','sure','fine','alright',
  'aye','indeed','correct','right','true','affirmative',
  'absolutely','definitely','certainly','of course','for sure',
  'ready','start','go','begin',
  // Interview-style hedges that still imply assent
  'yeah kind of','sort of','kinda','kind of',
  'i guess','i guess so','somewhat','a bit','a little',
]);
const _YN_NEGATE = new Set([
  'n','no','nope','nah','naw','nay',
  'never','negative','not really','not at all','not now',
  "don't","dont","do not","don't think so","dont think so",
  "didn't","didnt","did not",
  "haven't","havent","have not",
  "won't","wont","will not",
  'none','nothing','nothing yet','no thanks','no thank you',
  'skip','pass',
  'na','n/a','not applicable',
  // Common hedged negations heard in interviews
  "i dont think so","i don't think so",'not exactly','not really sure',
  'doubt it','hardly',
]);
const parseYesNo = (txt) => {
  if (txt == null) return null;
  let s = String(txt).toLowerCase().trim();
  // Strip trailing punctuation and "please", which often trails responses
  s = s.replace(/[.!?]+$/g, '').replace(/\s+please$/, '').trim();
  if (!s) return null;
  if (_YN_AFFIRM.has(s)) return 'yes';
  if (_YN_NEGATE.has(s)) return 'no';
  // Multi-word starts: take the leading clause up to the first comma /
  // period / semicolon — covers "nope, never used it" or "yes, I did".
  const lead = s.split(/[,;.]/)[0].trim();
  if (lead !== s) {
    if (_YN_AFFIRM.has(lead)) return 'yes';
    if (_YN_NEGATE.has(lead)) return 'no';
  }
  // Last resort: single-token first word (catches 'yes please too')
  const first = s.split(/\s+/)[0];
  if (_YN_AFFIRM.has(first)) return 'yes';
  if (_YN_NEGATE.has(first)) return 'no';
  return null;
};

// ── LazyOnVisible ─────────────────────────────────────────────
// Renders a small placeholder until its container scrolls within
// rootMargin of the viewport, then swaps in `children`. Used to
// keep the 47-KB inlined EXAMPLE_SVG out of the initial render
// path so first paint is faster — users who never scroll to the
// example pay no parsing cost at all.
function LazyOnVisible({ children, minHeight = 160, rootMargin = '300px' }) {
  const [seen, setSeen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (seen || !ref.current || typeof IntersectionObserver === 'undefined') {
      // Fallback for ancient browsers: just render immediately.
      if (!seen && typeof IntersectionObserver === 'undefined') setSeen(true);
      return;
    }
    const obs = new IntersectionObserver(entries => {
      if (entries.some(e => e.isIntersecting)) {
        setSeen(true);
        obs.disconnect();
      }
    }, { rootMargin });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [seen, rootMargin]);
  if (seen) return children;
  return (
    <div ref={ref} aria-hidden="true"
      style={{ minHeight, background:"#F8FAFC", borderRadius:3,
               display:"flex", alignItems:"center", justifyContent:"center",
               color:"#94A3B8", fontSize:12, fontStyle:"italic" }}>
      Example loads when it scrolls into view…
    </div>
  );
}

const STORAGE_KEY = 'sifa_autosave_v1';

const _loadAutosave = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    return (obj && typeof obj === 'object') ? obj : null;
  } catch { return null; }
};

// For canonical CRediT role IDs, prefer the current ROLES entry so palette updates
// take effect on restore. For custom roles (no matching canonical id), keep the saved entry.
const _reconcileRoles = (saved) => {
  if (!Array.isArray(saved) || saved.length === 0) return null;
  return saved.map(s => {
    const canon = ROLES.find(r => r.id === s.id);
    return canon ? canon : s;
  });
};

const _reconcilePortfolio = (saved) => {
  if (!Array.isArray(saved)) return [];
  return saved.map(e => ({ ...e, roles: _reconcileRoles(e.roles) || e.roles || [] }));
};

// Shortcut for setting up your own taxonomy without going through the agent.

function TaxonomyPicker({ open, onClose, onApply, onUseCRediT, currentMode, currentRoles }) {
  const initial = currentMode === 'custom'
    ? currentRoles.map(r => r.label)
    : [];
  const [labels, setLabels] = useState(initial.length > 0 ? initial : ['']);
  const [draft, setDraft] = useState('');

    if (open) {

      setDraft('');

  if (!open) return null;

  const addLabel = () => {
    const t = draft.trim();

        background:"white", borderRadius:8, padding:"24px 28px",

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
          <div>
            <h2 style={{ fontSize:17, fontWeight:700, color:"#1E293B", margin:0 }}>

          </div>
          <button onClick={onClose} style={{
